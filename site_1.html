<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ableton Lab</title>
    <meta name="description" content="Ableton Lab— interaktif synthesizer, beat maker, mixer ve prodüksiyon eğitim araçları.">
    <meta name="theme-color" content="#060609">
    <meta property="og:title" content="Berkay Er — Ableton Lab">
    <meta property="og:description" content="İnteraktif synthesizer, beat maker ve prodüksiyon araçları ile Ableton'ı öğren.">
    <meta property="og:image" content="https://erberkay.github.io/Producer.School/assets/img/og-logo.png">
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --black:#060609; --deep:#0c0c16; --panel:#111120;
            --gold:#e8b84b;  --amber:#d4722a; --crimson:#b82d45;
            --ice:#8fc8e8;   --white:#eeebe6; --mid:#2a2a45;
            --dim:rgba(238,235,230,0.45);
        }
        body { font-family:'Space Mono',monospace; background:var(--black); color:var(--white); min-height:100vh; overflow-x:hidden; }
        body::before {
            content:''; position:fixed; inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events:none; z-index:0;
        }
        #scrollProgress { position:fixed; top:0; left:0; height:3px; width:0; background:linear-gradient(90deg,var(--crimson),var(--amber),var(--gold)); z-index:101; transition:width .1s; }
        .topnav { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(6,6,9,.92); border-bottom:1px solid var(--mid); backdrop-filter:blur(8px); height:48px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; }
        .topnav-back { color:rgba(238,235,230,.45); font-size:.65rem; letter-spacing:.08em; text-decoration:none; transition:color .15s; }
        .topnav-back:hover { color:var(--gold); }
        .topnav-brand { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:var(--gold); letter-spacing:.08em; }
        .container { max-width:1400px; margin:0 auto; padding:24px; padding-top:108px; position:relative; z-index:1; }
        /* ── Module nav ── */
        #moduleNav { position:fixed; top:48px; left:0; right:0; z-index:98; background:rgba(6,6,9,.96); border-bottom:1px solid var(--mid); backdrop-filter:blur(10px); display:flex; overflow-x:auto; scrollbar-width:none; }
        #moduleNav::-webkit-scrollbar { display:none; }
        .mnav-item { flex-shrink:0; padding:0 16px; height:34px; display:flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:.05em; color:rgba(238,235,230,.35); cursor:pointer; border:none; background:transparent; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; white-space:nowrap; }
        .mnav-item:hover { color:rgba(238,235,230,.7); }
        .mnav-item.active { color:var(--gold); border-bottom-color:var(--gold); }
        .mnav-sep { width:1px; height:14px; background:var(--mid); flex-shrink:0; align-self:center; margin:0 2px; }
        .accent-bar { height:4px; background:linear-gradient(90deg,var(--crimson),var(--amber),var(--gold)); animation:shimmer 4s ease-in-out infinite alternate; }
        @keyframes shimmer { from{filter:brightness(1)} to{filter:brightness(1.5)} }
        @keyframes fadeUp  { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

        /* ── Header ── */
        .header { background:var(--deep); padding:28px 32px; margin-bottom:28px; border:1px solid var(--mid); border-top:none; animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both; }
        .header h1 { font-family:'Bebas Neue',sans-serif; color:var(--gold); font-size:clamp(2rem,5vw,3.2rem); letter-spacing:.04em; margin-bottom:6px; }
        .header p  { color:var(--dim); font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; }

        /* ── Module grid ── */
        .module-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-top:20px; }
        .module-card { background:var(--deep); border:1px solid var(--mid); padding:20px; border-radius:2px; cursor:pointer; position:relative; overflow:hidden; transition:border-color .2s,transform .2s; animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both; }
        .module-card:hover { border-color:var(--gold); transform:translateY(-2px); }
        .module-card-num { position:absolute; right:12px; bottom:8px; font-family:'Bebas Neue',sans-serif; font-size:3.5rem; color:rgba(255,255,255,.04); line-height:1; pointer-events:none; }
        .module-card-status { display:inline-block; font-size:.62rem; padding:3px 8px; border-radius:2px; margin-top:10px; letter-spacing:.08em; text-transform:uppercase; }
        .status-done  { background:rgba(100,200,100,.15); color:#6fc; border:1px solid rgba(100,200,100,.3); }
        .status-active{ background:rgba(232,184,75,.12);  color:var(--gold); border:1px solid rgba(232,184,75,.3); }
        .status-idle  { background:rgba(255,255,255,.06); color:var(--dim); border:1px solid rgba(255,255,255,.1); }

        /* ── Synth shell ── */
        .synth-container { background:var(--deep); border:1px solid var(--mid); padding:24px; margin-top:20px; animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both; }
        .synth-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
        .synth-header h2 { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.5rem,3vw,2rem); color:var(--gold); letter-spacing:.05em; }
        .back-btn { background:none; border:1px solid var(--mid); color:var(--dim); padding:8px 16px; font-family:'Space Mono',monospace; font-size:.75rem; cursor:pointer; letter-spacing:.08em; margin:8px 0; transition:border-color .2s,color .2s; }
        .back-btn:hover { border-color:var(--gold); color:var(--gold); }
        .home-back { display:inline-flex; align-items:center; gap:6px; color:var(--dim); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; text-decoration:none; padding:6px 0; margin:12px 0 4px; transition:color .2s; }
        .home-back:hover { color:var(--gold); }
        .home-back::before { content:'←'; font-size:.85rem; }
        .power-button { background:var(--mid); border:none; color:var(--white); padding:10px 20px; font-family:'Space Mono',monospace; font-size:.78rem; cursor:pointer; letter-spacing:.1em; transition:background .2s; }
        .power-button.active { background:var(--crimson); }
        .power-button:hover { filter:brightness(1.2); }

        /* ── Controls grid ── */
        .controls-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin:16px 0; }
        .control-group { background:rgba(255,255,255,.03); border:1px solid var(--mid); padding:16px; border-radius:4px; }
        .control-group h3 { color:var(--gold); font-size:.82rem; margin-bottom:10px; letter-spacing:.05em; }
        .slider-label { display:flex; justify-content:space-between; margin-bottom:8px; font-size:.72rem; color:var(--dim); }
        .hint-box { background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.2); border-left:3px solid var(--gold); padding:12px 16px; font-size:.75rem; color:var(--dim); margin:16px 0; line-height:1.6; }

        /* ── Custom slider ── */
        .adsr-track { position:relative; height:24px; display:flex; align-items:center; cursor:pointer; touch-action:none; user-select:none; margin:4px 0; }
        .adsr-track::before { content:''; position:absolute; left:0; right:0; height:4px; background:var(--mid); border-radius:2px; pointer-events:none; }
        .adsr-track:hover .adsr-thumb { box-shadow:0 0 14px rgba(232,184,75,.8); transform:translate(-50%,-50%) scale(1.2); }
        .adsr-fill { position:absolute; left:0; top:50%; transform:translateY(-50%); height:4px; background:linear-gradient(90deg,var(--amber),var(--gold)); border-radius:2px; pointer-events:none; }
        .adsr-thumb { position:absolute; top:50%; transform:translate(-50%,-50%); width:16px; height:16px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px rgba(232,184,75,.5); pointer-events:none; transition:box-shadow .15s,transform .15s; }

        /* ── Waveform selector ── */
        .waveform-selector { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
        .wave-btn { background:var(--panel); border:1px solid var(--mid); color:var(--dim); padding:10px 8px; cursor:pointer; font-family:'Space Mono',monospace; font-size:.75rem; letter-spacing:.06em; transition:all .15s; line-height:1.4; }
        .wave-btn:hover,.wave-btn.active { background:rgba(232,184,75,.1); border-color:var(--gold); color:var(--gold); }

        /* ── Keyboard ── */
        .keyboard { display:flex; gap:4px; margin-top:16px; }
        .key { flex:1; background:var(--white); border:2px solid #aaa; height:80px; cursor:pointer; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px; border-radius:0 0 4px 4px; transition:background .1s,transform .1s; min-width:0; }
        .key:hover { background:#f0e8d0; }
        .key.playing { background:var(--gold); transform:scaleY(.95); }
        .key-label { font-size:.65rem; color:#333; text-align:center; line-height:1.3; font-family:'Space Mono',monospace; }

        /* ── ADSR explanation ── */
        .adsr-explanation { background:rgba(255,255,255,.03); border:1px solid var(--mid); padding:20px; margin:16px 0; }

        /* ── Oscilloscope ── */
        .oscilloscope-wrap { margin:0 0 16px; border:1px solid var(--mid); border-radius:6px; overflow:hidden; position:relative; }
        .oscilloscope-label { position:absolute; top:6px; left:10px; font-size:.58rem; letter-spacing:.12em; color:rgba(232,184,75,.4); text-transform:uppercase; pointer-events:none; z-index:1; }
        canvas.oscilloscope { display:block; width:100%; height:80px; background:#060609; }

        /* ── Preset buttons ── */
        .preset-row { display:flex; flex-wrap:wrap; gap:7px; margin:4px 0 16px; }
        .preset-btn { background:var(--deep); border:1px solid var(--mid); color:var(--dim); padding:7px 13px; border-radius:4px; font-family:'Space Mono',monospace; font-size:.68rem; cursor:pointer; transition:border-color .15s,color .15s,box-shadow .15s; letter-spacing:.04em; }
        .preset-btn:hover,.preset-btn.active { border-color:var(--gold); color:var(--gold); box-shadow:0 0 8px rgba(232,184,75,.25); }

        /* ── Filter section ── */
        .filter-section { background:rgba(184,45,69,.06); border:1px solid rgba(184,45,69,.25); border-radius:6px; padding:14px; margin:8px 0; grid-column:1/-1; }
        .filter-section h3 { color:var(--crimson); margin-bottom:10px; font-size:.85rem; }
        .filter-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

        /* ── Theory card ── */
        .theory-card { background:rgba(8,8,18,.9); border:1px solid rgba(232,184,75,.18); border-left:3px solid var(--gold); border-radius:4px; margin:14px 0; overflow:hidden; }
        .theory-toggle { width:100%; background:none; border:none; color:rgba(232,184,75,.8); font-family:'Space Mono',monospace; font-size:.72rem; padding:11px 14px; text-align:left; cursor:pointer; display:flex; justify-content:space-between; letter-spacing:.06em; }
        .theory-toggle:hover { background:rgba(232,184,75,.04); }
        .theory-body { padding:12px 14px; font-size:.75rem; line-height:1.7; color:var(--dim); border-top:1px solid rgba(232,184,75,.1); }
        .theory-body strong { color:var(--white); }
        .theory-ableton { margin-top:10px; padding:8px 11px; background:rgba(232,184,75,.06); border-radius:3px; font-size:.68rem; color:var(--gold); letter-spacing:.04em; }

        /* ── Genre templates ── */
        .genre-row { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
        .genre-btn { background:var(--deep); border:1px solid var(--mid); color:var(--dim); padding:7px 13px; border-radius:4px; font-family:'Space Mono',monospace; font-size:.68rem; cursor:pointer; transition:border-color .15s,color .15s; letter-spacing:.04em; }
        .genre-btn:hover { border-color:var(--amber); color:var(--amber); }

        /* ── Swing row ── */
        .swing-row { display:flex; align-items:center; gap:12px; font-size:.72rem; color:var(--dim); }
        .swing-row label { white-space:nowrap; min-width:60px; }
        .swing-val { min-width:36px; color:var(--gold); font-weight:bold; }

        /* ── Beat grid ── */
        .beat-grid-wrap { overflow-x:auto; margin:16px 0; }
        .beat-grid { min-width:640px; }
        .beat-row { display:grid; grid-template-columns:80px repeat(16,1fr); gap:3px; margin-bottom:3px; }
        .beat-cell { position:relative; aspect-ratio:1; border-radius:5px; cursor:ns-resize; overflow:hidden; user-select:none; transition:transform .08s; }

        /* ── Task panel ── */
        .task-panel { background:var(--deep); border:1px solid var(--mid); padding:20px; margin-top:20px; animation:fadeUp .8s cubic-bezier(.16,1,.3,1) both; }
        .task-panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .task-panel-header span:first-child { color:var(--gold); font-size:.85rem; letter-spacing:.08em; }
        .task-progress-label { color:var(--dim); font-size:.72rem; }
        .task-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
        .task-item { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:rgba(255,255,255,.03); border:1px solid var(--mid); border-radius:4px; cursor:pointer; transition:border-color .15s,background .15s; font-size:.75rem; line-height:1.5; }
        .task-item:hover { border-color:rgba(232,184,75,.3); background:rgba(232,184,75,.04); }
        .task-item.done { background:rgba(100,200,100,.06); border-color:rgba(100,200,100,.25); }
        .task-check { color:var(--dim); min-width:16px; font-size:.9rem; }
        .task-item.done .task-check { color:#6fc; }
        .task-text { color:var(--dim); }
        .task-item.done .task-text { color:rgba(100,200,100,.7); text-decoration:line-through; }
        .task-progress-bar { height:4px; background:var(--mid); border-radius:2px; overflow:hidden; }
        .task-progress-fill { height:100%; background:linear-gradient(90deg,var(--crimson),var(--amber),var(--gold)); border-radius:2px; transition:width .4s cubic-bezier(.16,1,.3,1); }

        /* ── Mixer theory cards ── */
        .mix-concept-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-top:14px; }
        .mix-concept { background:rgba(255,255,255,.03); border:1px solid var(--mid); border-radius:4px; padding:14px; }
        .mix-concept strong { color:var(--gold); display:block; margin-bottom:6px; font-size:.8rem; }
        .mix-concept p { color:var(--dim); font-size:.72rem; line-height:1.6; }

        /* ── Arrangement sections ── */
        .arr-section { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:4px; margin-bottom:8px; }

        /* ── Interactive EQ ── */
        .eq-axis { display:flex; justify-content:space-between; padding:2px 6px; font-size:.55rem; color:rgba(255,255,255,.22); margin-top:2px; }

        /* ── Mixer strips ── */
        .mixer-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:4px; }
        .mixer-strip { border-radius:6px; padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:10px; }
        .vu-wrap { width:100%; height:44px; border-radius:3px; overflow:hidden; position:relative; background:rgba(0,0,0,.4); }
        .vu-bar { position:absolute; bottom:0; left:0; right:0; height:0%; border-radius:2px; transition:height 70ms; }
        .eq-canvas { width:100%; height:54px; border-radius:4px; background:rgba(0,0,0,.5); display:block; }

        /* ── Arrangement builder ── */
        .arr-build-scroll { overflow-x:auto; margin:14px 0; }
        .arr-build-grid { display:flex; flex-direction:column; gap:3px; min-width:620px; }
        .arr-build-row { display:grid; grid-template-columns:80px repeat(8,1fr); gap:3px; align-items:center; }
        .arr-build-cell { height:34px; border-radius:4px; cursor:pointer; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.03); transition:background .12s,border-color .12s,filter .12s; display:flex; align-items:center; justify-content:center; }

        @media(max-width:600px) {
            .controls-grid { grid-template-columns:1fr; }
            .filter-grid { grid-template-columns:1fr; }
            .keyboard .key { height:60px; }
            .mixer-grid { grid-template-columns:repeat(2,1fr); }
        }
        /* ── Auth bar ── */
        #authBar { position:fixed; top:12px; right:16px; z-index:300; display:flex; align-items:center; gap:8px; }
        .auth-sign-btn { background:var(--mid); border:1px solid var(--gold); color:var(--gold); font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.06em; padding:6px 14px; border-radius:4px; cursor:pointer; transition:background .18s,color .18s; }
        .auth-sign-btn:hover { background:var(--gold); color:var(--black); }
        .auth-user-wrap { display:flex; align-items:center; gap:8px; }
        .auth-avatar { width:28px; height:28px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; }
        .auth-name { font-size:.65rem; color:var(--white); max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .auth-out-btn { background:transparent; border:1px solid rgba(255,255,255,.2); color:var(--dim); font-family:'Space Mono',monospace; font-size:.58rem; padding:4px 8px; border-radius:4px; cursor:pointer; }
        .auth-out-btn:hover { border-color:var(--crimson); color:var(--crimson); }
        /* ── In-page modal ── */
        .lab-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:9999; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .15s ease; }
        .lab-modal { background:var(--panel); border:1px solid var(--mid); border-radius:6px; max-width:480px; width:100%; padding:24px 24px 20px; position:relative; animation:fadeUp .22s cubic-bezier(.16,1,.3,1); }
        .lab-modal-close { position:absolute; top:10px; right:14px; background:transparent; border:none; color:var(--dim); font-size:1.1rem; cursor:pointer; line-height:1; padding:4px; }
        .lab-modal-close:hover { color:var(--white); }
        .lab-modal h4 { font-family:'Bebas Neue',sans-serif; letter-spacing:.08em; font-size:1.15rem; color:var(--gold); margin-bottom:12px; padding-right:24px; }
        .lab-modal p { font-size:.76rem; color:var(--dim); line-height:1.7; }
        .lab-modal ul { font-size:.76rem; color:var(--dim); line-height:1.7; padding-left:18px; margin-top:8px; }
        .lab-modal li { margin-bottom:6px; }
        .lab-modal-actions { display:flex; gap:8px; margin-top:18px; justify-content:flex-end; flex-wrap:wrap; }
        /* ── Cloud save rows ── */
        .cloud-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:10px 0; }
        .cloud-hint { font-size:.62rem; color:var(--dim); opacity:.5; }
        .saved-list { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; width:100%; }
        .saved-item-wrap { display:flex; align-items:center; gap:2px; }
        .saved-del { padding:3px 7px; font-size:.55rem; color:var(--crimson); border:1px solid var(--crimson); background:transparent; border-radius:3px; cursor:pointer; font-family:'Space Mono',monospace; }
        .saved-del:hover { background:var(--crimson); color:var(--white); }
    </style>
    <!-- Firebase compat SDK (no build step required) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="scrollProgress"></div>
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="index.html" class="topnav-back">← Ana Sayfa</a>
    <span style="color:var(--mid);">|</span>
    <span class="topnav-brand">Ableton Lab</span>
  </div>
  <div id="authBar"></div>
</nav>
<nav id="moduleNav"></nav>
<div id="app"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════
// FIREBASE — Auth + Firestore
// ► Kendi Firebase config'ini buraya yapıştır:
//   console.firebase.google.com → Proje → Web app → Config
// ═══════════════════════════════════════════════════════════════════
const firebaseConfig = {
    apiKey:            "AIzaSyDX8AkwDejrkh5L4xUXQcmzKq-DYvc2E8A",
    authDomain:        "ableton-tutorial.firebaseapp.com",
    projectId:         "ableton-tutorial",
    storageBucket:     "ableton-tutorial.firebasestorage.app",
    messagingSenderId: "677640687230",
    appId:             "1:677640687230:web:8c6a2dfefbf55c69ffd22f",
    measurementId:     "G-V63GZC4VXM",
};

let _fbReady = false, _auth = null, _db = null;
try {
    firebase.initializeApp(firebaseConfig);
    _auth = firebase.auth();
    _db   = firebase.firestore();
    _fbReady = true;
} catch(e) { console.warn('Firebase init skipped (config not set):', e.message); }

let currentUser = null;

// ── Auth ────────────────────────────────────────────────────────────
let _signingIn = false;
function signInWithGoogle() {
    if (!_fbReady || _signingIn) return;
    _signingIn = true;
    _auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
      .catch(e => console.error(e)).finally(() => { _signingIn = false; });
}
function signOut() { _auth?.signOut(); }

// ── Firestore helpers ───────────────────────────────────────────────
function userDoc() { return _db.collection('users').doc(currentUser.uid); }

async function loadUserData(uid) {
    try {
        const snap = await _db.collection('users').doc(uid).get();
        if (snap.exists) {
            const d = snap.data();
            if (d.progress) { state.completedTasks = d.progress; render(); }
        }
    } catch(e) { console.warn('loadUserData:', e); }
}

async function saveProgress() {
    if (!currentUser || !_db) return;
    try { await userDoc().set({ progress: state.completedTasks }, { merge: true }); } catch {}
}

async function saveBeat(name) {
    if (!currentUser || !_db) return;
    await userDoc().collection('beats').add({
        name,
        patterns: state.beatPatterns,
        bpm: state.bpm,
        swing: state.swing,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
}

async function loadBeats() {
    if (!currentUser || !_db) return [];
    const snap = await userDoc().collection('beats')
        .orderBy('createdAt','desc').limit(15).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function deleteBeat(id) {
    if (!currentUser || !_db) return;
    await userDoc().collection('beats').doc(id).delete();
}

async function saveUserPreset(name) {
    if (!currentUser || !_db) return;
    await userDoc().collection('presets').add({
        name,
        wave: state.waveform,
        adsr: { ...state.adsr },
        filter: { ...state.filter },
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
}

async function loadUserPresets() {
    if (!currentUser || !_db) return [];
    const snap = await userDoc().collection('presets')
        .orderBy('createdAt','desc').limit(10).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function deleteUserPreset(id) {
    if (!currentUser || !_db) return;
    await userDoc().collection('presets').doc(id).delete();
}

function updateAuthBar() {
    const bar = document.getElementById('authBar');
    if (!bar) return;
    if (currentUser) {
        bar.innerHTML = '';
        const wrap = document.createElement('div'); wrap.className = 'auth-user-wrap';
        const img  = document.createElement('img');  img.className = 'auth-avatar';
        img.src = currentUser.photoURL || ''; img.alt = '';
        const name = document.createElement('span'); name.className = 'auth-name';
        name.textContent = currentUser.displayName?.split(' ')[0] || 'Kullanıcı';
        const out = document.createElement('button'); out.className = 'auth-out-btn';
        out.textContent = 'Çıkış'; out.onclick = signOut;
        wrap.append(img, name, out); bar.append(wrap);
    } else {
        bar.innerHTML = '';
        const btn = document.createElement('button'); btn.className = 'auth-sign-btn';
        btn.textContent = '⬡ Google ile Giriş'; btn.onclick = signInWithGoogle;
        bar.append(btn);
    }

        currentUser = user;

// ═══════════════════════════════════════════════════════════════════
// AUDIO — SYNTH  (persistent filter + analyser)
// ═══════════════════════════════════════════════════════════════════
let synthCtx = null, filterNode = null, analyserNode = null;

function getSynthCtx() {
    if (!synthCtx) {
        synthCtx = new (window.AudioContext || window.webkitAudioContext)();
        filterNode   = synthCtx.createBiquadFilter();
        filterNode.type = 'lowpass';
        filterNode.frequency.value = state.filter.cutoff;
        filterNode.Q.value         = state.filter.resonance;
        analyserNode = synthCtx.createAnalyser();
        analyserNode.fftSize = 4096;
        filterNode.connect(analyserNode);
        analyserNode.connect(synthCtx.destination);
    }
    if (synthCtx.state === 'suspended') synthCtx.resume();
    return synthCtx;
}

function playNote(freq, dur = 0.8) {
    const ctx = getSynthCtx();
    const now = ctx.currentTime;
    const {attack, decay, sustain, release} = state.adsr;

    // holdDur: note stays on long enough for A+D to complete
    const holdDur  = Math.max(dur, attack + decay + 0.02);
    const totalDur = holdDur + release;
    const sSustain = Math.max(sustain, 0.0001); // avoid zero for exponential ramp

    const envGain = ctx.createGain();
    envGain.gain.setValueAtTime(0.0001, now);
    envGain.gain.linearRampToValueAtTime(state.volume, now + attack);
    envGain.gain.linearRampToValueAtTime(state.volume * sSustain, now + attack + decay);
    envGain.gain.setValueAtTime(state.volume * sSustain, now + holdDur);
    envGain.gain.exponentialRampToValueAtTime(0.0001, now + totalDur);
    envGain.connect(filterNode || ctx.destination);

    // Unison: 3 detuned voices for sawtooth/square → fat, warm sound
    const needsUnison = state.waveform === 'sawtooth' || state.waveform === 'square';
    const voices  = needsUnison ? [-8, 0, 8] : [0];
    const vScale  = needsUnison ? 0.55 : 1.0;
    envGain.gain.value; // prevent early GC

    voices.forEach(detune => {
        const osc = ctx.createOscillator();
        osc.type = state.waveform;
        osc.frequency.value = freq;
        osc.detune.value = detune;
        // Scale each voice so total volume stays consistent
        const vg = ctx.createGain(); vg.gain.value = vScale;
        osc.connect(vg); vg.connect(envGain);
        osc.start(now);
        osc.stop(now + totalDur + 0.1);
    });
}

// ═══════════════════════════════════════════════════════════════════
// AUDIO — BEAT ENGINE  (AudioContext lookahead scheduler — no setInterval jank)
// ═══════════════════════════════════════════════════════════════════
let beatCtx = null, beatBuffers = {}, beatMasterGain = null;
let beatTimerID = null, beatStep = 0, beatNextTime = 0, beatPlaying = false, beatGeneration = 0;

const BEAT_TRACKS = [
    { name:'Kick',      emoji:'🟠', file:'assets/audio/Kick.wav',         color:'#e8b84b' },
    { name:'Snare',     emoji:'⚪', file:'assets/audio/Snare.wav',        color:'#00aaff' },
    { name:'Close Hat', emoji:'🟡', file:'assets/audio/Close Hat.wav',    color:'#ffd700' },
    { name:'Open Hat',  emoji:'🟢', file:'assets/audio/Open Hat (1).wav', color:'#00ff88' },
    { name:'Bass',      emoji:'🔵', file:'assets/audio/bass.wav',         color:'#a855f7' },
];

function getBeatCtx() {
    if (!beatCtx) {
        beatCtx = new (window.AudioContext || window.webkitAudioContext)();
        beatMasterGain = beatCtx.createGain();
        beatMasterGain.gain.value = 1;
        beatMasterGain.connect(beatCtx.destination);
        BEAT_TRACKS.forEach(t => {
            fetch(t.file).then(r=>r.arrayBuffer()).then(ab=>beatCtx.decodeAudioData(ab))
                         .then(buf=>{ beatBuffers[t.file]=buf; }).catch(()=>{});
        });
    }
    if (beatCtx.state === 'suspended') beatCtx.resume();
    return beatCtx;
}

function synthDrum(ctx, file, v, when, dest=null) {
    const g = ctx.createGain(); g.connect(dest || beatMasterGain || ctx.destination);
    const lc = file.toLowerCase();
    if (lc.includes('kick')) {
        const o = ctx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(150, when);
        o.frequency.exponentialRampToValueAtTime(0.001, when + 0.4);
        g.gain.setValueAtTime(v, when); g.gain.exponentialRampToValueAtTime(0.001, when + 0.4);
        o.connect(g); o.start(when); o.stop(when + 0.4);
    } else if (lc.includes('snare')) {
        const buf = ctx.createBuffer(1, ctx.sampleRate*0.12, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0; i<d.length; i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
        const src = ctx.createBufferSource(); src.buffer=buf;
        const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=500;
        g.gain.setValueAtTime(v,when); g.gain.exponentialRampToValueAtTime(0.001,when+0.12);
        src.connect(f); f.connect(g); src.start(when);
    } else if (lc.includes('hat')) {
        const dur = lc.includes('open') ? 0.18 : 0.06;
        const buf = ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0; i<d.length; i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
        const src = ctx.createBufferSource(); src.buffer=buf;
        const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=8000;
        g.gain.setValueAtTime(v*0.45,when); g.gain.exponentialRampToValueAtTime(0.001,when+dur);
        src.connect(f); f.connect(g); src.start(when);
    } else if (lc.includes('bass')) {
        const o = ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=80;
        const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=280;
        g.gain.setValueAtTime(v*0.6,when); g.gain.exponentialRampToValueAtTime(0.001,when+0.25);
        o.connect(f); f.connect(g); o.start(when); o.stop(when+0.25);
    }
}

function scheduleStep(step, when) {
    const ctx   = getBeatCtx();
    const swing = step % 2 === 1 ? (state.swing/100) * (60/state.bpm/4) * 0.66 : 0;
    const t     = when + swing;
    BEAT_TRACKS.forEach((track, ti) => {
        const vel = state.beatPatterns[ti][step];
        if (vel <= 0) return;
        const v = (state.beatVolumes[ti]/100) * (vel/100);
        const buf = beatBuffers[track.file];
        if (buf) {
            const src  = ctx.createBufferSource(); src.buffer = buf;
            const gain = ctx.createGain(); gain.gain.value = v;
            src.connect(gain); gain.connect(beatMasterGain || ctx.destination); src.start(t);
        } else {
            synthDrum(ctx, track.file, v, t);
        }
    });
    // Visual step highlight via timeout offset
    const ctx2 = beatCtx;
    const delay = Math.max(0, (t - ctx2.currentTime) * 1000);
    const s = step;
    setTimeout(() => { if (beatPlaying) highlightStep(s); }, delay);
}

function beatSchedulerLoop(gen) {
    if (!beatPlaying || gen !== beatGeneration) return; // stale generation → exit
    const ctx = getBeatCtx();
    const spb = 60 / state.bpm / 4; // seconds per 16th note
    while (beatNextTime < ctx.currentTime + 0.12) {
        scheduleStep(beatStep, beatNextTime);
        beatNextTime += spb;
        beatStep = (beatStep + 1) % 16;
    }
    beatTimerID = setTimeout(() => beatSchedulerLoop(gen), 20);
}

function startBeat() {
    if (beatPlaying) return;
    const ctx = getBeatCtx();
    beatPlaying  = true;
    beatStep     = 0;
    beatGeneration++;
    beatNextTime = ctx.currentTime + 0.05;
    beatSchedulerLoop(beatGeneration);
}

function stopBeat(resetCtx = false) {
    beatPlaying = false;
    beatGeneration++; // invalidates any running scheduler loop
    if (beatTimerID) { clearTimeout(beatTimerID); beatTimerID = null; }
    if (resetCtx && beatCtx) {
        // Close context to immediately cancel all scheduled audio
        beatCtx.close().catch(() => {});
        beatCtx = null;
        beatBuffers = {};
        beatMasterGain = null;
    }
    highlightStep(-1);
}

function highlightStep(active) {
    document.querySelectorAll('.beat-cell').forEach(c => {
        const step = +c.dataset.step, ti = +c.dataset.ti;
        const vel  = state.beatPatterns[ti][step];
        c.style.transform = step === active ? 'scale(1.12)' : 'scale(1)';
        c.style.borderWidth = step === active ? '2px' : '1px';
        c.style.borderColor = step === active ? '#fff'
            : vel > 0 ? BEAT_TRACKS[ti].color+'66' : 'rgba(255,255,255,.1)';
    });
}

// ═══════════════════════════════════════════════════════════════════
// OSCILLOSCOPE
// ═══════════════════════════════════════════════════════════════════
let oscRafId = null;

function stopOsc() { if (oscRafId) { cancelAnimationFrame(oscRafId); oscRafId = null; } }

function startOsc(canvas) {
    stopOsc();
    const c = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const oscData = new Uint8Array(2048);
    function draw() {
        oscRafId = requestAnimationFrame(draw);
        c.fillStyle = '#060609'; c.fillRect(0, 0, W, H);
        // Grid lines
        c.strokeStyle = 'rgba(42,42,69,.35)'; c.lineWidth = 1;
        [0.25, 0.5, 0.75].forEach(f => {
            c.beginPath(); c.moveTo(0, H * f); c.lineTo(W, H * f); c.stroke();
        });
        if (!analyserNode) {
            c.strokeStyle = 'rgba(42,42,69,.6)'; c.lineWidth = 1.5;
            c.beginPath(); c.moveTo(0, H/2); c.lineTo(W, H/2); c.stroke();
            return;
        }
        analyserNode.getByteTimeDomainData(oscData);
        // Find stable trigger: first rising zero-crossing in first half
        let trigger = 0;
        const searchEnd = Math.floor(oscData.length * 0.45);
        for (let i = 1; i < searchEnd; i++) {
            if (oscData[i-1] < 128 && oscData[i] >= 128) { trigger = i; break; }
        }
        // Draw only enough samples to fill canvas (half the buffer)
        const drawLen = Math.min(oscData.length - trigger, Math.floor(oscData.length / 2));
        const sw = W / drawLen;
        c.strokeStyle = '#e8b84b'; c.lineWidth = 2.5;
        c.shadowColor = '#e8b84b'; c.shadowBlur = 8;
        c.beginPath();
        for (let i = 0; i < drawLen; i++) {
            const x = i * sw;
            const y = H / 2 - (oscData[trigger + i] - 128) / 128 * (H / 2 * 0.88);
            i === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
        }
        c.stroke(); c.shadowBlur = 0;
    }
    draw();
}

// ═══════════════════════════════════════════════════════════════════
// CUSTOM SLIDER  (pure pointer events, zero framework overhead)
// ═══════════════════════════════════════════════════════════════════
// Shared window handlers — attached once
const _sliders = new Set();
window.addEventListener('pointermove', e => {
    _sliders.forEach(s => s._move(e));
}, {passive:true});
window.addEventListener('pointerup',     e => { _sliders.forEach(s => s._up(e)); });
window.addEventListener('pointercancel', e => { _sliders.forEach(s => s._up(e)); });

function makeSlider({min, max, step, value, onChange}) {
    const wrap  = document.createElement('div'); wrap.className = 'adsr-track';
    const fill  = document.createElement('div'); fill.className  = 'adsr-fill';
    const thumb = document.createElement('div'); thumb.className = 'adsr-thumb';
    wrap.append(fill, thumb);

    let dragging = false;
    const clamp = v => Math.max(min, Math.min(max, v));
    const snap  = v => Math.round(v / step) * step;
    const pctOf = v => (v - min) / (max - min);

    function render(v) {
        const pct = pctOf(clamp(v)) * 100;
        fill.style.width  = pct + '%';
        thumb.style.left  = pct + '%';
    }
    render(value);

    function fromX(clientX) {
        const r = wrap.getBoundingClientRect();
        return clamp(snap(min + Math.max(0, Math.min(1, (clientX - r.left) / r.width)) * (max - min)));
    }

    wrap.addEventListener('pointerdown', e => {
        e.preventDefault();
        wrap.setPointerCapture(e.pointerId);
        dragging = true;
        const v = fromX(e.clientX); render(v); onChange(v);
    });

    const obj = {
        _move(e) { if (!dragging) return; const v=fromX(e.clientX); render(v); onChange(v); },
        _up()   { dragging = false; },
        update(v) { render(v); },
        el: wrap,
    };
    _sliders.add(obj);
    wrap._sliderObj = obj;
    return wrap;
}

// ═══════════════════════════════════════════════════════════════════
// TASK SYSTEM
// ═══════════════════════════════════════════════════════════════════
function getProgress(mid) {
    const tasks = TASKS[mid] || [];
    if (!tasks.length) return 0;
    return Math.round(tasks.filter(t => state.completedTasks[`${mid}-${t.id}`]).length / tasks.length * 100);
}
function toggleTask(mid, tid) {
    const k = `${mid}-${tid}`;
    const wasDone = !!state.completedTasks[k];
    state.completedTasks[k] = !wasDone;
    localStorage.setItem('berkay_tasks', JSON.stringify(state.completedTasks));
    saveProgress(); // sync to cloud if logged in
    // Check if module just became 100%
    if (!wasDone && getProgress(mid) === 100) {
        showModuleCompletion(mid);
    }
}

const MODULE_NAMES = { 1: 'Synthesizer', 2: 'Beat Maker', 3: 'Mixing', 4: 'Arrangement Builder', 5: 'Mastering' };
function showModuleCompletion(mid) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
    const box = document.createElement('div');
    box.style.cssText = 'background:#13131f;border:1px solid #e8b84b;border-radius:12px;padding:36px 32px;text-align:center;max-width:380px;width:100%;animation:celebIn .35s cubic-bezier(.34,1.56,.64,1);';
    box.innerHTML = `
        <div style="font-size:3rem;margin-bottom:12px">🏆</div>
        <div style="font-family:\'Bebas Neue\',sans-serif;font-size:1.8rem;color:#e8b84b;letter-spacing:.06em;margin-bottom:8px">Modül Tamamlandı!</div>
        <div style="font-size:.85rem;color:rgba(238,235,230,.6);margin-bottom:4px">Tebrikler!</div>
        <div style="font-family:\'Bebas Neue\',sans-serif;font-size:1.1rem;color:#fff;margin-bottom:20px;letter-spacing:.04em">${MODULE_NAMES[mid] || 'Modül'} ✓</div>
        <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.4);border-radius:20px;padding:6px 18px;font-size:.72rem;color:#e8b84b;margin-bottom:24px;">🎖️ Rozet Kazanıldı</div>
        <br>
        <button id="celebClose" style="padding:10px 28px;background:#e8b84b;color:#060609;border:none;border-radius:6px;font-family:\'Space Mono\',monospace;font-size:.75rem;font-weight:bold;cursor:pointer;">Harika!</button>
    `;
    overlay.append(box);
    document.body.append(overlay);
    overlay.querySelector('#celebClose').onclick = () => overlay.remove();
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    if (!document.getElementById('celebKeyframes')) {
        const s = document.createElement('style'); s.id = 'celebKeyframes';
        s.textContent = '@keyframes celebIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}';
        document.head.append(s);
    }
}

function mk(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
}

function showModal(title, html, actions) {
    const overlay = mk('div','lab-modal-overlay');
    const box = mk('div','lab-modal');
    const closeBtn = mk('button','lab-modal-close','✕');
    closeBtn.onclick = () => overlay.remove();
    overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
    const h4 = mk('h4');h4.className='';h4.textContent=title;
    const body = mk('div'); body.innerHTML = html;
    const actDiv = mk('div','lab-modal-actions');
    (actions||[]).forEach(a => {
        const btn = mk('button','power-button',a.label);
        btn.onclick = () => { overlay.remove(); a.fn && a.fn(); };
        actDiv.append(btn);
    });
    const closeDefault = mk('button','wave-btn','Kapat');
    closeDefault.onclick = () => overlay.remove();
    actDiv.append(closeDefault);
    box.append(closeBtn, h4, body, actDiv);
    overlay.append(box);
    document.body.append(overlay);
}

function theoryCard(title, body, path) {
    const card = mk('div','theory-card');
    const btn  = mk('button','theory-toggle',
        `<span>💡 Ableton'da Nasıl?</span><span class="tc-arr">▼</span>`);
    const bd   = mk('div','theory-body',
        `<strong>${title}</strong><p style="margin-top:8px">${body}</p>` +
        (path ? `<div class="theory-ableton">📍 ${path}</div>` : ''));
    bd.style.display = 'none';
    btn.onclick = () => {
        const open = bd.style.display !== 'none';
        bd.style.display = open ? 'none' : 'block';
        btn.querySelector('.tc-arr').textContent = open ? '▼' : '▲';
    };
    card.append(btn, bd);
    return card;
}

function makeTaskPanel(mid) {
    const tasks  = TASKS[mid] || [];
    const panel  = mk('div','task-panel');
    const hdr    = mk('div','task-panel-header');
    const title  = mk('span','',`📋 Modül ${mid} Görevleri`);
    const pLabel = mk('span','task-progress-label','');
    hdr.append(title, pLabel);
    panel.append(hdr);

    const list = mk('div','task-list');
    tasks.forEach(task => {
        const item  = mk('div','task-item');
        const chk   = mk('span','task-check','○');
        const txt   = mk('span','task-text', task.text);
        item.append(chk, txt);
        const update = () => {
            const done = !!state.completedTasks[`${mid}-${task.id}`];
            item.classList.toggle('done', done);
            chk.textContent = done ? '✓' : '○';
        };
        update();
        item.onclick = () => { toggleTask(mid, task.id); update(); refreshBar(); };
        list.append(item);
    });
    panel.append(list);

    const bar  = mk('div','task-progress-bar');
    const fill = mk('div','task-progress-fill');
    bar.append(fill); panel.append(bar);

    function refreshBar() {
        const p = getProgress(mid);
        fill.style.width   = p + '%';
        pLabel.textContent = p + '%';
        // Show badge if 100%
        let badge = panel.querySelector('.module-complete-badge');
        if (p === 100) {
            if (!badge) {
                badge = mk('div','module-complete-badge');
                badge.style.cssText = 'display:inline-flex;align-items:center;gap:5px;background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.4);border-radius:12px;padding:4px 12px;font-size:.62rem;color:#e8b84b;margin-top:8px;';
                badge.textContent = '🏆 Modül Tamamlandı';
                panel.append(badge);
            }
        } else if (badge) { badge.remove(); }
    }
    refreshBar();
    return panel;
}

let _cleanup = null;
let _m1Update = null;
let _m3StopAudio = null;
let _m4StopAudio = null;
let _m5StopAudio = null;

const MODULE_NAV_ITEMS = [
    { mod: null, icon: '⌂',  label: 'Menü'        },
    { mod: 1,    icon: '🎹', label: 'Synth'        },
    { mod: 2,    icon: '🥁', label: 'Beat Maker'   },
    { mod: 3,    icon: '🎚️', label: 'Mixing'       },
    { mod: 5,    icon: '🎚', label: 'Mastering'    },
    { mod: 4,    icon: '🎵', label: 'Arrangement'  },
];

function updateModuleNav() {
    const nav = document.getElementById('moduleNav');
    if (!nav) return;
    nav.innerHTML = '';
    MODULE_NAV_ITEMS.forEach((item, i) => {
        if (i === 1) { const sep = mk('div','mnav-sep'); nav.append(sep); }
        const btn = mk('button','mnav-item');
        btn.innerHTML = `<span>${item.icon}</span><span>${item.label}</span>`;
        if (state.currentModule === item.mod) btn.classList.add('active');
        btn.onclick = () => navigate(item.mod);
        nav.append(btn);
    });
}

function navigate(mod) {
    if (_cleanup) { _cleanup(); _cleanup = null; }
    if (state.currentModule === 2 && mod !== 2) stopBeat(false);
    if (state.currentModule === 1) stopOsc();
    if (state.currentModule === 3 && _m3StopAudio) { _m3StopAudio(); _m3StopAudio = null; }
    if (state.currentModule === 4 && _m4StopAudio) { _m4StopAudio(); _m4StopAudio = null; }
    if (state.currentModule === 5 && _m5StopAudio) { _m5StopAudio(); _m5StopAudio = null; }
    state.currentModule = mod;
    render();
    updateModuleNav();
    window.scrollTo(0, 0);
}

const NOTES = [
    {freq:261.63, label:'C4', key:'A'}, {freq:293.66, label:'D4', key:'S'},
    {freq:329.63, label:'E4', key:'D'}, {freq:349.23, label:'F4', key:'F'},
    {freq:392.00, label:'G4', key:'G'}, {freq:440.00, label:'A4', key:'H'},
    {freq:493.88, label:'B4', key:'J'}, {freq:523.25, label:'C5', key:'K'},
];

function renderModule1() {
    const root = mk('div','container');
    root.append(mk('div','accent-bar'));
    const bk = mk('button','back-btn','← Ana Menü'); bk.onclick = ()=>navigate(null); root.append(bk);

    const shell = mk('div','synth-container');
    const hdr   = mk('div','synth-header','<h2>🎹 Analog Synthesizer</h2>');
    shell.append(hdr);

    // Oscilloscope
    const oscWrap = mk('div','oscilloscope-wrap','<span class="oscilloscope-label">OSCILLOSCOPE</span>');
    const cv = document.createElement('canvas');
    cv.className='oscilloscope'; cv.width=800; cv.height=110;
    oscWrap.append(cv); shell.append(oscWrap);
    requestAnimationFrame(() => startOsc(cv));

    // Presets
    const preS = mk('div');
    preS.innerHTML='<h3 style="font-size:.78rem;color:var(--dim);letter-spacing:.1em;margin-bottom:8px">⚡ HIZLI PRESET</h3>';
    const preRow = mk('div','preset-row');
    SYNTH_PRESETS.forEach(p => {
        const btn = mk('button', `preset-btn${state.activePreset===p.id?' active':''}`, p.name);
        btn.onclick = () => {
            state.waveform = p.wave; state.adsr = {...p.adsr};
            state.filter   = {...p.filter}; state.activePreset = p.id;
            if (filterNode) { filterNode.frequency.value=p.filter.cutoff; filterNode.Q.value=p.filter.resonance; }
            playNote(440, 0.8);
            if (_m1Update) _m1Update(); else navigate(1);
        };
        preRow.append(btn);
    });
    preS.append(preRow);

    // Cloud preset save/load row
    const presetCloudRow = mk('div','cloud-row'); presetCloudRow.style.marginTop='10px';
    function refreshPresetCloud() {
        presetCloudRow.innerHTML='';
        if (!currentUser) {
            const h=mk('span','cloud-hint','🔑 Preset kaydetmek için sağ üstten giriş yap');
            presetCloudRow.append(h); return;
        }
        const saveBtn = mk('button','genre-btn','💾 Preset Kaydet');
        saveBtn.onclick = async () => {
            const name = prompt('Preset adı:'); if(!name?.trim()) return;
            saveBtn.disabled=true; saveBtn.textContent='⏳';
            await saveUserPreset(name.trim());
            saveBtn.textContent='✓ Kaydedildi';
            setTimeout(()=>{ saveBtn.textContent='💾 Preset Kaydet'; saveBtn.disabled=false; refreshPresetCloud(); },1400);
        };
        const loadBtn = mk('button','genre-btn','📂 Presetlerim');
        let pList=null;
        loadBtn.onclick = async () => {
            if(pList){ pList.remove(); pList=null; return; }
            loadBtn.disabled=true; loadBtn.textContent='⏳';
            const presets = await loadUserPresets();
            loadBtn.textContent='📂 Presetlerim'; loadBtn.disabled=false;
            if(!presets.length){ showModal('Kayıtlı Preset Yok','<p>Henüz kayıtlı preset oluşturmadın. Synthesizer ayarlarını düzenleyip <strong>Preset Kaydet</strong> butonuna bas.</p>'); return; }
            pList=mk('div','saved-list');
            presets.forEach(p=>{
                const wrap=mk('div','saved-item-wrap');
                const b=mk('button','preset-btn',p.name);
                b.onclick=()=>{
                    state.waveform=p.wave; state.adsr={...p.adsr}; state.filter={...p.filter}; state.activePreset=null;
                    if(filterNode){filterNode.frequency.value=p.filter.cutoff;filterNode.Q.value=p.filter.resonance;}
                    playNote(440,0.8); if(_m1Update)_m1Update();
                    pList.remove(); pList=null;
                };
                const del=mk('button','saved-del','✕');
                del.onclick=async()=>{ await deleteUserPreset(p.id); wrap.remove(); };
                wrap.append(b,del); pList.append(wrap);
            });
            presetCloudRow.append(pList);
        };
        presetCloudRow.append(saveBtn,loadBtn);
    }
    refreshPresetCloud();
    preS.append(presetCloudRow); shell.append(preS);

    // ADSR Explanation + SVG
    const adsrExp = mk('div','adsr-explanation');
    adsrExp.innerHTML=`<h3 style="color:#e8b84b;margin-bottom:12px;font-family:'Bebas Neue',sans-serif;letter-spacing:.06em">📊 ADSR Zarfı — Ses Nasıl Şekillenir?</h3>
    <p style="margin-bottom:12px;line-height:1.6;font-size:.82rem"><strong>ADSR</strong> — sesin doğuşunu, yükselişini, tutunma seviyesini ve sönüşünü belirleyen zarf sistemi. Sliderları sürükle, eğriyi izle.</p>`;
    const svgWrap = mk('div'); adsrExp.append(svgWrap); shell.append(adsrExp);

    function adsrSvg() {
        const W=400, H=100, P=10;
        const {attack:A, decay:D, sustain:S, release:R} = state.adsr;
        const total = A+D+0.5+R;
        const tx = t => P+(t/total)*(W-P*2);
        const ty = l => H-P-l*(H-P*2);
        const pts = [[tx(0),ty(0)],[tx(A),ty(1)],[tx(A+D),ty(S)],[tx(A+D+.5),ty(S)],[tx(total),ty(0)]];
        const ln  = pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
        const ap=(A/total*100).toFixed(0)+'%', dp=((A+D)/total*100).toFixed(0)+'%', rp=((A+D+.5)/total*100).toFixed(0)+'%';
        svgWrap.innerHTML=`<svg viewBox="0 0 ${W} ${H+16}" style="width:100%;overflow:visible">
        <defs><linearGradient id="ag" x1="0" x2="1"><stop offset="0%" stop-color="#b82d45"/>
        <stop offset="${ap}" stop-color="#e8b84b"/><stop offset="${dp}" stop-color="#d4722a"/>
        <stop offset="${rp}" stop-color="#8fc8e8"/><stop offset="100%" stop-color="#b82d45"/></linearGradient></defs>
        ${[.25,.5,.75].map(l=>`<line x1="${P}" y1="${ty(l).toFixed(1)}" x2="${W-P}" y2="${ty(l).toFixed(1)}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`).join('')}
        <path d="${ln} L${pts[4][0].toFixed(1)} ${H} L${pts[0][0].toFixed(1)} ${H} Z" fill="rgba(232,184,75,.07)"/>
        <path d="${ln}" fill="none" stroke="url(#ag)" stroke-width="2" stroke-linejoin="round"/>
        ${pts.slice(1,-1).map(([cx,cy])=>`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.5" fill="#e8b84b" opacity=".85"/>`).join('')}
        <text x="${tx(A/2).toFixed(1)}" y="${H+14}" fill="#e8b84b" font-size="9" text-anchor="middle" font-family="Space Mono">A:${A.toFixed(2)}s</text>
        <text x="${tx(A+D/2).toFixed(1)}" y="${H+14}" fill="#d4722a" font-size="9" text-anchor="middle" font-family="Space Mono">D:${D.toFixed(2)}s</text>
        <text x="${tx(A+D+.25).toFixed(1)}" y="${H+14}" fill="#e8b84b" font-size="9" text-anchor="middle" font-family="Space Mono">S:${(S*100).toFixed(0)}%</text>
        <text x="${tx(A+D+.5+R/2).toFixed(1)}" y="${H+14}" fill="#8fc8e8" font-size="9" text-anchor="middle" font-family="Space Mono">R:${R.toFixed(2)}s</text>
        </svg>`;
    }
    adsrSvg();

    // Controls grid
    const grid = mk('div','controls-grid');

    // Waveform
    const wfGrp = mk('div','control-group');
    wfGrp.innerHTML=`<h3>🌊 Waveform — Dalga Tipi</h3><p style="font-size:.72rem;color:var(--dim);margin-bottom:10px;line-height:1.5">Her dalga farklı tını üretir. Sine en saf, Sawtooth en zengin harmonikli.</p>`;
    const wfSel = mk('div','waveform-selector');
    [{w:'sine',icon:'〜',desc:'Saf, yuvarlak'},{w:'square',icon:'⊓',desc:'Keskin, elektro'},
     {w:'sawtooth',icon:'⟋',desc:'Zengin, parlak'},{w:'triangle',icon:'△',desc:'Yumuşak, hollow'}]
    .forEach(({w,icon,desc}) => {
        const b = mk('button',`wave-btn${state.waveform===w?' active':''}`,
            `${icon}<br>${w}<br><small style="font-size:.55rem;opacity:.6">${desc}</small>`);
        b.onclick = () => {
            state.waveform=w; state.activePreset=null;
            wfSel.querySelectorAll('.wave-btn').forEach(x=>x.classList.remove('active'));
            b.classList.add('active');
        };
        wfSel.append(b);
    });
    wfGrp.append(wfSel); grid.append(wfGrp);

    // ADSR sliders — track elements for in-place preset updates
    const adsrValMap={}, adsrFmtMap={}, adsrSlMap={};
    [
        {key:'attack',  h:'⚡ Attack — Yükseliş', hint:'Sesin 0\'dan tam seviyeye çıkma süresi.', min:.01, max:2, step:.01, fmt:v=>v.toFixed(2)+'s', color:'var(--gold)'},
        {key:'decay',   h:'📉 Decay — Düşüş',    hint:'Zirveden sustain seviyesine iniş süresi.', min:.01, max:2, step:.01, fmt:v=>v.toFixed(2)+'s', color:'var(--amber)'},
        {key:'sustain', h:'🎚️ Sustain — Tutunma', hint:'Basılı tutulduğunda sesin kaldığı seviye.', min:0,   max:1, step:.01, fmt:v=>(v*100).toFixed(0)+'%', color:'var(--gold)'},
        {key:'release', h:'🔚 Release — Sönüş',  hint:'Bıraktıktan sonra sesin kapanma süresi.', min:.01, max:3, step:.01, fmt:v=>v.toFixed(2)+'s', color:'var(--ice)'},
    ].forEach(p => {
        const grp   = mk('div','control-group');
        const val   = mk('span','',p.fmt(state.adsr[p.key])); val.style.cssText=`color:${p.color};font-weight:bold`;
        adsrValMap[p.key]=val; adsrFmtMap[p.key]=p.fmt;
        const lbl   = mk('div','slider-label'); lbl.append(mk('span','','←'), val, mk('span','','→'));
        grp.innerHTML=`<h3>${p.h}</h3><p style="font-size:.72rem;color:var(--dim);margin-bottom:8px">${p.hint}</p>`;
        grp.append(lbl);
        const slEl = makeSlider({min:p.min, max:p.max, step:p.step, value:state.adsr[p.key],
            onChange: v => { state.adsr[p.key]=v; state.activePreset=null; val.textContent=p.fmt(v); adsrSvg(); }});
        adsrSlMap[p.key]=slEl;
        grp.append(slEl);
        grid.append(grp);
    });

    // Volume
    const volGrp = mk('div','control-group');
    const volVal = mk('span','', (state.volume*100).toFixed(0)+'%'); volVal.style.color='var(--gold)';
    const volLbl = mk('div','slider-label'); volLbl.append(mk('span','','Sessiz'), volVal, mk('span','','Yüksek'));
    volGrp.innerHTML='<h3>🔊 Volume</h3>';
    volGrp.append(volLbl, makeSlider({min:0, max:1, step:.01, value:state.volume,
        onChange: v => { state.volume=v; volVal.textContent=(v*100).toFixed(0)+'%'; }}));
    grid.append(volGrp);

    // Filter
    const filtGrp = mk('div','filter-section');
    filtGrp.innerHTML=`<h3>🎛 Filter — Frekans Filtresi</h3>
    <p style="font-size:.72rem;color:var(--dim);margin-bottom:12px;line-height:1.5">
    <strong>Cutoff</strong>: Kesme frekansı — düşük = koyu ses, yüksek = parlak ses.<br>
    <strong>Resonance</strong>: Cutoff frekansını vurgular — yüksek = "wah" efekti.</p>`;
    const filtGrid = mk('div','filter-grid');
    const cutVal = mk('span','', state.filter.cutoff>=1000?(state.filter.cutoff/1000).toFixed(1)+'kHz':state.filter.cutoff+'Hz');
    cutVal.style.color='var(--crimson)';
    const resVal = mk('span','', state.filter.resonance.toFixed(1)+' Q'); resVal.style.color='var(--crimson)';
    const cutDiv=mk('div'); const cutLbl=mk('div','slider-label'); cutLbl.append(mk('span','','Cutoff'), cutVal);
    const cutSlEl=makeSlider({min:80, max:18000, step:10, value:state.filter.cutoff,
        onChange:v=>{ state.filter.cutoff=v; state.activePreset=null;
            if(filterNode) filterNode.frequency.value=v;
            cutVal.textContent=v>=1000?(v/1000).toFixed(1)+'kHz':v+'Hz'; }});
    cutDiv.append(cutLbl, cutSlEl);
    const resDiv=mk('div'); const resLbl=mk('div','slider-label'); resLbl.append(mk('span','','Resonance'), resVal);
    const resSlEl=makeSlider({min:.1, max:20, step:.1, value:state.filter.resonance,
        onChange:v=>{ state.filter.resonance=v; state.activePreset=null;
            if(filterNode) filterNode.Q.value=v;
            resVal.textContent=v.toFixed(1)+' Q'; }});
    resDiv.append(resLbl, resSlEl);
    filtGrid.append(cutDiv, resDiv); filtGrp.append(filtGrid); grid.append(filtGrp);
    shell.append(grid);

    shell.append(theoryCard(
        "Synthesizer — Ableton'da Nerede?",
        "Ableton'da her MIDI track'e bir <strong>instrument</strong> (Analog, Operator, Wavetable) yüklenir. Bu instrumentlerin hepsinde ADSR zarfı ve filter bulunur. <strong>Analog</strong> bu subtractive synthesizer'ın birebir karşılığıdır. Cutoff ve Resonance → instrumentin kendi filter sekmesinde.",
        "Instruments → Analog / Operator / Wavetable → ADSR + Filter"
    ));

    shell.append(mk('div','hint-box','<strong>💡 Klavye:</strong> A S D F G H J K = C4 D4 E4 F4 G4 A4 B4 C5'));

    const kb = mk('div','keyboard');
    NOTES.forEach((note,i) => {
        const k = mk('div','key',`<div class="key-label">${note.label}<br><small>${note.key}</small></div>`);
        k.style.marginRight = i<NOTES.length-1 ? '4px' : '0';
        k.onpointerdown = () => { playNote(note.freq,.8); k.classList.add('playing'); setTimeout(()=>k.classList.remove('playing'),800); };
        kb.append(k);
    });
    shell.append(kb); root.append(shell);
    root.append(makeTaskPanel(1));

    const onKey = e => {
        if (e.repeat) return;
        const n = NOTES.find(x=>x.key===e.key.toUpperCase());
        if (!n) return;
        playNote(n.freq,.8);
        kb.querySelectorAll('.key').forEach((k,i)=>{ if(NOTES[i].key===e.key.toUpperCase()){k.classList.add('playing');setTimeout(()=>k.classList.remove('playing'),800);} });
    };
    window.addEventListener('keydown', onKey);

    // In-place UI updater — called on preset change to avoid full re-render
    _m1Update = () => {
        preRow.querySelectorAll('.preset-btn').forEach((b,i) => b.classList.toggle('active', SYNTH_PRESETS[i]?.id===state.activePreset));
        let wi=0; const waves=['sine','square','sawtooth','triangle'];
        wfSel.querySelectorAll('.wave-btn').forEach(b => b.classList.toggle('active', waves[wi++]===state.waveform));
        ['attack','decay','sustain','release'].forEach(key => {
            if(adsrSlMap[key]?._sliderObj) adsrSlMap[key]._sliderObj.update(state.adsr[key]);
            if(adsrValMap[key]) adsrValMap[key].textContent=adsrFmtMap[key](state.adsr[key]);
        });
        if(cutSlEl._sliderObj) cutSlEl._sliderObj.update(state.filter.cutoff);
        if(resSlEl._sliderObj) resSlEl._sliderObj.update(state.filter.resonance);
        cutVal.textContent=state.filter.cutoff>=1000?(state.filter.cutoff/1000).toFixed(1)+'kHz':state.filter.cutoff+'Hz';
        resVal.textContent=state.filter.resonance.toFixed(1)+' Q';
        adsrSvg();
    };

    _cleanup = () => { window.removeEventListener('keydown', onKey); stopOsc(); _m1Update = null; };
    return root;
}

// MODULE 2 — BEAT MAKER
// ═══════════════════════════════════════════════════════════════════
function renderModule2() {
    const root  = mk('div','container');
    root.append(mk('div','accent-bar'));
    const bk = mk('button','back-btn','← Ana Menü'); bk.onclick=()=>navigate(null); root.append(bk);

    const playBtn = mk('button','power-button','▶️ ÇAL');
    playBtn.onclick = () => {
        if (beatPlaying) { stopBeat(false); playBtn.textContent='▶️ ÇAL'; playBtn.classList.remove('active'); }
        else             { startBeat(); playBtn.textContent='⏸️ DURDUR'; playBtn.classList.add('active'); }

    // Genre templates
    const genS = mk('div');

    const genRow = mk('div','genre-row');
    let bpmInput, bpmSpan;
    GENRE_TEMPLATES.forEach(g => {
        const b = mk('button','genre-btn',`${g.name} <span style="opacity:.5;font-size:.6rem">${g.bpm}bpm</span>`);
        b.onclick = () => {
            state.beatPatterns = g.patterns.map(p=>[...p]);
            state.bpm = g.bpm;
            if (bpmInput) bpmInput.value = g.bpm;
            if (bpmSpan)  bpmSpan.textContent = g.bpm;
            renderGrid();
            if (beatPlaying) { stopBeat(true); startBeat(); }
        };
        genRow.append(b);
    });
    const clrBtn = mk('button','genre-btn','🗑 Temizle');
    clrBtn.onclick = () => { state.beatPatterns = BEAT_TRACKS.map(()=>new Array(16).fill(0)); renderGrid(); };
    genRow.append(clrBtn); genS.append(genRow); shell.append(genS);

    // BPM + Swing
    const tempo = mk('div'); tempo.style.cssText='display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:12px 0 8px';
    const bpmDiv = mk('div'); bpmDiv.style.cssText='display:flex;align-items:center;gap:10px';
    bpmSpan = mk('span','',state.bpm); bpmSpan.style.cssText='color:#e8b84b;font-weight:bold;min-width:32px'; bpmSpan.id='beat-bpm-span';

    bpmInput.type='range'; bpmInput.min=60; bpmInput.max=200; bpmInput.value=state.bpm;
    bpmInput.style.cssText='width:120px;accent-color:#e8b84b'; bpmInput.id='beat-bpm-input';
    bpmInput.oninput = () => { state.bpm=+bpmInput.value; bpmSpan.textContent=state.bpm; if(beatPlaying){stopBeat();startBeat();} };
    bpmDiv.append(mk('span','','BPM: '), bpmInput, bpmSpan);

    const swRow = mk('div','swing-row');
    const swVal = mk('span','swing-val',state.swing+'%');
    const swLbl = mk('span','',state.swing===0?'Düz':'Hafif Groove'); swLbl.style.cssText='font-size:.62rem;color:var(--dim);opacity:.6';
    const swInput = document.createElement('input');
    swInput.type='range'; swInput.min=0; swInput.max=50; swInput.value=state.swing;
    swInput.style.cssText='accent-color:#d4722a;flex:1';
    swInput.oninput = () => {
        state.swing=+swInput.value; swVal.textContent=state.swing+'%';

    const beatCloudRow = mk('div','cloud-row');

        beatCloudRow.innerHTML='';
        if (!currentUser) {
            const h=mk('span','cloud-hint','🔑 Beat kaydetmek için sağ üstten giriş yap');
            beatCloudRow.append(h); return;
        }
        const saveBtn = mk('button','genre-btn','💾 Beat Kaydet');
        saveBtn.onclick = async () => {
            const name = prompt('Bu beat\'e isim ver:'); if(!name?.trim()) return;
            // Reset scheduler after prompt() to prevent note burst (prompt freezes JS but AudioContext keeps running)
            if(beatCtx) beatNextTime = beatCtx.currentTime + 0.05;
            saveBtn.disabled=true; saveBtn.textContent='⏳';
            await saveBeat(name.trim());
            saveBtn.textContent='✓ Kaydedildi';
            setTimeout(()=>{ saveBtn.textContent='💾 Beat Kaydet'; saveBtn.disabled=false; },1400);
        };
        const loadBtn = mk('button','genre-btn','📂 Beatlerim');
        let bList=null;
        loadBtn.onclick = async () => {
            if(bList){ bList.remove(); bList=null; return; }
            loadBtn.disabled=true; loadBtn.textContent='⏳';
            const beats = await loadBeats();
            loadBtn.textContent='📂 Beatlerim'; loadBtn.disabled=false;
            if(!beats.length){ showModal('Kayıtlı Beat Yok','<p>Henüz kayıtlı beat oluşturmadın. Step sequencer\'da bir pattern kur, sonra <strong>💾 Beat Kaydet</strong> butonuna bas.</p>'); return; }
            bList=mk('div','saved-list');
            beats.forEach(b=>{
                const wrap=mk('div','saved-item-wrap');
                const btn=mk('button','genre-btn',b.name);
                btn.onclick=()=>{
                    state.beatPatterns=b.patterns.map(p=>[...p]);
                    state.bpm=b.bpm; state.swing=b.swing||0;
                    if(bpmInput) bpmInput.value=state.bpm;
                    if(bpmSpan)  bpmSpan.textContent=state.bpm;
                    renderGrid();
                    if(beatPlaying){ stopBeat(true); startBeat(); }
                    bList.remove(); bList=null;
                };
                const del=mk('button','saved-del','✕');
                del.onclick=async()=>{ await deleteBeat(b.id); wrap.remove(); };
                wrap.append(btn,del); bList.append(wrap);
            });
            beatCloudRow.append(bList);
        };
        beatCloudRow.append(saveBtn,loadBtn);
    }
