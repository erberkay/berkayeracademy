<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkay Er — Ableton Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --black:#060609; --deep:#0c0c16; --panel:#111120;
            --gold:#e8b84b;  --amber:#d4722a; --crimson:#b82d45;
            --ice:#8fc8e8;   --white:#eeebe6; --mid:#2a2a45;
            --dim:rgba(238,235,230,0.45);
        }
        body { font-family:'Space Mono',monospace; background:var(--black); color:var(--white); min-height:100vh; overflow-x:hidden; }
        body::before {
            content:''; position:fixed; inset:0;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events:none; z-index:0;
        }
        #scrollProgress { position:fixed; top:0; left:0; height:3px; width:0; background:linear-gradient(90deg,var(--crimson),var(--amber),var(--gold)); z-index:100; transition:width .1s; }
        .container { max-width:1400px; margin:0 auto; padding:24px; position:relative; z-index:1; }
        .accent-bar { height:4px; background:linear-gradient(90deg,var(--crimson),var(--amber),var(--gold)); animation:shimmer 4s ease-in-out infinite alternate; }
        @keyframes shimmer { from{filter:brightness(1)} to{filter:brightness(1.5)} }
        @keyframes fadeUp  { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

        /* ── Header ── */
        .header { background:var(--deep); padding:28px 32px; margin-bottom:28px; border:1px solid var(--mid); border-top:none; animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both; }
        .header h1 { font-family:'Bebas Neue',sans-serif; color:var(--gold); font-size:clamp(2rem,5vw,3.2rem); letter-spacing:.04em; margin-bottom:6px; }
        .header p  { color:var(--dim); font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; }

        /* ── Module grid ── */
        .module-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-top:20px; }
        .module-card { background:var(--deep); border:1px solid var(--mid); padding:20px; border-radius:2px; cursor:pointer; position:relative; overflow:hidden; transition:border-color .2s,transform .2s; animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both; }
        .module-card:hover { border-color:var(--gold); transform:translateY(-2px); }
        .module-card-num { position:absolute; right:12px; bottom:8px; font-family:'Bebas Neue',sans-serif; font-size:3.5rem; color:rgba(255,255,255,.04); line-height:1; pointer-events:none; }
        .module-card-status { display:inline-block; font-size:.62rem; padding:3px 8px; border-radius:2px; margin-top:10px; letter-spacing:.08em; text-transform:uppercase; }
        .status-done  { background:rgba(100,200,100,.15); color:#6fc; border:1px solid rgba(100,200,100,.3); }
        .status-active{ background:rgba(232,184,75,.12);  color:var(--gold); border:1px solid rgba(232,184,75,.3); }
        .status-idle  { background:rgba(255,255,255,.06); color:var(--dim); border:1px solid rgba(255,255,255,.1); }

        /* ── Synth shell ── */
        .synth-container { background:var(--deep); border:1px solid var(--mid); padding:24px; margin-top:20px; animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both; }
        .synth-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
        .synth-header h2 { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.5rem,3vw,2rem); color:var(--gold); letter-spacing:.05em; }
        .back-btn { background:none; border:1px solid var(--mid); color:var(--dim); padding:8px 16px; font-family:'Space Mono',monospace; font-size:.75rem; cursor:pointer; letter-spacing:.08em; margin:8px 0; transition:border-color .2s,color .2s; }
        .back-btn:hover { border-color:var(--gold); color:var(--gold); }
        .power-button { background:var(--mid); border:none; color:var(--white); padding:10px 20px; font-family:'Space Mono',monospace; font-size:.78rem; cursor:pointer; letter-spacing:.1em; transition:background .2s; }
        .power-button.active { background:var(--crimson); }
        .power-button:hover { filter:brightness(1.2); }

        /* ── Controls grid ── */
        .controls-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin:16px 0; }
        .control-group { background:rgba(255,255,255,.03); border:1px solid var(--mid); padding:16px; border-radius:4px; }
        .control-group h3 { color:var(--gold); font-size:.82rem; margin-bottom:10px; letter-spacing:.05em; }
        .slider-label { display:flex; justify-content:space-between; margin-bottom:8px; font-size:.72rem; color:var(--dim); }
        .hint-box { background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.2); border-left:3px solid var(--gold); padding:12px 16px; font-size:.75rem; color:var(--dim); margin:16px 0; line-height:1.6; }

        /* ── Custom slider ── */
        .adsr-track { position:relative; height:24px; display:flex; align-items:center; cursor:pointer; touch-action:none; user-select:none; margin:4px 0; }
        .adsr-track::before { content:''; position:absolute; left:0; right:0; height:4px; background:var(--mid); border-radius:2px; pointer-events:none; }
        .adsr-track:hover .adsr-thumb { box-shadow:0 0 14px rgba(232,184,75,.8); transform:translate(-50%,-50%) scale(1.2); }
        .adsr-fill { position:absolute; left:0; top:50%; transform:translateY(-50%); height:4px; background:linear-gradient(90deg,var(--amber),var(--gold)); border-radius:2px; pointer-events:none; }
        .adsr-thumb { position:absolute; top:50%; transform:translate(-50%,-50%); width:16px; height:16px; border-radius:50%; background:var(--gold); box-shadow:0 0 8px rgba(232,184,75,.5); pointer-events:none; transition:box-shadow .15s,transform .15s; }

        /* ── Waveform selector ── */
        .waveform-selector { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
        .wave-btn { background:var(--panel); border:1px solid var(--mid); color:var(--dim); padding:10px 8px; cursor:pointer; font-family:'Space Mono',monospace; font-size:.75rem; letter-spacing:.06em; transition:all .15s; line-height:1.4; }
        .wave-btn:hover,.wave-btn.active { background:rgba(232,184,75,.1); border-color:var(--gold); color:var(--gold); }

        /* ── Keyboard ── */
        .keyboard { display:flex; gap:4px; margin-top:16px; }
        .key { flex:1; background:var(--white); border:2px solid #aaa; height:80px; cursor:pointer; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px; border-radius:0 0 4px 4px; transition:background .1s,transform .1s; min-width:0; }
        .key:hover { background:#f0e8d0; }
        .key.playing { background:var(--gold); transform:scaleY(.95); }
        .key-label { font-size:.65rem; color:#333; text-align:center; line-height:1.3; font-family:'Space Mono',monospace; }

        /* ── ADSR explanation ── */
        .adsr-explanation { background:rgba(255,255,255,.03); border:1px solid var(--mid); padding:20px; margin:16px 0; }

        /* ── Oscilloscope ── */
        .oscilloscope-wrap { margin:0 0 16px; border:1px solid var(--mid); border-radius:6px; overflow:hidden; position:relative; }
        .oscilloscope-label { position:absolute; top:6px; left:10px; font-size:.58rem; letter-spacing:.12em; color:rgba(232,184,75,.4); text-transform:uppercase; pointer-events:none; z-index:1; }
        canvas.oscilloscope { display:block; width:100%; height:80px; background:#060609; }

        /* ── Preset buttons ── */
        .preset-row { display:flex; flex-wrap:wrap; gap:7px; margin:4px 0 16px; }
        .preset-btn { background:var(--deep); border:1px solid var(--mid); color:var(--dim); padding:7px 13px; border-radius:4px; font-family:'Space Mono',monospace; font-size:.68rem; cursor:pointer; transition:border-color .15s,color .15s,box-shadow .15s; letter-spacing:.04em; }
        .preset-btn:hover,.preset-btn.active { border-color:var(--gold); color:var(--gold); box-shadow:0 0 8px rgba(232,184,75,.25); }

        /* ── Filter section ── */
        .filter-section { background:rgba(184,45,69,.06); border:1px solid rgba(184,45,69,.25); border-radius:6px; padding:14px; margin:8px 0; grid-column:1/-1; }
        .filter-section h3 { color:var(--crimson); margin-bottom:10px; font-size:.85rem; }
        .filter-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

        /* ── Theory card ── */
        .theory-card { background:rgba(8,8,18,.9); border:1px solid rgba(232,184,75,.18); border-left:3px solid var(--gold); border-radius:4px; margin:14px 0; overflow:hidden; }
        .theory-toggle { width:100%; background:none; border:none; color:rgba(232,184,75,.8); font-family:'Space Mono',monospace; font-size:.72rem; padding:11px 14px; text-align:left; cursor:pointer; display:flex; justify-content:space-between; letter-spacing:.06em; }
        .theory-toggle:hover { background:rgba(232,184,75,.04); }
        .theory-body { padding:12px 14px; font-size:.75rem; line-height:1.7; color:var(--dim); border-top:1px solid rgba(232,184,75,.1); }
        .theory-body strong { color:var(--white); }
        .theory-ableton { margin-top:10px; padding:8px 11px; background:rgba(232,184,75,.06); border-radius:3px; font-size:.68rem; color:var(--gold); letter-spacing:.04em; }

        /* ── Genre templates ── */
        .genre-row { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
        .genre-btn { background:var(--deep); border:1px solid var(--mid); color:var(--dim); padding:7px 13px; border-radius:4px; font-family:'Space Mono',monospace; font-size:.68rem; cursor:pointer; transition:border-color .15s,color .15s; letter-spacing:.04em; }
        .genre-btn:hover { border-color:var(--amber); color:var(--amber); }

        /* ── Swing row ── */
        .swing-row { display:flex; align-items:center; gap:12px; font-size:.72rem; color:var(--dim); }
        .swing-row label { white-space:nowrap; min-width:60px; }
        .swing-val { min-width:36px; color:var(--gold); font-weight:bold; }

        /* ── Beat grid ── */
        .beat-grid-wrap { overflow-x:auto; margin:16px 0; }
        .beat-grid { min-width:640px; }
        .beat-row { display:grid; grid-template-columns:80px repeat(16,1fr); gap:3px; margin-bottom:3px; }
        .beat-cell { position:relative; aspect-ratio:1; border-radius:5px; cursor:ns-resize; overflow:hidden; user-select:none; transition:transform .08s; }

        /* ── Task panel ── */
        .task-panel { background:var(--deep); border:1px solid var(--mid); padding:20px; margin-top:20px; animation:fadeUp .8s cubic-bezier(.16,1,.3,1) both; }
        .task-panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .task-panel-header span:first-child { color:var(--gold); font-size:.85rem; letter-spacing:.08em; }
        .task-progress-label { color:var(--dim); font-size:.72rem; }
        .task-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
        .task-item { display:flex; align-items:flex-start; gap:10px; padding:10px 12px; background:rgba(255,255,255,.03); border:1px solid var(--mid); border-radius:4px; cursor:pointer; transition:border-color .15s,background .15s; font-size:.75rem; line-height:1.5; }
        .task-item:hover { border-color:rgba(232,184,75,.3); background:rgba(232,184,75,.04); }
        .task-item.done { background:rgba(100,200,100,.06); border-color:rgba(100,200,100,.25); }
        .task-check { color:var(--dim); min-width:16px; font-size:.9rem; }
        .task-item.done .task-check { color:#6fc; }
        .task-text { color:var(--dim); }
        .task-item.done .task-text { color:rgba(100,200,100,.7); text-decoration:line-through; }
        .task-progress-bar { height:4px; background:var(--mid); border-radius:2px; overflow:hidden; }
        .task-progress-fill { height:100%; background:linear-gradient(90deg,var(--crimson),var(--amber),var(--gold)); border-radius:2px; transition:width .4s cubic-bezier(.16,1,.3,1); }

        /* ── Mixer theory cards ── */
        .mix-concept-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-top:14px; }
        .mix-concept { background:rgba(255,255,255,.03); border:1px solid var(--mid); border-radius:4px; padding:14px; }
        .mix-concept strong { color:var(--gold); display:block; margin-bottom:6px; font-size:.8rem; }
        .mix-concept p { color:var(--dim); font-size:.72rem; line-height:1.6; }

        /* ── Arrangement sections ── */
        .arr-section { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:4px; margin-bottom:8px; }

        @media(max-width:600px) {
            .controls-grid { grid-template-columns:1fr; }
            .filter-grid { grid-template-columns:1fr; }
            .keyboard .key { height:60px; }
        }
    </style>
</head>
<body>
<div id="scrollProgress"></div>
<div id="app"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════
// STATE — единый источник правды, plain JS object
// ═══════════════════════════════════════════════════════════════════
const state = {
    currentModule: null,
    waveform: 'sine',
    adsr: { attack:0.1, decay:0.2, sustain:0.7, release:0.3 },
    volume: 0.3,
    filter: { cutoff:8000, resonance:1 },
    activePreset: null,
    beatPatterns: Array.from({length:5}, () => new Array(16).fill(0)),
    beatVolumes: [80,80,80,80,80],
    bpm: 120,
    swing: 0,
    completedTasks: {},
};
try { state.completedTasks = JSON.parse(localStorage.getItem('berkay_tasks') || '{}'); } catch {}

// ═══════════════════════════════════════════════════════════════════
// AUDIO — SYNTH  (persistent filter + analyser)
// ═══════════════════════════════════════════════════════════════════
let synthCtx = null, filterNode = null, analyserNode = null;

function getSynthCtx() {
    if (!synthCtx) {
        synthCtx = new (window.AudioContext || window.webkitAudioContext)();
        filterNode   = synthCtx.createBiquadFilter();
        filterNode.type = 'lowpass';
        filterNode.frequency.value = state.filter.cutoff;
        filterNode.Q.value         = state.filter.resonance;
        analyserNode = synthCtx.createAnalyser();
        analyserNode.fftSize = 2048;
        filterNode.connect(analyserNode);
        analyserNode.connect(synthCtx.destination);
    }
    if (synthCtx.state === 'suspended') synthCtx.resume();
    return synthCtx;
}

function playNote(freq, dur = 0.8) {
    const ctx  = getSynthCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type           = state.waveform;
    osc.frequency.value= freq;
    const now = ctx.currentTime;
    const {attack, decay, sustain, release} = state.adsr;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(state.volume, now + attack);
    gain.gain.linearRampToValueAtTime(state.volume * sustain, now + attack + decay);
    gain.gain.setValueAtTime(state.volume * sustain, now + Math.max(attack + decay, dur - release));
    gain.gain.linearRampToValueAtTime(0.0001, now + dur);
    osc.connect(gain);
    gain.connect(filterNode || ctx.destination);
    osc.start(now);
    osc.stop(now + dur + 0.05);
}

// ═══════════════════════════════════════════════════════════════════
// AUDIO — BEAT ENGINE  (AudioContext lookahead scheduler — no setInterval jank)
// ═══════════════════════════════════════════════════════════════════
let beatCtx = null, beatBuffers = {};
let beatTimerID = null, beatStep = 0, beatNextTime = 0, beatPlaying = false;

const BEAT_TRACKS = [
    { name:'Kick',      emoji:'🟠', file:'Kick.wav',         color:'#e8b84b' },
    { name:'Snare',     emoji:'⚪', file:'Snare.wav',        color:'#00aaff' },
    { name:'Close Hat', emoji:'🟡', file:'Close Hat.wav',    color:'#ffd700' },
    { name:'Open Hat',  emoji:'🟢', file:'Open Hat (1).wav', color:'#00ff88' },
    { name:'Bass',      emoji:'🔵', file:'bass.wav',         color:'#a855f7' },
];

function getBeatCtx() {
    if (!beatCtx) {
        beatCtx = new (window.AudioContext || window.webkitAudioContext)();
        BEAT_TRACKS.forEach(t => {
            fetch(t.file).then(r=>r.arrayBuffer()).then(ab=>beatCtx.decodeAudioData(ab))
                         .then(buf=>{ beatBuffers[t.file]=buf; }).catch(()=>{});
        });
    }
    if (beatCtx.state === 'suspended') beatCtx.resume();
    return beatCtx;
}

function synthDrum(ctx, file, v, when) {
    const g = ctx.createGain(); g.connect(ctx.destination);
    const lc = file.toLowerCase();
    if (lc.includes('kick')) {
        const o = ctx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(150, when);
        o.frequency.exponentialRampToValueAtTime(0.001, when + 0.4);
        g.gain.setValueAtTime(v, when); g.gain.exponentialRampToValueAtTime(0.001, when + 0.4);
        o.connect(g); o.start(when); o.stop(when + 0.4);
    } else if (lc.includes('snare')) {
        const buf = ctx.createBuffer(1, ctx.sampleRate*0.12, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0; i<d.length; i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
        const src = ctx.createBufferSource(); src.buffer=buf;
        const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=500;
        g.gain.setValueAtTime(v,when); g.gain.exponentialRampToValueAtTime(0.001,when+0.12);
        src.connect(f); f.connect(g); src.start(when);
    } else if (lc.includes('hat')) {
        const dur = lc.includes('open') ? 0.18 : 0.06;
        const buf = ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i=0; i<d.length; i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
        const src = ctx.createBufferSource(); src.buffer=buf;
        const f = ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=8000;
        g.gain.setValueAtTime(v*0.45,when); g.gain.exponentialRampToValueAtTime(0.001,when+dur);
        src.connect(f); f.connect(g); src.start(when);
    } else if (lc.includes('bass')) {
        const o = ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=80;
        const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=280;
        g.gain.setValueAtTime(v*0.6,when); g.gain.exponentialRampToValueAtTime(0.001,when+0.25);
        o.connect(f); f.connect(g); o.start(when); o.stop(when+0.25);
    }
}

function scheduleStep(step, when) {
    const ctx   = getBeatCtx();
    const swing = step % 2 === 1 ? (state.swing/100) * (60/state.bpm/4) * 0.66 : 0;
    const t     = when + swing;
    BEAT_TRACKS.forEach((track, ti) => {
        const vel = state.beatPatterns[ti][step];
        if (vel <= 0) return;
        const v = (state.beatVolumes[ti]/100) * (vel/100);
        const buf = beatBuffers[track.file];
        if (buf) {
            const src  = ctx.createBufferSource(); src.buffer = buf;
            const gain = ctx.createGain(); gain.gain.value = v;
            src.connect(gain); gain.connect(ctx.destination); src.start(t);
        } else {
            synthDrum(ctx, track.file, v, t);
        }
    });
    // Visual step highlight via timeout offset
    const ctx2 = beatCtx;
    const delay = Math.max(0, (t - ctx2.currentTime) * 1000);
    const s = step;
    setTimeout(() => { if (beatPlaying) highlightStep(s); }, delay);
}

function beatScheduler() {
    const ctx = getBeatCtx();
    const spb = 60 / state.bpm / 4;          // seconds per 16th
    while (beatNextTime < ctx.currentTime + 0.12) {
        scheduleStep(beatStep, beatNextTime);
        beatNextTime += spb;
        beatStep = (beatStep + 1) % 16;
    }
    beatTimerID = setTimeout(beatScheduler, 20);
}

function startBeat() {
    if (beatPlaying) return;
    const ctx = getBeatCtx();
    beatPlaying  = true;
    beatStep     = 0;
    beatNextTime = ctx.currentTime + 0.05;
    beatScheduler();
}

function stopBeat() {
    beatPlaying = false;
    if (beatTimerID) { clearTimeout(beatTimerID); beatTimerID = null; }
    highlightStep(-1);
}

function highlightStep(active) {
    document.querySelectorAll('.beat-cell').forEach(c => {
        const step = +c.dataset.step, ti = +c.dataset.ti;
        const vel  = state.beatPatterns[ti][step];
        c.style.transform = step === active ? 'scale(1.12)' : 'scale(1)';
        c.style.borderWidth = step === active ? '2px' : '1px';
        c.style.borderColor = step === active ? '#fff'
            : vel > 0 ? BEAT_TRACKS[ti].color+'66' : 'rgba(255,255,255,.1)';
    });
}

// ═══════════════════════════════════════════════════════════════════
// OSCILLOSCOPE
// ═══════════════════════════════════════════════════════════════════
let oscRafId = null;

function stopOsc() { if (oscRafId) { cancelAnimationFrame(oscRafId); oscRafId = null; } }

function startOsc(canvas) {
    stopOsc();
    const c = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    function draw() {
        oscRafId = requestAnimationFrame(draw);
        c.fillStyle = '#060609'; c.fillRect(0,0,W,H);
        if (!analyserNode) {
            c.strokeStyle='rgba(42,42,69,.6)'; c.lineWidth=1;
            c.beginPath(); c.moveTo(0,H/2); c.lineTo(W,H/2); c.stroke(); return;
        }
        const data = new Uint8Array(analyserNode.frequencyBinCount);
        analyserNode.getByteTimeDomainData(data);
        c.strokeStyle='#e8b84b'; c.lineWidth=2;
        c.shadowColor='#e8b84b'; c.shadowBlur=4;
        c.beginPath();
        const sw = W / data.length;
        for (let i=0; i<data.length; i++) {
            const x=i*sw, y=(data[i]/128)*(H/2);
            i===0 ? c.moveTo(x,y) : c.lineTo(x,y);
        }
        c.stroke(); c.shadowBlur=0;
    }
    draw();
}

// ═══════════════════════════════════════════════════════════════════
// CUSTOM SLIDER  (pure pointer events, zero framework overhead)
// ═══════════════════════════════════════════════════════════════════
// Shared window handlers — attached once
const _sliders = new Set();
window.addEventListener('pointermove', e => {
    _sliders.forEach(s => s._move(e));
}, {passive:true});
window.addEventListener('pointerup',     e => { _sliders.forEach(s => s._up(e)); });
window.addEventListener('pointercancel', e => { _sliders.forEach(s => s._up(e)); });

function makeSlider({min, max, step, value, onChange}) {
    const wrap  = document.createElement('div'); wrap.className = 'adsr-track';
    const fill  = document.createElement('div'); fill.className  = 'adsr-fill';
    const thumb = document.createElement('div'); thumb.className = 'adsr-thumb';
    wrap.append(fill, thumb);

    let dragging = false;
    const clamp = v => Math.max(min, Math.min(max, v));
    const snap  = v => Math.round(v / step) * step;
    const pctOf = v => (v - min) / (max - min);

    function render(v) {
        const pct = pctOf(clamp(v)) * 100;
        fill.style.width  = pct + '%';
        thumb.style.left  = pct + '%';
    }
    render(value);

    function fromX(clientX) {
        const r = wrap.getBoundingClientRect();
        return clamp(snap(min + Math.max(0, Math.min(1, (clientX - r.left) / r.width)) * (max - min)));
    }

    wrap.addEventListener('pointerdown', e => {
        e.preventDefault();
        wrap.setPointerCapture(e.pointerId);
        dragging = true;
        const v = fromX(e.clientX); render(v); onChange(v);
    });

    const obj = {
        _move(e) { if (!dragging) return; const v=fromX(e.clientX); render(v); onChange(v); },
        _up()   { dragging = false; },
        update(v) { render(v); },
        el: wrap,
    };
    _sliders.add(obj);
    wrap._sliderObj = obj;
    return wrap;
}

function getProgress(mid) {
    const tasks = TASKS[mid] || [];
    if (!tasks.length) return 0;
    return Math.round(tasks.filter(t => state.completedTasks[`${mid}-${t.id}`]).length / tasks.length * 100);
}
function toggleTask(mid, tid) {
    const k = `${mid}-${tid}`;
    state.completedTasks[k] = !state.completedTasks[k];
    localStorage.setItem('berkay_tasks', JSON.stringify(state.completedTasks));
}

function mk(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
}

function theoryCard(title, body, path) {
    const card = mk('div','theory-card');
    const btn  = mk('button','theory-toggle',
        `<span>💡 Ableton'da Nasıl?</span><span class="tc-arr">▼</span>`);
    const bd   = mk('div','theory-body',
        `<strong>${title}</strong><p style="margin-top:8px">${body}</p>` +
        (path ? `<div class="theory-ableton">📍 ${path}</div>` : ''));
    bd.style.display = 'none';
    btn.onclick = () => {
        const open = bd.style.display !== 'none';
        bd.style.display = open ? 'none' : 'block';
        btn.querySelector('.tc-arr').textContent = open ? '▼' : '▲';
    };
    card.append(btn, bd);

}

function makeTaskPanel(mid) {
    const tasks  = TASKS[mid] || [];
    const panel  = mk('div','task-panel');
    const hdr    = mk('div','task-panel-header');
    const title  = mk('span','',`📋 Modül ${mid} Görevleri`);
    const pLabel = mk('span','task-progress-label','');
    hdr.append(title, pLabel);
    panel.append(hdr);

    const list = mk('div','task-list');
    tasks.forEach(task => {
        const item  = mk('div','task-item');
        const chk   = mk('span','task-check','○');
        const txt   = mk('span','task-text', task.text);
        item.append(chk, txt);
        const update = () => {
            const done = !!state.completedTasks[`${mid}-${task.id}`];
            item.classList.toggle('done', done);
            chk.textContent = done ? '✓' : '○';
        };
        update();
        item.onclick = () => { toggleTask(mid, task.id); update(); refreshBar(); };
        list.append(item);
    });
    panel.append(list);

    const bar  = mk('div','task-progress-bar');
    const fill = mk('div','task-progress-fill');
    bar.append(fill); panel.append(bar);

    function refreshBar() {
        const p = getProgress(mid);
        fill.style.width   = p + '%';
        pLabel.textContent = p + '%';
    }
    refreshBar();
    return panel;
}

    const onKey = e => {
        if (e.repeat) return;
        const n = NOTES.find(x=>x.key===e.key.toUpperCase());
        if (!n) return;
        playNote(n.freq,.8);
        kb.querySelectorAll('.key').forEach((k,i)=>{ if(NOTES[i].key===e.key.toUpperCase()){k.classList.add('playing');setTimeout(()=>k.classList.remove('playing'),800);} });
    };
    window.addEventListener('keydown', onKey);
    _cleanup = () => { window.removeEventListener('keydown', onKey); stopOsc(); };
    return root;
}

// ═══════════════════════════════════════════════════════════════════
// MODULE 2 — BEAT MAKER
// ═══════════════════════════════════════════════════════════════════
function renderModule2() {
    const root  = mk('div','container');
    root.append(mk('div','accent-bar'));
    const bk = mk('button','back-btn','← Ana Menü'); bk.onclick=()=>navigate(null); root.append(bk);

    const shell = mk('div','synth-container');
    const hdr   = mk('div','synth-header','<h2>🥁 Beat Maker — Step Sequencer</h2>');
    const playBtn = mk('button','power-button','▶️ ÇAL');
    playBtn.onclick = () => {
        if (beatPlaying) { stopBeat(); playBtn.textContent='▶️ ÇAL'; playBtn.classList.remove('active'); }
        else             { startBeat(); playBtn.textContent='⏸️ DURDUR'; playBtn.classList.add('active'); }
    };
    hdr.append(playBtn); shell.append(hdr);

    // Genre templates
    const genS = mk('div');
    genS.innerHTML=`<h3 style="font-size:.78rem;color:var(--dim);letter-spacing:.1em;margin-bottom:8px">🎵 TARZ ŞABLONU</h3>
    <p style="font-size:.72rem;color:var(--dim);margin-bottom:10px;line-height:1.5;opacity:.7">Yükle, dinle, değiştir. Her tarzın ritim grameri farklıdır.</p>`;
    const genRow = mk('div','genre-row');
    let bpmInput, bpmSpan;
    GENRE_TEMPLATES.forEach(g => {
        const b = mk('button','genre-btn',`${g.name} <span style="opacity:.5;font-size:.6rem">${g.bpm}bpm</span>`);
        b.onclick = () => {
            state.beatPatterns = g.patterns.map(p=>[...p]);
            state.bpm = g.bpm;
            if (bpmInput) bpmInput.value = g.bpm;
            if (bpmSpan)  bpmSpan.textContent = g.bpm;
            renderGrid();
            if (beatPlaying) { stopBeat(); startBeat(); }
        };
        genRow.append(b);
    });
    const clrBtn = mk('button','genre-btn','🗑 Temizle');
    clrBtn.onclick = () => { state.beatPatterns = BEAT_TRACKS.map(()=>new Array(16).fill(0)); renderGrid(); };
    genRow.append(clrBtn); genS.append(genRow); shell.append(genS);

    // BPM + Swing
    const tempo = mk('div'); tempo.style.cssText='display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin:12px 0 8px';
    const bpmDiv = mk('div'); bpmDiv.style.cssText='display:flex;align-items:center;gap:10px';
    bpmSpan = mk('span','',state.bpm); bpmSpan.style.cssText='color:#e8b84b;font-weight:bold;min-width:32px';
    bpmInput = document.createElement('input');
    bpmInput.type='range'; bpmInput.min=60; bpmInput.max=200; bpmInput.value=state.bpm;
    bpmInput.style.cssText='width:120px;accent-color:#e8b84b';
    bpmInput.oninput = () => { state.bpm=+bpmInput.value; bpmSpan.textContent=state.bpm; if(beatPlaying){stopBeat();startBeat();} };
    bpmDiv.append(mk('span','','BPM: '), bpmInput, bpmSpan);

    const swRow = mk('div','swing-row');
    const swVal = mk('span','swing-val',state.swing+'%');
    const swLbl = mk('span','',state.swing===0?'Düz':'Hafif Groove'); swLbl.style.cssText='font-size:.62rem;color:var(--dim);opacity:.6';
    const swInput = document.createElement('input');
    swInput.type='range'; swInput.min=0; swInput.max=50; swInput.value=state.swing;
    swInput.style.cssText='accent-color:#d4722a;flex:1';
    swInput.oninput = () => {
        state.swing=+swInput.value; swVal.textContent=state.swing+'%';
        swLbl.textContent=state.swing===0?'Düz':state.swing<20?'Hafif Groove':state.swing<35?'Belirgin Swing':'Ağır Groove';
    };
    swRow.append(mk('label','','Swing:'), swInput, swVal, swLbl);
    tempo.append(bpmDiv, swRow); shell.append(tempo);
    shell.append(mk('div','hint-box','<strong>💡</strong> Tıkla = aç/kapat &nbsp;|&nbsp; Yukarı sürükle = velocity &nbsp;|&nbsp; Satır ismi = önizle'));

    // Beat grid
    const gridWrap = mk('div','beat-grid-wrap');
    shell.append(gridWrap);
    let dragState=null, rafDrag=null;

    function renderGrid() {
        gridWrap.innerHTML='';
        const table = mk('div','beat-grid');
        // Header row (bar numbers)
        const hrow = mk('div','beat-row');
        hrow.append(mk('div'));
        for (let i=0;i<16;i++) {
            const n = mk('div','',i%4===0?String(i/4+1):'');
            n.style.cssText=`text-align:center;font-size:.55rem;color:${i%4===0?'rgba(232,184,75,.6)':'rgba(255,255,255,.2)'}`;
            hrow.append(n);
        }
        table.append(hrow);
        BEAT_TRACKS.forEach((track,ti) => {
            const row = mk('div','beat-row');
            const lbl = mk('div','',`${track.emoji} ${track.name}`);
            lbl.style.cssText=`display:flex;align-items:center;gap:4px;font-size:.65rem;color:${track.color};cursor:pointer;padding-right:4px;white-space:nowrap`;
            lbl.title='Önizle';
            lbl.onclick=()=>{ const ctx=getBeatCtx(); synthDrum(ctx,track.file,.7,ctx.currentTime); };
            row.append(lbl);
            for (let bi=0;bi<16;bi++) {
                const vel = state.beatPatterns[ti][bi];
                const cell = mk('div','beat-cell');
                cell.dataset.ti=ti; cell.dataset.step=bi;
                const opacity = vel>0 ? .3+(vel/100)*.7 : 0;
                const hex     = vel>0 ? Math.round(opacity*255).toString(16).padStart(2,'0') : '';
                cell.style.cssText=`background:${vel>0?track.color+hex:bi%4===0?'rgba(255,255,255,.07)':'rgba(255,255,255,.03)'};border:1px solid ${vel>0?track.color+'66':'rgba(255,255,255,.1)'}`;
                const vbar = mk('div'); vbar.dataset.vbar='';
                vbar.style.cssText=`position:absolute;bottom:0;left:0;width:${vel}%;height:3px;background:#fff;border-radius:0 2px 0 0;opacity:${vel>.0?.8:0};pointer-events:none`;
                const vnum = mk('span'); vnum.dataset.vnum='';
                vnum.style.cssText=`position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:.5rem;color:#fff;font-weight:bold;opacity:${vel>0?.9:0};pointer-events:none;text-align:center`;
                vnum.textContent=vel>0?vel:'';
                cell.append(vbar,vnum);
                cell.onmousedown = e => {
                    if(e.button!==0) return; e.preventDefault();
                    dragState={ti,bi,el:cell,startY:e.clientY,startVel:state.beatPatterns[ti][bi],moved:false,pendingVel:null};
                };
                row.append(cell);
            }
            table.append(row);
        });
        gridWrap.append(table);
    }

    const onMove = e => {
        const d=dragState; if(!d) return;
        const dy=d.startY-e.clientY;
        if(Math.abs(dy)>3) {
            d.moved=true;
            const v=Math.max(1,Math.min(100,(d.startVel>0?d.startVel:0)+Math.round(dy*.7)));
            d.pendingVel=v;
            if(!rafDrag) rafDrag=requestAnimationFrame(()=>{
                rafDrag=null; const dd=dragState; if(!dd) return;
                const vel=dd.pendingVel, color=BEAT_TRACKS[dd.ti].color;
                const op=.3+(vel/100)*.7, hex=Math.round(op*255).toString(16).padStart(2,'0');
                dd.el.style.background=`${color}${hex}`;
                const bar=dd.el.querySelector('[data-vbar]'), num=dd.el.querySelector('[data-vnum]');
                if(bar){bar.style.width=vel+'%';bar.style.opacity='.8';}
                if(num){num.textContent=vel;num.style.opacity='.9';}
            });
        }
    };
    const onUp = () => {
        const d=dragState; if(!d) return;
        if(rafDrag){cancelAnimationFrame(rafDrag);rafDrag=null;}
        if(!d.moved) { state.beatPatterns[d.ti][d.bi]=state.beatPatterns[d.ti][d.bi]>0?0:100; renderGrid(); }
        else if(d.pendingVel!=null) state.beatPatterns[d.ti][d.bi]=d.pendingVel;
        dragState=null;
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    renderGrid();

    // Track volumes
    const volS = mk('div'); volS.style.cssText='margin:16px 0';
    volS.innerHTML='<h3 style="font-size:.78rem;color:var(--dim);letter-spacing:.1em;margin-bottom:10px">🔊 TRACK VOLUME</h3>';
    const volG = mk('div'); volG.style.cssText='display:grid;grid-template-columns:repeat(5,1fr);gap:10px';
    BEAT_TRACKS.forEach((track,ti)=>{
        const col=mk('div'); col.style.cssText='display:flex;flex-direction:column;align-items:center;gap:6px';
        const sp=mk('span','',state.beatVolumes[ti]+'%'); sp.style.cssText=`color:${track.color};font-size:.65rem`;
        col.append(mk('span','',`${track.emoji} ${track.name}`)); col.children[0].style.cssText=`font-size:.65rem;color:${track.color}`;
        col.append(sp);
        const si=document.createElement('input'); si.type='range'; si.min=0; si.max=100; si.value=state.beatVolumes[ti];
        si.style.cssText=`width:100%;accent-color:${track.color}`;
        si.oninput=()=>{ state.beatVolumes[ti]=+si.value; sp.textContent=si.value+'%'; };
        col.append(si); volG.append(col);
    });
    volS.append(volG); shell.append(volS);

    shell.append(theoryCard(
        "Beat Maker — Ableton'da Nerede?",
        "Ableton'da ritim <strong>Drum Rack</strong> ile oluşturulur. Her pad bir sample çalar. <strong>Step Sequencer</strong> → MIDI clip Draw modunda. <strong>Swing</strong> → Groove Pool veya Quantize. <strong>BPM</strong> → sağ üst köşe tempo kutusu.",
        "Instruments → Drum Rack → MIDI clip (çift tıkla) → Draw modu"
    ));

    root.append(shell);
    root.append(makeTaskPanel(2));
    _cleanup = () => { window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
    return root;
}

// MODULE 3 — MIXING TEORİSİ
// ═══════════════════════════════════════════════════════════════════
function renderModule3() {
    const root=mk('div','container'); root.append(mk('div','accent-bar'));
    const bk=mk('button','back-btn','← Ana Menü'); bk.onclick=()=>navigate(null); root.append(bk);
    const shell=mk('div','synth-container');
    shell.innerHTML=`<div class="synth-header"><h2>🎚️ Mixing & Efektler</h2></div>`;

    shell.append(theoryCard(
        "Mixer — Ableton'da Nerede?",
        "Her track'in sağında mixer bölümü vardır. <strong>Volume fader</strong> genel seviye, <strong>Pan</strong> stereo konum, <strong>EQ Eight</strong> frekans düzenlemesi, <strong>Compressor</strong> dinamik kontrolü sağlar. Send/Return tracklerine reverb/delay yüklenir.",
        "Track → Mixer Section | Effects → EQ Eight / Compressor / Reverb"
    ));

    const concepts = [
        {title:'Volume / Gain', color:'var(--gold)',
         body:'Her kanalın ses seviyesi. Kural: kick en yüksek, hat en düşük. Master kanal -6dB boşluk bırak (headroom).'},
        {title:'Panning', color:'var(--gold)',
         body:'Sesi sol/sağ kanallar arasında konumlandır. Kick ve bass ortada, lead biraz sağ/sol, hat karşı tarafa.'},
        {title:'EQ — Equalizer', color:'var(--amber)',
         body:'Frekans dengesi. Low = bas (60-200Hz), Mid = orta (500-2kHz), High = tiz (8-16kHz). Frekans maskelenmesini önle.'},
        {title:'Compression', color:'var(--amber)',
         body:'Dinamik aralığı sıkıştırır. Kick ve snare standart hedef. Attack = geçici sesi koru, Release = pump efekti.'},
        {title:'Reverb / Delay', color:'var(--crimson)',
         body:'Uzamsal efektler. Send/Return kanalından uygula — tüm trackler aynı reverb\'ü paylaşır, daha doğal mix.'},
        {title:'Sidechain Compression', color:'var(--crimson)',
         body:'Bass\'i kick\'e sidechain\'le — kick vurduğunda bass kısılır. Dance müziğinin temel pump efekti.'},
        {title:'Stereo Field', color:'var(--ice)',
         body:'Mono: kick, bass, snare (alt frekanslar mono olmalı). Stereo: pad, lead, efektler. Mono uyumluluğunu kontrol et.'},
        {title:'Headroom', color:'var(--ice)',
         body:'Master kanal -6dB civarında kalmalı. Mastering aşamasında kompresör/limiter için alan bırak.'},
    ];

    const grid = mk('div','mix-concept-grid');
    concepts.forEach(c => {
        const card=mk('div','mix-concept');
        card.innerHTML=`<strong style="color:${c.color}">${c.title}</strong><p>${c.body}</p>`;
        grid.append(card);
    });
    const wrap=mk('div','adsr-explanation');
    wrap.innerHTML=`<h3 style="color:#e8b84b;margin-bottom:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:.06em">🎚️ Mixing Kavramları</h3>`;
    wrap.append(grid); shell.append(wrap);
    root.append(shell); root.append(makeTaskPanel(3));
    return root;
}

// ═══════════════════════════════════════════════════════════════════
// MODULE 4 — ARRANGEMENT
// ═══════════════════════════════════════════════════════════════════
function renderModule4() {
    const root=mk('div','container'); root.append(mk('div','accent-bar'));
    const bk=mk('button','back-btn','← Ana Menü'); bk.onclick=()=>navigate(null); root.append(bk);
    const shell=mk('div','synth-container');
    shell.innerHTML=`<div class="synth-header"><h2>🎵 Song Arrangement</h2></div>`;

    shell.append(theoryCard(
        "Arrangement — Ableton'da Nerede?",
        "<strong>Session View</strong>: Clip launcher — canlı performans. Her kare bir clip, satır bir scene. <strong>Arrangement View</strong>: Timeline — şarkı yapısı. Session'dan Arrangement'a kayıt yapılır. <strong>Tab tuşu</strong> iki görünüm arasında geçiş yapar.",
        "Tab tuşu → Session View ↔ Arrangement View"
    ));

    const sections=[
        {name:'Intro',      color:'#8fc8e8', bars:'4–8 bar',  desc:'Sadece kick + hi-hat. Dinleyiciyi hazırla, melodiyi tanıtma.'},
        {name:'Verse',      color:'#e8b84b', bars:'8–16 bar', desc:'Full beat + bass. Ana melodiyi tanıt. Enerjik ama chorus\'dan hafif.'},
        {name:'Pre-Chorus', color:'#d4722a', bars:'4–8 bar',  desc:'Gerilim artır. Bazı elementleri çıkar veya ekle, beklenti yarat.'},
        {name:'Chorus',     color:'#b82d45', bars:'8–16 bar', desc:'En yoğun kısım. Tüm elementler + lead melody. Yükseliş hissi.'},
        {name:'Bridge',     color:'#a855f7', bars:'4–8 bar',  desc:'Beklenmedik uyum ya da ritim değişimi. Gerilimi yenile.'},
        {name:'Breakdown',  color:'#00aaff', bars:'4–8 bar',  desc:'Elementleri azalt. Sadece pad/atmosfer. Drop öncesi boşluk.'},
        {name:'Drop',       color:'#ff4444', bars:'8–16 bar', desc:'Tüm enerji geri döner. Dance müziğinin en güçlü kısmı.'},
        {name:'Outro',      color:'#8fc8e8', bars:'4–8 bar',  desc:'Elementleri teker teker çıkar. Fade-out veya hard stop.'},
    ];
    const wrap=mk('div','adsr-explanation');
    wrap.innerHTML=`<h3 style="color:#e8b84b;margin-bottom:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:.06em">🎵 Şarkı Yapısı Rehberi</h3>`;
    const slist=mk('div'); slist.style.cssText='display:flex;flex-direction:column;gap:8px;font-size:.78rem';
    sections.forEach(s=>{
        const row=mk('div','arr-section');
        row.style.cssText=`background:${s.color}11;border:1px solid ${s.color}33;border-left:3px solid ${s.color}`;
        row.innerHTML=`<div style="min-width:100px"><strong style="color:${s.color}">${s.name}</strong><br><span style="color:var(--dim);font-size:.65rem">${s.bars}</span></div><div style="color:var(--dim)">${s.desc}</div>`;
        slist.append(row);
    });
    wrap.append(slist); shell.append(wrap);

    // Ableton workflow steps
    const flow=mk('div','adsr-explanation'); flow.style.marginTop='16px';
    flow.innerHTML=`<h3 style="color:#e8b84b;margin-bottom:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:.06em">⚡ Ableton Çalışma Akışı</h3>`;
    const steps=[
        {n:'1', title:'Tempo + Key Seç', desc:'BPM ve tonaliteyi belirle. Genellikle 120-140bpm dance, 70-100bpm hip-hop.'},
        {n:'2', title:'Drum Pattern',    desc:'Beat Maker\'da ritim kur. 4-8 bar loop oluştur, groove ekle.'},
        {n:'3', title:'Bass Line',       desc:'Beat\'e uyumlu bass melodisi. Kick ile frekans çakışmasına dikkat.'},
        {n:'4', title:'Chord Progression',desc:'3-4 akorlu döngü. Major = parlak, Minor = koyu his.'},
        {n:'5', title:'Lead / Melody',   desc:'Ana melodiyi yaz. Kısa, tekrarlayan motifler akılda kalır.'},
        {n:'6', title:'Arrangement',     desc:'Clip\'leri timeline\'a taşı. Intro→Verse→Chorus yapısı kur.'},
        {n:'7', title:'Mix & Master',    desc:'EQ, kompresör, reverb. Master kanal limiter. Export WAV/MP3.'},
    ];
    const flist=mk('div'); flist.style.cssText='display:flex;flex-direction:column;gap:8px;font-size:.78rem';
    steps.forEach(s=>{
        const row=mk('div'); row.style.cssText='display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid var(--mid);border-radius:4px';
        row.innerHTML=`<div style="min-width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--black);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.75rem;flex-shrink:0">${s.n}</div><div><strong style="color:var(--white)">${s.title}</strong><br><span style="color:var(--dim)">${s.desc}</span></div>`;
        flist.append(row);
    });
    flow.append(flist); shell.append(flow);
    root.append(shell); root.append(makeTaskPanel(4));
    return root;
}

// ═══════════════════════════════════════════════════════════════════
// HOME PAGE
// ═══════════════════════════════════════════════════════════════════
function renderHome() {
    const root=mk('div','container'); root.append(mk('div','accent-bar'));
    const hdr=mk('div','header','<h1>Ableton Lab</h1><p>Berkay Er — İnteraktif Öğrenme Platformu</p>');
    root.append(hdr);

    const modules=[
        {id:1, title:'🎹 Synthesizer & ADSR',   desc:'Ses üretimi, envelope, filter ve presets',  color:'var(--gold)'},
        {id:2, title:'🥁 Beat Yapımı',           desc:'Step sequencer, velocity, groove ve swing',  color:'var(--amber)'},
        {id:3, title:'🎚️ Mixing Kavramları',     desc:'EQ, kompresör, reverb ve stereo field',      color:'var(--crimson)'},
        {id:4, title:'🎵 Song Arrangement',      desc:'Şarkı yapısı ve Ableton çalışma akışı',     color:'var(--ice)'},
    ];
    const grid=mk('div','module-grid');
    modules.forEach(m=>{
        const pct=getProgress(m.id);
        const tasks=TASKS[m.id]||[];
        const done=tasks.filter(t=>state.completedTasks[`${m.id}-${t.id}`]).length;
        const card=mk('div','module-card');
        card.innerHTML=`
            <div class="module-card-num">${String(m.id).padStart(2,'0')}</div>
            <div style="position:relative;z-index:1">
                <div style="color:${m.color};font-size:1.05rem;font-weight:bold;margin-bottom:6px">${m.title}</div>
                <div style="color:var(--dim);font-size:.74rem;margin-bottom:14px">${m.desc}</div>
                <span class="module-card-status ${pct===100?'status-done':done>0?'status-active':'status-idle'}">${pct===100?'✓ Tamamlandı':`${done}/${tasks.length} Görev`}</span>
            </div>
            <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--mid)">
                <div style="height:100%;width:${pct}%;background:${m.color};border-radius:2px;transition:width .3s"></div>
            </div>`;
        card.onclick=()=>navigate(m.id);
        grid.append(card);
    });
    root.append(grid);
    return root;
}

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
    const app=document.getElementById('app'); app.innerHTML='';
    const views={1:renderModule1, 2:renderModule2, 3:renderModule3, 4:renderModule4};
    app.append((views[state.currentModule] || renderHome)());
}

// Scroll progress bar
window.addEventListener('scroll', () => {
    const el=document.getElementById('scrollProgress');
    if (!el) return;
    const p=window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100;
    el.style.width=p+'%';
}, {passive:true});

render();
</script>
