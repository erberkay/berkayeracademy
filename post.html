<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konu — Elektronik Müzik Topluluğu</title>
<meta name="theme-color" content="#060609">
<meta property="og:title" content="Konu — Elektronik Müzik Topluluğu">
<meta property="og:image" content="https://erberkay.github.io/Producer.School/assets/img/og-logo.png">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black:#060609; --deep:#0c0c16; --card:#13131f;
  --gold:#e8b84b; --amber:#d4722a; --crimson:#b82d45;
  --ice:#8fc8e8; --white:#eeebe6; --mid:#2a2a45; --mid2:#1e1e34;
  --dim:rgba(238,235,230,0.45);
}
body { font-family:'Space Mono',monospace; background:var(--black); color:var(--white); min-height:100vh; }
body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }

.topnav { position:fixed; top:0; left:0; right:0; z-index:300; background:rgba(6,6,9,.94); border-bottom:1px solid var(--mid); backdrop-filter:blur(12px); height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; }
.topnav-left { display:flex; align-items:center; gap:16px; }
.topnav-back { color:var(--dim); font-size:.78rem; text-decoration:none; transition:color .15s; }
.topnav-back:hover { color:var(--gold); }
.topnav-sep { color:var(--mid); }
.topnav-brand { font-family:'Bebas Neue',sans-serif; font-size:1.25rem; color:var(--gold); letter-spacing:.08em; }
#authBar { display:flex; align-items:center; gap:10px; }
.auth-sign-btn { background:rgba(42,42,69,.9); border:1px solid var(--gold); color:var(--gold); font-family:'Space Mono',monospace; font-size:.76rem; padding:7px 16px; border-radius:6px; cursor:pointer; transition:background .18s,color .18s; }
.auth-sign-btn:hover { background:var(--gold); color:var(--black); }
.auth-user-wrap { display:flex; align-items:center; gap:9px; background:rgba(42,42,69,.85); border:1px solid rgba(232,184,75,.3); padding:5px 12px 5px 5px; border-radius:22px; }
.auth-avatar { width:30px; height:30px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; cursor:pointer; }
.auth-name { font-size:.75rem; color:var(--white); max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
.auth-name:hover { color:var(--gold); }
.auth-out-btn { background:transparent; border:none; color:rgba(238,235,230,.4); font-size:.7rem; cursor:pointer; font-family:'Space Mono',monospace; }
.auth-out-btn:hover { color:var(--crimson); }

.layout { max-width:980px; margin:0 auto; padding:76px 24px 80px; position:relative; z-index:1; }

/* ── Post ── */
.post-card { background:var(--card); border:1px solid rgba(255,255,255,.07); border-radius:14px; overflow:hidden; margin-bottom:28px; box-shadow:0 4px 24px rgba(0,0,0,.3); }
.post-header { padding:24px 28px 18px; border-bottom:1px solid rgba(255,255,255,.05); }
.post-author-row { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.avatar { width:48px; height:48px; border-radius:50%; object-fit:cover; border:2px solid var(--mid); cursor:pointer; transition:border-color .15s; flex-shrink:0; }
.avatar:hover { border-color:var(--gold); }
.avatar-placeholder { width:48px; height:48px; border-radius:50%; background:var(--mid2); border:2px solid var(--mid); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
.author-info { display:flex; flex-direction:column; gap:3px; }
.author-name { font-size:.85rem; color:var(--gold); font-weight:bold; cursor:pointer; }
.author-name:hover { text-decoration:underline; }
.author-name.is-admin::after { content:' ⚡'; font-size:.72rem; }
.author-meta { font-size:.68rem; color:rgba(238,235,230,.28); }
.post-badges { display:flex; gap:7px; margin-left:auto; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
.badge { font-size:.68rem; padding:4px 11px; border-radius:10px; font-family:'Space Mono',monospace; }
.badge-solved { background:rgba(100,200,100,.12); border:1px solid rgba(100,200,100,.3); color:#6fc; }
.badge-open   { background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.2); color:var(--gold); }
.badge-cat    { background:rgba(143,200,232,.08); border:1px solid rgba(143,200,232,.22); color:var(--ice); }
.post-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.5rem,3vw,2.1rem); color:var(--white); letter-spacing:.03em; line-height:1.2; margin-bottom:14px; }
.post-body { font-size:.92rem; line-height:1.9; color:var(--white); white-space:pre-wrap; word-break:break-word; }
.post-body b { color:var(--gold); }
.post-body i { color:var(--ice); }
.post-body code { background:rgba(255,255,255,.08); border-radius:4px; padding:2px 7px; font-size:.84rem; color:#b5e8a0; }
.post-actions { padding:12px 28px 16px; display:flex; gap:12px; align-items:center; }
.action-btn { background:none; border:none; color:var(--dim); font-family:'Space Mono',monospace; font-size:.75rem; cursor:pointer; padding:4px 0; transition:color .15s; }
.action-btn:hover { color:var(--gold); }
.solve-btn { border:1px solid rgba(100,200,100,.35); color:rgba(100,200,100,.7); padding:4px 14px; border-radius:10px; transition:all .15s; }
.solve-btn:hover,.solve-btn.active { background:rgba(100,200,100,.12); color:#6fc; border-color:rgba(100,200,100,.5); }
.delete-btn { color:rgba(184,45,69,.55); margin-left:auto; }
.delete-btn:hover { color:var(--crimson); }
.like-btn { border:1px solid rgba(184,45,69,.3); color:rgba(184,45,69,.6); padding:4px 14px; border-radius:10px; transition:all .15s; }
.like-btn:hover,.like-btn.liked { background:rgba(184,45,69,.12); color:var(--crimson); border-color:rgba(184,45,69,.5); }
.edit-own-btn { color:rgba(143,200,232,.4); padding:4px 6px; transition:color .15s; }
.edit-own-btn:hover { color:var(--ice); }
.inline-edit-wrap { padding:16px 20px; border-top:1px solid rgba(255,255,255,.05); }
.inline-edit-ta { width:100%; background:var(--mid2); border:1px solid var(--mid); border-radius:8px; color:var(--white); font-family:'Space Mono',monospace; font-size:.88rem; padding:11px 14px; resize:vertical; outline:none; line-height:1.65; transition:border-color .15s; min-height:80px; }
.inline-edit-ta:focus { border-color:var(--gold); }
.inline-edit-btns { display:flex; gap:9px; margin-top:10px; }
.inline-edit-save { padding:7px 18px; background:var(--gold); color:var(--black); border:none; border-radius:6px; font-family:'Space Mono',monospace; font-size:.75rem; font-weight:bold; cursor:pointer; }
.inline-edit-cancel { padding:7px 16px; background:none; border:1px solid var(--mid); color:var(--dim); border-radius:6px; font-family:'Space Mono',monospace; font-size:.75rem; cursor:pointer; }

/* ── Replies ── */
.replies-section { margin-bottom:28px; }
.replies-header { font-size:.75rem; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid rgba(255,255,255,.05); }
.reply-card { display:flex; gap:16px; margin-bottom:18px; }
.reply-body { flex:1; background:var(--card); border:1px solid rgba(255,255,255,.07); border-radius:10px; padding:16px 20px; min-width:0; }
.reply-author-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.reply-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; border:1.5px solid var(--mid); cursor:pointer; flex-shrink:0; }
.reply-avatar:hover { border-color:var(--gold); }
.reply-avatar-ph { width:36px; height:36px; border-radius:50%; background:var(--mid2); border:1.5px solid var(--mid); display:flex; align-items:center; justify-content:center; font-size:.9rem; flex-shrink:0; }
.reply-author { font-size:.78rem; color:var(--ice); font-weight:bold; cursor:pointer; }
.reply-author:hover { text-decoration:underline; }
.reply-author.is-admin { color:var(--gold); }
.reply-author.is-admin::after { content:' ⚡'; font-size:.68rem; }
.reply-date { font-size:.66rem; color:rgba(238,235,230,.22); margin-left:auto; }
.reply-del { background:none; border:none; color:rgba(184,45,69,.4); font-size:.68rem; cursor:pointer; font-family:'Space Mono',monospace; }
.reply-del:hover { color:var(--crimson); }
.reply-text { font-size:.88rem; line-height:1.8; color:var(--white); white-space:pre-wrap; word-break:break-word; }

/* ── Reply form ── */
.reply-form-card { background:var(--card); border:1px solid rgba(255,255,255,.07); border-radius:12px; padding:24px 28px; }
.reply-form-title { font-size:.75rem; color:var(--gold); letter-spacing:.1em; text-transform:uppercase; margin-bottom:16px; }
.reply-form-row { display:flex; gap:16px; align-items:flex-start; }
.reply-ta { flex:1; background:var(--mid2); border:1px solid var(--mid); border-radius:8px; color:var(--white); font-family:'Space Mono',monospace; font-size:.88rem; padding:13px 16px; resize:vertical; min-height:88px; outline:none; line-height:1.7; transition:border-color .15s; }
.reply-ta:focus { border-color:var(--gold); }
.reply-submit { padding:12px 24px; background:var(--gold); color:var(--black); border:none; border-radius:8px; font-family:'Space Mono',monospace; font-size:.8rem; font-weight:bold; cursor:pointer; transition:filter .15s; align-self:flex-end; white-space:nowrap; }
.reply-submit:hover { filter:brightness(1.1); }
.reply-submit:disabled { opacity:.5; cursor:default; filter:none; }
.login-hint { text-align:center; padding:28px; color:var(--dim); font-size:.85rem; }
.login-hint button { margin-top:12px; display:inline-block; padding:10px 24px; background:var(--gold); color:var(--black); border:none; border-radius:8px; font-family:'Space Mono',monospace; font-size:.8rem; font-weight:bold; cursor:pointer; }

/* ── Toast ── */
.toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column-reverse; gap:8px; pointer-events:none; }
.toast { background:var(--card); border:1px solid var(--mid); border-left:3px solid var(--gold); border-radius:8px; padding:12px 18px; font-family:'Space Mono',monospace; font-size:.8rem; color:var(--white); box-shadow:0 4px 24px rgba(0,0,0,.6); animation:toastIn .2s ease; pointer-events:all; max-width:300px; line-height:1.55; }
.toast.error { border-left-color:var(--crimson); }
.toast.info  { border-left-color:var(--ice); }
@keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* ── Notification Bell ── */
.notif-bell-wrap { position:relative; }
.notif-bell { background:none; border:none; color:rgba(238,235,230,.45); font-size:1.2rem; cursor:pointer; padding:4px; line-height:1; transition:color .15s; }
.notif-bell:hover { color:var(--gold); }
.notif-badge { position:absolute; top:0; right:0; background:var(--crimson); color:#fff; font-size:.55rem; font-family:'Space Mono',monospace; border-radius:6px; padding:1px 5px; min-width:14px; text-align:center; pointer-events:none; }
.notif-panel { position:absolute; top:44px; right:0; width:320px; background:var(--card); border:1px solid var(--mid); border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,.6); z-index:9999; overflow:hidden; display:none; }
.notif-panel.open { display:block; }
.notif-panel-head { padding:13px 16px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; justify-content:space-between; }
.notif-panel-title { font-size:.75rem; color:var(--gold); letter-spacing:.08em; text-transform:uppercase; }
.notif-read-all { background:none; border:none; color:rgba(238,235,230,.35); font-size:.68rem; cursor:pointer; font-family:'Space Mono',monospace; padding:0; }
.notif-read-all:hover { color:var(--dim); }
.notif-list { max-height:360px; overflow-y:auto; }
.notif-item { padding:12px 36px 12px 16px; border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer; transition:background .1s; position:relative; }
.notif-item:hover { background:rgba(255,255,255,.03); }
.notif-item.unread { background:rgba(232,184,75,.04); border-left:2px solid rgba(232,184,75,.4); padding-left:14px; }
.notif-item-text { font-size:.78rem; color:var(--white); line-height:1.55; margin-bottom:4px; }
.notif-item-time { font-size:.64rem; color:rgba(238,235,230,.25); }
.notif-empty { padding:24px 16px; text-align:center; font-size:.78rem; color:var(--dim); }
.notif-del-btn { position:absolute; top:50%; right:8px; transform:translateY(-50%); background:none; border:none; color:rgba(238,235,230,.3); font-size:1rem; cursor:pointer; padding:2px 6px; line-height:1; border-radius:3px; transition:color .12s,background .12s; }
.notif-del-btn:hover { color:var(--crimson); background:rgba(184,45,69,.15); }

/* ── Bottom Nav ── */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:500; background:rgba(6,6,9,.96); border-top:1px solid var(--mid); backdrop-filter:blur(16px); display:flex; height:62px; }
.bnav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; text-decoration:none; color:rgba(238,235,230,.3); transition:color .15s; position:relative; }
.bnav-item:hover { color:rgba(238,235,230,.65); }
.bnav-item.active { color:var(--gold); }
.bnav-item.active::after { content:''; position:absolute; top:0; left:28%; right:28%; height:2px; background:var(--gold); border-radius:0 0 3px 3px; }
.bnav-icon { font-size:1.3rem; line-height:1; }
.bnav-label { font-family:'Space Mono',monospace; font-size:.62rem; letter-spacing:.05em; text-transform:uppercase; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a href="forum.html" class="topnav-back">← Forum</a>
    <span class="topnav-sep">|</span>
    <span class="topnav-brand" id="navTitle">Konu</span>
  </div>
  <div id="authBar"></div>
</nav>

<div class="layout" id="layout">
  <div style="text-align:center;padding:60px;color:var(--dim);font-size:.75rem">Yükleniyor...</div>
</div>

<script>
'use strict';
const ADMIN_EMAIL = 'berkayer032@gmail.com';
const postId = new URLSearchParams(location.search).get('id');

firebase.initializeApp({
  apiKey:            "AIzaSyDX8AkwDejrkh5L4xUXQcmzKq-DYvc2E8A",
  authDomain:        "ableton-tutorial.firebaseapp.com",
  projectId:         "ableton-tutorial",
  storageBucket:     "ableton-tutorial.firebasestorage.app",
  messagingSenderId: "677640687230",
  appId:             "1:677640687230:web:8c6a2dfefbf55c69ffd22f",
});
const auth = firebase.auth();
const db   = firebase.firestore();
let _user = null;

let _signingIn = false;
function doSignIn() {
  if (_signingIn) return;
  _signingIn = true;
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(console.error).finally(() => { _signingIn = false; });
}
function isAdmin(u) { return u?.email === ADMIN_EMAIL; }
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('tr-TR', {day:'numeric',month:'short',year:'numeric'});
}
function renderMd(txt) {
  return (txt||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>')
    .replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>');
}
function goProfile(uid) { location.href = `profile.html?uid=${uid}`; }

function showToast() {}

let _notifUnsub = null, _annUnsub = null;
let _notifPanelEl = null;
let _personalNotifs = [], _announcements = [], _annSeenAt = null, _dismissedAnns = [];

function updateAuthBar(user) {
  const bar = document.getElementById('authBar'); bar.innerHTML = '';
  _notifPanelEl = null;
  if (user) {
    const wrap = document.createElement('div'); wrap.className = 'auth-user-wrap';
    const img  = document.createElement('img');  img.className = 'auth-avatar';
    img.src = user.photoURL || ''; img.alt = '';
    img.onclick = () => goProfile(user.uid);
    const name = document.createElement('span'); name.className = 'auth-name';
    name.textContent = isAdmin(user) ? '⚡ Admin' : (user.displayName?.split(' ')[0] || 'Üye');
    name.onclick = () => goProfile(user.uid);
    const out = document.createElement('button'); out.className = 'auth-out-btn';
    out.textContent = '✕'; out.onclick = () => auth.signOut();
    wrap.append(img, name, out);

    // Notification bell
    const bellWrap = document.createElement('div'); bellWrap.className = 'notif-bell-wrap';
    const bell = document.createElement('button'); bell.className = 'notif-bell'; bell.textContent = '🔔'; bell.title = 'Bildirimler';
    const badge = document.createElement('span'); badge.className = 'notif-badge'; badge.style.display = 'none';
    _notifPanelEl = document.createElement('div'); _notifPanelEl.className = 'notif-panel';
    _notifPanelEl.innerHTML = '<div class="notif-panel-head"><span class="notif-panel-title">Bildirimler</span><button class="notif-read-all" id="notifReadAll">Tümünü Oku</button></div><div class="notif-list"></div>';
    document.getElementById('notifReadAll', _notifPanelEl)?.addEventListener('click', () => markAllRead(user.uid));
    bell.onclick = (e) => { e.stopPropagation(); toggleNotifPanel(user); };
    bellWrap.append(bell, badge, _notifPanelEl);
    bar.append(bellWrap, wrap);

    document.addEventListener('click', closeNotifPanel, { once: true });
  } else {
    const btn = document.createElement('button'); btn.className = 'auth-sign-btn';
    btn.textContent = '⬡ Google ile Giriş'; btn.onclick = doSignIn;
    bar.append(btn);
  }
}

function closeNotifPanel() {
  if (_notifPanelEl) _notifPanelEl.classList.remove('open');
}

function toggleNotifPanel(user) {
  if (!_notifPanelEl) return;
  const isOpen = _notifPanelEl.classList.contains('open');
  if (isOpen) { _notifPanelEl.classList.remove('open'); return; }
  _notifPanelEl.classList.add('open');
  setTimeout(() => document.addEventListener('click', closeNotifPanel, { once: true }), 0);
  markAllRead(user.uid);
}

function _mergeNotifs(uid) {
  const all = [
    ..._personalNotifs.map(n => ({...n, _t:'p'})),
    ..._announcements.filter(n => !_dismissedAnns.includes(n._id)).map(n => ({...n, _t:'a'}))
  ].sort((a,b) => ((b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)));
  const annSec = _annSeenAt?.seconds || 0;
  const unread = _personalNotifs.filter(n => !n.read).length
    + _announcements.filter(n => (n.createdAt?.seconds||0) > annSec).length;
  const badge = document.querySelector('.notif-badge');
  if (badge) { badge.textContent = unread > 9 ? '9+' : String(unread); badge.style.display = unread > 0 ? 'block' : 'none'; }
  if (_notifPanelEl) {
    const list = _notifPanelEl.querySelector('.notif-list'); if (!list) return;
    list.innerHTML = '';
    if (!all.length) { list.innerHTML = '<div class="notif-empty">Bildirim yok</div>'; return; }
    all.forEach(n => {
      const isUnread = n._t==='p' ? !n.read : (n.createdAt?.seconds||0) > annSec;
      const item = document.createElement('div'); item.className = 'notif-item' + (isUnread ? ' unread' : '');
      const icon = n._t==='a' ? '📢 ' : '';
      const timeStr = n.createdAt ? n.createdAt.toDate().toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      item.innerHTML = `<div class="notif-item-text">${icon}${n.text || 'Yeni bildirim'}</div><div class="notif-item-time">${timeStr}</div>`;
      if (n.postId) item.onclick = () => { location.href = `post.html?id=${n.postId}`; };
      if (n._id) {
        const del = document.createElement('button'); del.className = 'notif-del-btn'; del.textContent = '×'; del.title = 'Sil';
        del.onclick = e => {
          e.stopPropagation();
          if (n._t === 'p') {
            db.collection('notifications').doc(uid).collection('items').doc(n._id).delete();
          } else {
            if (!_dismissedAnns.includes(n._id)) { _dismissedAnns.push(n._id); }
            db.collection('users').doc(uid).update({ dismissedAnns: firebase.firestore.FieldValue.arrayUnion(n._id) }).catch(() => {});
            _announcements = _announcements.filter(a => a._id !== n._id);
            _mergeNotifs(uid);
          }
        };
        item.append(del);
      }
      list.append(item);
    });
  }
}

function markAllRead(uid) {
  db.collection('notifications').doc(uid).collection('items')
    .where('read', '==', false).get().then(snap => {
      const batch = db.batch(); snap.docs.forEach(d => batch.update(d.ref, { read: true })); batch.commit();
    }).catch(() => {});
  db.collection('users').doc(uid).set({ announcementsSeenAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }).catch(() => {});
  _annSeenAt = { seconds: Date.now() / 1000 };
  _personalNotifs = _personalNotifs.map(n => ({...n, read: true}));
  _mergeNotifs(uid);
}

function initNotifications(user) {
  if (_notifUnsub) { _notifUnsub(); _notifUnsub = null; }
  if (_annUnsub) { _annUnsub(); _annUnsub = null; }
  _personalNotifs = []; _announcements = []; _annSeenAt = null; _dismissedAnns = [];
  if (!user) return;
  db.collection('users').doc(user.uid).get().then(d => {
    _annSeenAt = d.data()?.announcementsSeenAt || null;
    _dismissedAnns = d.data()?.dismissedAnns || [];
    _mergeNotifs(user.uid);
  }).catch(() => {});
  _notifUnsub = db.collection('notifications').doc(user.uid).collection('items')
    .orderBy('createdAt', 'desc').limit(20)
    .onSnapshot(snap => {
      _personalNotifs = snap.docs.map(d => ({...d.data(), _id: d.id}));
      if (snap.docs.length > 4) snap.docs.slice(4).forEach(d => d.ref.delete());
      _mergeNotifs(user.uid);
    }, () => {});
  _annUnsub = db.collection('announcements').orderBy('createdAt', 'desc').limit(15)
    .onSnapshot(snap => { _announcements = snap.docs.map(d => ({...d.data(), _id: d.id})); _mergeNotifs(user.uid); }, () => {});
}

async function getProfile(uid) {
  try {
    const d = await db.collection('users').doc(uid).get();
    return d.exists ? d.data() : null;
  } catch { return null; }
}

function makeAvatar(photoURL, size, uid) {
  if (photoURL) {
    const img = document.createElement('img');
    img.className = size === 40 ? 'avatar' : 'reply-avatar';
    img.src = photoURL; img.alt = ''; img.width = size; img.height = size;
    img.onerror = () => { img.style.display='none'; };
    if (uid) img.onclick = () => goProfile(uid);
    return img;
  }
  const ph = document.createElement('div');
  ph.className = size === 40 ? 'avatar-placeholder' : 'reply-avatar-ph';
  ph.textContent = '👤';
  return ph;
}

async function renderPost() {
  if (!postId) { location.href = 'forum.html'; return; }
  const layout = document.getElementById('layout');

  const doc = await db.collection('forum').doc(postId).get();
  if (!doc.exists) { layout.innerHTML = '<div style="text-align:center;padding:60px;color:var(--dim)">Konu bulunamadı.</div>'; return; }
  const post = { id: doc.id, ...doc.data() };

  document.title = (post.title || 'Konu') + ' — Elektronik Müzik Topluluğu';
  const navTitle = document.getElementById('navTitle');
  if (navTitle) navTitle.textContent = post.title || 'Konu';

  layout.innerHTML = '';

  // ── Post card ──
  const card = document.createElement('div'); card.className = 'post-card';
  const header = document.createElement('div'); header.className = 'post-header';

  // Author row
  const authorRow = document.createElement('div'); authorRow.className = 'post-author-row';
  const profile = await getProfile(post.authorId);
  const photo = profile?.photoURL || post.authorPhotoURL || null;
  const avEl = makeAvatar(photo, 40, post.authorId);
  const authorInfo = document.createElement('div'); authorInfo.className = 'author-info';
  const nameEl = document.createElement('span');
  nameEl.className = 'author-name' + (post.authorEmail === ADMIN_EMAIL ? ' is-admin' : '');
  nameEl.textContent = post.authorName;
  nameEl.onclick = () => goProfile(post.authorId);
  const metaEl = document.createElement('span'); metaEl.className = 'author-meta';
  metaEl.textContent = fmtDate(post.createdAt);
  authorInfo.append(nameEl, metaEl);
  const badges = document.createElement('div'); badges.className = 'post-badges';
  const b = document.createElement('span');
  b.className = 'badge ' + (post.solved ? 'badge-solved' : 'badge-open');
  b.textContent = post.solved ? '✓ Çözüldü' : '● Açık';
  badges.append(b);
  if (post.category && post.category !== 'Genel') {
    const cb = document.createElement('span'); cb.className = 'badge badge-cat'; cb.textContent = post.category;
    badges.append(cb);
  }
  authorRow.append(avEl, authorInfo, badges);
  header.append(authorRow);

  if (post.title) {
    const ttl = document.createElement('div'); ttl.className = 'post-title'; ttl.textContent = post.title;
    header.append(ttl);
  }
  if (post.text) {
    const body = document.createElement('div'); body.className = 'post-body';
    body.innerHTML = renderMd(post.text);
    header.append(body);
  }
  card.append(header);

  // Post actions
  const actions = document.createElement('div'); actions.className = 'post-actions';
  const replyCount = document.createElement('span'); replyCount.className = 'action-btn';
  replyCount.style.cursor = 'default';
  replyCount.textContent = `💬 ${post.replyCount||0} Yanıt`;
  actions.append(replyCount);

  const copyBtn = document.createElement('button'); copyBtn.className = 'action-btn';
  copyBtn.textContent = '🔗 Linki Kopyala';
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(location.href).then(() => showToast('Link kopyalandı', 'info'));
  };
  actions.append(copyBtn);

  // Like button
  const likedBy = post.likedBy || [];
  const isLiked = _user && likedBy.includes(_user.uid);
  const likeBtn = document.createElement('button');
  likeBtn.className = 'action-btn like-btn' + (isLiked ? ' liked' : '');
  likeBtn.textContent = `♥ ${post.likeCount || 0}`;
  likeBtn.onclick = async () => {
    if (!_user) { showToast('Beğenmek için giriş yap', 'info'); return; }
    const ref = db.collection('forum').doc(postId);
    if (isLiked) {
      await ref.update({ likedBy: firebase.firestore.FieldValue.arrayRemove(_user.uid), likeCount: firebase.firestore.FieldValue.increment(-1) });
    } else {
      await ref.update({ likedBy: firebase.firestore.FieldValue.arrayUnion(_user.uid), likeCount: firebase.firestore.FieldValue.increment(1) });
    }
    renderPost();
  };
  actions.append(likeBtn);

  // Edit own post
  if (_user && post.authorId === _user.uid) {
    const editBtn = document.createElement('button'); editBtn.className = 'action-btn edit-own-btn'; editBtn.textContent = '✏️ Düzenle';
    let editWrap = null;
    editBtn.onclick = () => {
      if (editWrap) { editWrap.remove(); editWrap = null; return; }
      editWrap = document.createElement('div'); editWrap.className = 'inline-edit-wrap';
      const ta = document.createElement('textarea'); ta.className = 'inline-edit-ta';
      ta.value = post.text || '';
      const btns = document.createElement('div'); btns.className = 'inline-edit-btns';
      const saveB = document.createElement('button'); saveB.className = 'inline-edit-save'; saveB.textContent = '💾 Kaydet';
      const cancelB = document.createElement('button'); cancelB.className = 'inline-edit-cancel'; cancelB.textContent = 'Vazgeç';
      cancelB.onclick = () => { editWrap.remove(); editWrap = null; };
      saveB.onclick = async () => {
        const newText = ta.value.trim(); if (!newText) return;
        saveB.disabled = true; saveB.textContent = '⏳';
        await db.collection('forum').doc(postId).update({ text: newText, editedAt: firebase.firestore.FieldValue.serverTimestamp() });
        editWrap.remove(); editWrap = null;
        showToast('✓ Konu güncellendi');
        renderPost();
      };
      btns.append(saveB, cancelB); editWrap.append(ta, btns);
      card.append(editWrap);
    };
    actions.append(editBtn);
  }

  if (_user && isAdmin(_user)) {
    const solveBtn = document.createElement('button');
    solveBtn.className = 'action-btn solve-btn' + (post.solved ? ' active' : '');
    solveBtn.textContent = post.solved ? '✓ Çözüldü' : '⬡ Çözüldü işaretle';
    solveBtn.onclick = async () => {
      await db.collection('forum').doc(postId).update({ solved: !post.solved });
      showToast(post.solved ? 'Konu yeniden açıldı' : '✓ Konu çözüldü olarak işaretlendi');
      renderPost();
    };
    actions.append(solveBtn);

    const del = document.createElement('button'); del.className = 'action-btn delete-btn'; del.textContent = '🗑 Sil';
    del.onclick = async () => {
      if (!confirm('Konuyu ve yanıtlarını sil?')) return;
      const rSnap = await db.collection('forum').doc(postId).collection('replies').get();
      const batch = db.batch();
      rSnap.docs.forEach(d => batch.delete(d.ref));
      batch.delete(db.collection('forum').doc(postId));
      await batch.commit();
      location.href = 'forum.html';
    };
    actions.append(del);
  }
  card.append(actions);
  layout.append(card);

  // ── Replies ──
  await renderReplies(layout, post);
}

async function renderReplies(layout, post) {
  const sec = document.createElement('div'); sec.className = 'replies-section'; sec.id = 'repliesSec';
  const snap = await db.collection('forum').doc(postId).collection('replies')
    .orderBy('createdAt','asc').limit(200).get();

  const hdr = document.createElement('div'); hdr.className = 'replies-header';
  hdr.textContent = `${snap.size} Yanıt`;
  sec.append(hdr);

  for (const d of snap.docs) {
    const r = { id: d.id, ...d.data() };
    const rCard = document.createElement('div'); rCard.className = 'reply-card';
    const rProfile = await getProfile(r.authorId);
    const rPhoto = rProfile?.photoURL || r.authorPhotoURL || null;
    const rAv = makeAvatar(rPhoto, 30, r.authorId);
    const rBody = document.createElement('div'); rBody.className = 'reply-body';
    const rAuthorRow = document.createElement('div'); rAuthorRow.className = 'reply-author-row';
    const rName = document.createElement('span');
    rName.className = 'reply-author' + (r.isAdmin ? ' is-admin' : '');
    rName.textContent = r.authorName;
    rName.onclick = () => goProfile(r.authorId);
    const rDate = document.createElement('span'); rDate.className = 'reply-date'; rDate.textContent = fmtDate(r.createdAt);
    rAuthorRow.append(rName, rDate);
    if (_user && isAdmin(_user)) {
      const rdel = document.createElement('button'); rdel.className = 'reply-del'; rdel.textContent = '🗑';
      rdel.onclick = async () => {
        await db.collection('forum').doc(postId).collection('replies').doc(r.id).delete();
        await db.collection('forum').doc(postId).update({ replyCount: firebase.firestore.FieldValue.increment(-1) });
        rCard.remove();
      };
      rAuthorRow.append(rdel);
    }
    // Edit own reply
    if (_user && r.authorId === _user.uid) {
      const replyEditBtn = document.createElement('button'); replyEditBtn.className = 'reply-del'; replyEditBtn.style.color = 'rgba(143,200,232,.4)'; replyEditBtn.textContent = '✏️';
      replyEditBtn.title = 'Düzenle';
      let replyEditWrap = null;
      replyEditBtn.onclick = () => {
        if (replyEditWrap) { replyEditWrap.remove(); replyEditWrap = null; return; }
        replyEditWrap = document.createElement('div'); replyEditWrap.className = 'inline-edit-wrap'; replyEditWrap.style.padding = '10px 0 0';
        const ta = document.createElement('textarea'); ta.className = 'inline-edit-ta'; ta.value = r.text || '';
        const btns = document.createElement('div'); btns.className = 'inline-edit-btns';
        const saveB = document.createElement('button'); saveB.className = 'inline-edit-save'; saveB.textContent = '💾';
        const cancelB = document.createElement('button'); cancelB.className = 'inline-edit-cancel'; cancelB.textContent = 'Vazgeç';
        cancelB.onclick = () => { replyEditWrap.remove(); replyEditWrap = null; };
        saveB.onclick = async () => {
          const t = ta.value.trim(); if (!t) return;
          saveB.disabled = true;
          await db.collection('forum').doc(postId).collection('replies').doc(r.id).update({ text: t, editedAt: firebase.firestore.FieldValue.serverTimestamp() });
          replyEditWrap.remove(); replyEditWrap = null;
          rTxt.textContent = t; showToast('✓ Yanıt güncellendi');
        };
        btns.append(saveB, cancelB); replyEditWrap.append(ta, btns);
        rBody.append(replyEditWrap);
      };
      rAuthorRow.append(replyEditBtn);
    }
    const rTxt = document.createElement('div'); rTxt.className = 'reply-text'; rTxt.textContent = r.text;
    rBody.append(rAuthorRow, rTxt);
    rCard.append(rAv, rBody);
    sec.append(rCard);
  }
  layout.append(sec);

  // ── Reply form ──
  const formCard = document.createElement('div'); formCard.className = 'reply-form-card';
  if (post.solved) {
    formCard.innerHTML = `<div style="font-size:.65rem;color:rgba(100,200,100,.7);letter-spacing:.06em;padding:4px 0;">✓ Bu konu çözüldü — yanıt kapalı</div>`;
  } else if (_user) {
    const ft = document.createElement('div'); ft.className = 'reply-form-title'; ft.textContent = 'Yanıt Yaz';
    const row = document.createElement('div'); row.className = 'reply-form-row';
    const profile = await getProfile(_user.uid);
    const myPhoto = profile?.photoURL || _user.photoURL || null;
    row.append(makeAvatar(myPhoto, 30, _user.uid));
    const ta = document.createElement('textarea'); ta.className = 'reply-ta';
    ta.placeholder = 'Yanıtını buraya yaz... (Ctrl+Enter ile gönder)';
    const sub = document.createElement('button'); sub.className = 'reply-submit'; sub.textContent = 'Yanıtla';
    ta.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') sub.click(); });
    sub.onclick = async () => {
      const txt = ta.value.trim(); if (!txt) return;
      sub.disabled = true; sub.textContent = '⏳';
      await db.collection('forum').doc(postId).collection('replies').add({
        text:          txt,
        authorName:    _user.displayName?.split(' ')[0] || 'Üye',
        authorEmail:   _user.email,
        authorId:      _user.uid,
        authorPhotoURL:_user.photoURL || '',
        isAdmin:       isAdmin(_user),
        createdAt:     firebase.firestore.FieldValue.serverTimestamp(),
      });
      await db.collection('forum').doc(postId).update({ replyCount: firebase.firestore.FieldValue.increment(1) });
      // Notify post author
      if (post.authorId && post.authorId !== _user.uid) {
        db.collection('notifications').doc(post.authorId).collection('items').add({
          text: `${_user.displayName?.split(' ')[0] || 'Biri'}, "${post.title || 'konuna'}" konusuna yanıt verdi`,
          postId: postId,
          fromId: _user.uid,
          fromName: _user.displayName?.split(' ')[0] || 'Üye',
          read: false,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        }).catch(() => {});
      }
      ta.value = '';
      await renderPost();
    };
    row.append(ta, sub); formCard.append(ft, row);
  } else {
    formCard.innerHTML = `<div class="login-hint">Yanıt yazmak için giriş yap.<br><button onclick="doSignIn()">Google ile Giriş Yap</button></div>`;
  }
  layout.append(formCard);
}

auth.onAuthStateChanged(async user => {
  _user = user;
  updateAuthBar(user);
  initNotifications(user);
  await renderPost();
});
</script>
