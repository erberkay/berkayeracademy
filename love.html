<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>💖</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Mono&display=swap" rel="stylesheet">


<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#06000f;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  position:relative;
  font-family:'Playfair Display',serif;
  overflow-x:hidden;
  overflow-y:auto;
  padding:32px 0 60px;
  cursor:default;
}

.bg-glow{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 55%, rgba(140,10,60,.35) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(80,0,120,.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 20%, rgba(160,20,60,.2) 0%, transparent 60%);
  animation:bgBreath 5s ease-in-out infinite;
  pointer-events:none;z-index:0;
}
@keyframes bgBreath{0%,100%{opacity:1}50%{opacity:.65}}

.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.8;transform:scale(1.4)}}

.petals{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:2}
.petal{position:absolute;top:-40px;animation:petalFall linear forwards;opacity:0;font-size:1.1rem}
@keyframes petalFall{
  0%{opacity:0;transform:rotate(0deg) translateX(0)}
  10%{opacity:.9}90%{opacity:.6}
  100%{opacity:0;transform:rotate(360deg) translateX(30px) translateY(110vh)}
}

.snow-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:3}
.snowflake{position:absolute;top:-20px;color:#fff;animation:snowFall linear forwards;opacity:0;pointer-events:none}
@keyframes snowFall{
  0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}
  5%{opacity:.9}95%{opacity:.7}
  100%{transform:translateY(105vh) translateX(var(--dx)) rotate(360deg);opacity:0}
}

.click-heart{position:fixed;pointer-events:none;z-index:200;font-size:1.4rem;animation:clickHeartAnim .9s ease-out forwards}
@keyframes clickHeartAnim{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}
  60%{opacity:1;transform:translate(-50%,-120px) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-160px) scale(.8)}
}

.photo-burst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:250;pointer-events:none;font-size:6rem;animation:burstHeart .8s ease-out forwards}
@keyframes burstHeart{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}
}

.card{
  position:relative;z-index:20;
  text-align:center;
  padding:40px 36px 36px;
  max-width:460px;width:93vw;
  animation:cardIn .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

.photo-wrap{width:170px;height:170px;margin:0 auto 28px;position:relative;cursor:pointer}
.ring-spin{
  position:absolute;inset:-8px;border-radius:50%;
  background:conic-gradient(#e8527a 0deg,#ffb3c6 60deg,#c91a5c 120deg,#ff6b9d 180deg,#e8527a 240deg,#b5006e 300deg,#e8527a 360deg);
  animation:spinRing 3s linear infinite;
}
@keyframes spinRing{to{transform:rotate(360deg)}}
.ring-mask{position:absolute;inset:-4px;border-radius:50%;background:#06000f}
.photo-circle{
  position:absolute;inset:0;border-radius:50%;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:rgba(232,82,122,.12);font-size:3.8rem;
  animation:heartbeat 2s ease-in-out infinite;z-index:2;
}
.photo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}15%{transform:scale(1.06)}
  30%{transform:scale(1)}45%{transform:scale(1.04)}60%{transform:scale(1)}
}

.love-sub-name{
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.25em;
  text-transform:uppercase;color:rgba(232,82,122,.55);margin-bottom:10px;
  animation:fadeUp .7s .4s ease both;
}
.love-title{
  font-size:2.4rem;font-weight:700;line-height:1.15;color:#fff;
  margin-bottom:10px;animation:fadeUp .7s .55s ease both;
}
.love-title .accent{color:#e8527a;font-style:italic;display:inline-block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.first-met{
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.14em;
  color:rgba(232,82,122,.4);margin-bottom:18px;
  animation:fadeUp .7s .65s ease both;
}
.first-met span{color:rgba(232,82,122,.7)}

.counter{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-bottom:28px;animation:fadeUp .7s .8s ease both;
  flex-wrap:wrap;
}
.counter-block{
  background:rgba(232,82,122,.07);border:1px solid rgba(232,82,122,.18);
  border-radius:10px;padding:8px 14px;min-width:54px;
}
.counter-num{
  font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;
  color:#e8527a;display:block;line-height:1;
}
.counter-lbl{
  font-family:'Space Mono',monospace;font-size:.45rem;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(232,82,122,.45);display:block;margin-top:3px;
}
.counter-sep{color:rgba(232,82,122,.25);font-size:1.2rem;font-family:'Playfair Display',serif;padding-bottom:14px}

.love-body{
  font-style:italic;font-size:1.02rem;color:rgba(255,210,220,.65);
  line-height:1.9;margin-bottom:28px;min-height:12em;
  animation:fadeUp .7s .9s ease both;
}
.love-body .typed-line{display:block}

.love-forever{
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.18em;
  color:rgba(232,82,122,.45);text-transform:uppercase;
  border:1px solid rgba(232,82,122,.2);display:inline-block;
  padding:7px 22px;border-radius:20px;background:rgba(232,82,122,.04);
  animation:fadeUp .7s 1s ease both;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.back-link{
  position:fixed;top:16px;left:16px;z-index:100;
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.08em;
  color:rgba(255,255,255,.25);text-decoration:none;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  padding:6px 12px;border-radius:5px;transition:all .2s;
}
.back-link:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)}

.music-btn{
  position:fixed;bottom:24px;right:24px;z-index:100;
  width:52px;height:52px;border-radius:50%;
  background:rgba(232,82,122,.12);border:1px solid rgba(232,82,122,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;cursor:pointer;transition:all .25s;
  backdrop-filter:blur(8px);
}
.music-btn:hover{background:rgba(232,82,122,.22);transform:scale(1.08)}
.music-btn.playing{background:rgba(232,82,122,.25);border-color:rgba(232,82,122,.7);animation:musicPulse 1.5s ease-in-out infinite}
@keyframes musicPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,82,122,.4)}50%{box-shadow:0 0 0 12px rgba(232,82,122,0)}}

.yt-player{
  position:fixed;bottom:90px;right:24px;z-index:101;
  width:240px;border-radius:12px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  display:none;
}
.yt-player.open{display:block}
.yt-player iframe{display:block;width:100%;height:135px;border:0}

.cloud-layer{position:fixed;top:0;left:0;right:0;height:160px;pointer-events:none;overflow:hidden;z-index:2}
.cloud{position:absolute;pointer-events:none;animation:driftCloud linear infinite}
@keyframes driftCloud{0%{transform:translateX(-260px)}100%{transform:translateX(calc(100vw + 260px))}}

/* ── 3D canvas ── */
#charCanvas{
  position:fixed;bottom:0;left:0;
  pointer-events:none;z-index:4;
  display:block;
}
</style>
</head>

const START = new Date(2020,10,7,11,30,0);
function updateCounter(){
  const diff = new Date()-START, ts=Math.floor(diff/1000);
  const td=Math.floor(ts/86400), y=Math.floor(td/365);
  document.getElementById('cYears').textContent=y;
  document.getElementById('cDays').textContent=td%365;
  document.getElementById('cHours').textContent=String(Math.floor(ts/3600)%24).padStart(2,'0');
  document.getElementById('cMins').textContent=String(Math.floor(ts/60)%60).padStart(2,'0');
  document.getElementById('cSecs').textContent=String(ts%60).padStart(2,'0');
}
updateCounter(); setInterval(updateCounter,1000);

const POEM_LINES=['Seni çok özledim...','Her an, her yerde aklımdasın.','Seninle geçen her saniye bir hazine gibiydi.','','Göz yaşlarıma bir ateş gibi düşsen de','söndürsen hüznümü —','sensiz nefesim eksik.','','Yaşamak, yaşamak...','bu kelime eksiliyor hayatımdan.'];
(function typePoem(){
  const el=document.getElementById('loveBody'); el.innerHTML='';
  let li=0,ci=0;
  function addChar(){
    if(li>=POEM_LINES.length)return;
    const line=POEM_LINES[li];
    if(!el.children[li]){const sp=document.createElement('span');sp.className='typed-line';if(line==='')sp.innerHTML='<br>';el.appendChild(sp);}
    if(line===''){li++;ci=0;setTimeout(addChar,80);return;}
    el.children[li].textContent=(el.children[li].textContent||'')+line[ci++];
    if(ci>=line.length){li++;ci=0;setTimeout(addChar,250);}
    else setTimeout(addChar,45+Math.random()*30);
  }
  setTimeout(function go(){li=0;ci=0;el.innerHTML='';addChar();},1800);
})();

(function(){
  const el=document.getElementById('starsEl');
  for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s`;el.appendChild(s);}
})();

(function(){
  const el=document.getElementById('petalsEl'),items=['🌸','🌺','🌷'];
  function mk(){const p=document.createElement('div');p.className='petal';p.textContent=items[Math.floor(Math.random()*3)];p.style.cssText=`left:${Math.random()*100}%;font-size:${.6+Math.random()*.9}rem;animation-duration:${7+Math.random()*6}s;animation-delay:${Math.random()}s`;el.appendChild(p);setTimeout(()=>p.remove(),14000);}
  for(let i=0;i<8;i++)setTimeout(mk,i*500); setInterval(mk,800);
})();

document.addEventListener('click',function(e){
  if(e.target.closest('#photoWrap')||e.target.closest('#musicBtn')||e.target.closest('.back-link')||e.target.closest('.yt-player'))return;
  const h=document.createElement('div');h.className='click-heart';h.textContent=['❤️','💖','💗','💕'][Math.floor(Math.random()*4)];h.style.left=e.clientX+'px';h.style.top=e.clientY+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),950);
});

document.getElementById('photoWrap').addEventListener('click',function(){
  const b=document.createElement('div');b.className='photo-burst';b.textContent='❤️';document.body.appendChild(b);setTimeout(()=>b.remove(),850);
  for(let i=0;i<8;i++)setTimeout(()=>{const r=this.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,h=document.createElement('div');h.className='click-heart';h.textContent=['❤️','💖','💗'][Math.floor(Math.random()*3)];h.style.left=(cx+(Math.random()-.5)*120)+'px';h.style.top=cy+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),950);},i*80);
});

let snowActive=false,snowInterval=null;
const snowEl=document.getElementById('snowEl'),musicBtn=document.getElementById('musicBtn'),ytPlayer=document.getElementById('ytPlayer'),ytFrame=document.getElementById('ytFrame');
function makeSnow(){const s=document.createElement('div');s.className='snowflake';s.textContent=['❄️','❅','❆','·','•'][Math.floor(Math.random()*5)];const dx=(Math.random()-.5)*120;s.style.cssText=`left:${Math.random()*100}%;font-size:${.6+Math.random()*1.2}rem;animation-duration:${4+Math.random()*5}s;--dx:${dx}px`;snowEl.appendChild(s);setTimeout(()=>s.remove(),10000);}

(function(){
  const layer=document.getElementById('cloudLayer'),CC='rgba(160,185,230,';
  function mkC(top,w,dur,delay){const wrap=document.createElement('div');wrap.className='cloud';wrap.style.top=top+'px';wrap.style.animationDuration=dur+'s';wrap.style.animationDelay=delay+'s';const h=Math.round(w*.26),body=document.createElement('div');body.style.cssText=`position:relative;width:${w}px;height:${h}px;background:${CC}.08);border-radius:${w}px`;const b1s=Math.round(w*.44),b1=document.createElement('div');b1.style.cssText=`position:absolute;width:${b1s}px;height:${b1s}px;background:${CC}.08);border-radius:50%;top:${-Math.round(b1s*.52)}px;left:${Math.round(w*.1)}px`;const b2s=Math.round(w*.34),b2=document.createElement('div');b2.style.cssText=`position:absolute;width:${b2s}px;height:${b2s}px;background:${CC}.08);border-radius:50%;top:${-Math.round(b2s*.44)}px;left:${Math.round(w*.46)}px`;body.appendChild(b1);body.appendChild(b2);wrap.appendChild(body);layer.appendChild(wrap);}
  mkC(10,95,52,0);mkC(42,130,78,-28);mkC(8,70,58,-40);mkC(60,105,90,-55);mkC(28,80,65,-12);
})();

musicBtn.addEventListener('click',function(){
  snowActive=!snowActive;musicBtn.classList.toggle('playing',snowActive);musicBtn.textContent=snowActive?'🎵':'❄️';
  if(snowActive){for(let i=0;i<35;i++)setTimeout(makeSnow,i*60);snowInterval=setInterval(makeSnow,120);if(YT_VIDEO_ID){ytFrame.src=`https://www.youtube.com/embed/${YT_VIDEO_ID}?autoplay=1`;ytPlayer.classList.add('open');}}
  else{clearInterval(snowInterval);ytPlayer.classList.remove('open');ytFrame.src='';}
});
</script>

  "imports": {

<!-- ══════════════════════════════════════════════
     THREE.JS 3D SCENE — FBX character
══════════════════════════════════════════════ -->
<script type="module">
import * as THREE from 'three';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

// ── Renderer ──────────────────────────────────────────────────────────────
const CW = 460, CH = 520;
const canvas = document.getElementById('charCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(CW, CH);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ── Scene & Camera ────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(62, CW / CH, 0.1, 50);
cam.position.set(0, 1.8, 6.5);
cam.lookAt(-1.5, 1.8, 0);

// ── Lights ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.55));   // white ambient — characters need this

const fill = new THREE.DirectionalLight(0x9999cc, 0.5); // fill from camera direction
fill.position.set(1, 4, 7);
scene.add(fill);

const moon = new THREE.DirectionalLight(0x4466aa, 0.3);
moon.position.set(-3, 8, 2);
scene.add(moon);

// ── Ground ────────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(22, 9),
  new THREE.MeshLambertMaterial({ color: 0x0d0a1e })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Wet ground reflection tint under lamp
const wetGlow = new THREE.Mesh(
  new THREE.PlaneGeometry(3.8, 1.6),
  new THREE.MeshBasicMaterial({ color: 0xffdd77, transparent: true, opacity: 0.04, depthWrite: false })
);
wetGlow.rotation.x = -Math.PI / 2;
wetGlow.position.set(-1.4, 0.001, 0.4);
scene.add(wetGlow);

// ── Helpers ───────────────────────────────────────────────────────────────
function M(geo, mat) {
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  return m;
}
function G() { return new THREE.Group(); }
function lerp(a, b, t) { return a + (b - a) * t; }

// ── Street Lamp ───────────────────────────────────────────────────────────
const LAMP_X = -3.4, LAMP_Z = 0.3;
const metalM  = new THREE.MeshLambertMaterial({ color: 0x3a4a5a });
const lampGrp = G();

// base plate
const base = M(new THREE.CylinderGeometry(0.16, 0.20, 0.12, 12), metalM);
base.position.y = 0.06;
lampGrp.add(base);

// pole
const poleMesh = M(new THREE.CylinderGeometry(0.045, 0.07, 4.8, 8), metalM);
poleMesh.position.y = 2.46;
lampGrp.add(poleMesh);

// horizontal arm
const armMesh = M(new THREE.CylinderGeometry(0.028, 0.028, 2.2, 8), metalM);
armMesh.rotation.z = Math.PI / 2;
armMesh.position.set(1.1, 4.55, 0);
lampGrp.add(armMesh);

// lamp housing
const housingM = new THREE.MeshLambertMaterial({ color: 0x4a5a6a, emissive: 0xffcc22, emissiveIntensity: 0.4 });
const housingMesh = M(new THREE.BoxGeometry(0.52, 0.24, 0.4), housingM);
housingMesh.position.set(2.2, 4.55, 0);
lampGrp.add(housingMesh);

// glass cone (light spill downward)
const glassM = new THREE.MeshLambertMaterial({ color: 0xffee88, emissive: 0xffdd44, emissiveIntensity: 1.5, transparent: true, opacity: 0.9 });
const glassMesh = M(new THREE.CylinderGeometry(0.09, 0.19, 0.13, 14), glassM);
glassMesh.position.set(2.2, 4.4, 0);
lampGrp.add(glassMesh);

// point light
const lampPt = new THREE.PointLight(0xffdd77, 3.2, 8.0);
lampPt.position.set(2.2, 4.28, 0);
lampPt.castShadow = true;
lampPt.shadow.mapSize.set(512, 512);
lampGrp.add(lampPt);

// glow circle on ground (local y=0.502 = world y=0.002, above ground)
const glowCirc = M(
  new THREE.CircleGeometry(1.9, 32),
  new THREE.MeshBasicMaterial({ color: 0xffdd77, transparent: true, opacity: 0.06, depthWrite: false })
);
glowCirc.rotation.x = -Math.PI / 2;
glowCirc.position.set(2.2, 0.502, 0);
glowCirc.castShadow = false;
lampGrp.add(glowCirc);

// SpotLight — lamba konisi ve karakteri aydınlatır
const lampSpot = new THREE.SpotLight(0xffee77, 5.0, 9, Math.PI / 5.5, 0.38, 1.8);
lampSpot.position.set(2.2, 4.28, 0);
lampSpot.target.position.set(2.2, 0.5, 0);
lampSpot.castShadow = true;
lampSpot.shadow.mapSize.set(512, 512);
lampGrp.add(lampSpot);
lampGrp.add(lampSpot.target);

// Işık hüzmesi — çok hafif, sadece his verir
const coneMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(0.06, 1.3, 3.78, 20, 1, true),
  new THREE.MeshBasicMaterial({ color: 0xffee55, transparent: true, opacity: 0.028, side: THREE.BackSide, depthWrite: false })
);
coneMesh.position.set(2.2, 2.39, 0);
lampGrp.add(coneMesh);

// İç hüzme — merkez biraz daha parlak
const innerCone = new THREE.Mesh(
  new THREE.CylinderGeometry(0.03, 0.45, 3.78, 14, 1, true),
  new THREE.MeshBasicMaterial({ color: 0xfff8cc, transparent: true, opacity: 0.038, side: THREE.BackSide, depthWrite: false })
);
innerCone.position.set(2.2, 2.39, 0);
lampGrp.add(innerCone);

lampGrp.position.set(LAMP_X, -0.5, LAMP_Z);
scene.add(lampGrp);

// ── Rain Cloud ────────────────────────────────────────────────────────────
const cloudGrp = G();
const cloudM = new THREE.MeshLambertMaterial({ color: 0x1c2b3a, transparent: true, opacity: 0.94 });
// büyük bulut, z=-1.2 ile direkten çok önde
[
  [0,      0,     0,    0.72],
  [ 0.68, -0.10,  0.05, 0.58],
  [-0.68, -0.13,  0,    0.52],
  [ 0.36,  0.38,  0,    0.40],
  [-0.36,  0.33,  0,    0.36],
  [ 0.09,  0.52,  0.08, 0.30],
  [-0.09, -0.30,  0.09, 0.28],
].forEach(([x,y,z,r]) => {
  const m = M(new THREE.SphereGeometry(r, 14, 10), cloudM);
  m.position.set(x, y, z);
  cloudGrp.add(m);
});
cloudGrp.position.set(-5.5, 4.5, -1.2); // yüksek + direkten 1.5 birim önde
scene.add(cloudGrp);

// ── Rain ──────────────────────────────────────────────────────────────────
const RN = 110;
const rBuf = new Float32Array(RN * 6);
const rGeo = new THREE.BufferGeometry();
rGeo.setAttribute('position', new THREE.BufferAttribute(rBuf, 3));
const rainMesh = new THREE.LineSegments(
  rGeo,
  new THREE.LineBasicMaterial({ color: 0x6688aa, transparent: true, opacity: 0.48 })
);
scene.add(rainMesh);

const drops = Array.from({ length: RN }, () => ({
  x: (Math.random() - 0.5) * 2.8 - 2,
  y: Math.random() * 2.5 + 1.5,
  z: (Math.random() - 0.5) * 1.0,
  s: 3.5 + Math.random() * 3.5
}));

// ── FBX Character ─────────────────────────────────────────────────────────
let charObj = null, mixer = null;
let actions = {}, curAction = null;
let charState = 'loading';
let charX = -3.2, charTargetX = -1.8;
let WALK_SPEED = 0.5; // units/sec — klip yüklenince güncellenir
let charStateT = 0;
let charRotY = Math.PI / 2;       // mevcut rotasyon
let charTargetRotY = Math.PI / 2; // hedef rotasyon (smooth dönüş için)

const fbxLoader = new FBXLoader();

// Load character mesh
fbxLoader.load('https://storage.googleapis.com/ableton-tutorial-assets/karakter/Ch31_nonPBR.fbx', (fbx) => {
  fbx.scale.setScalar(0.012);
  fbx.position.set(charX, 0, 0);
  fbx.rotation.y = Math.PI / 2; // yürürken sağa bak (+X)
  fbx.traverse(child => { if (child.isMesh) child.frustumCulled = false; });
  mixer = new THREE.AnimationMixer(fbx);
  charObj = fbx;
  scene.add(charObj);

  // Walk animasyonu bitince otur (LoopOnce ile garanti 1 tekrar)
  mixer.addEventListener('finished', (e) => {
    if (charState === 'walking') {
      charX = charTargetX;
      charObj.position.x = charX;
      charTargetRotY = Math.PI;
      charState = 'sitting'; charStateT = 0;
      playAnim('sit', 1.0);
    }
  });

  const animFiles = {
    walk:    '/karakter/Standard Walk.fbx',
    sadIdle: '/karakter/Sad Idle.fbx',
    sit:     '/karakter/Sitting Idle.fbx',
    smoke:   '/karakter/Smoking.fbx',
  };
  let done = 0, total = Object.keys(animFiles).length;
  Object.entries(animFiles).forEach(([key, path]) => {
    fbxLoader.load(path, (animFbx) => {
      if (animFbx.animations[0]) {
        actions[key] = mixer.clipAction(animFbx.animations[0]);
        if (key === 'walk') {
          actions[key].setLoop(THREE.LoopOnce, 1); // sadece 1 kez
          actions[key].clampWhenFinished = true;
          actions[key].timeScale = 0.8;
          // Klip süresine göre hız hesapla — karakter tam 1 döngüde varır
          WALK_SPEED = (charTargetX - charX) / (animFbx.animations[0].duration / 0.8);
        } else {
          actions[key].setLoop(THREE.LoopRepeat);
        }
      }
      if (++done >= total && charState === 'loading') { charState = 'walking'; playAnim('walk'); }
    }, undefined, () => {
      if (++done >= total && charState === 'loading') { charState = 'walking'; playAnim('sadIdle'); }
    });
  });
}, undefined, err => console.error('[3D] model error:', err));

function playAnim(key, fade = 0.8) {
  const next = actions[key];
  if (!next || curAction === next) return;
  if (curAction) curAction.fadeOut(fade);
  next.reset().fadeIn(fade).play();
  curAction = next;
}

// ── Animation loop ────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let simT = 0;

(function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  simT += dt;

  if (mixer) mixer.update(dt);

  // Smooth rotasyon
  charRotY += (charTargetRotY - charRotY) * Math.min(dt * 4.0, 1.0);
  if (charObj) charObj.rotation.y = charRotY;

  // Karakter hareketi — geçiş mixer 'finished' event'i ile tetiklenir
  if (charObj && charState === 'walking') {
    charX = Math.min(charX + WALK_SPEED * dt, charTargetX);
    charObj.position.x = charX;
  } else if (charState !== 'loading') {
    charStateT += dt;
    // otur → ayağa kalk & sigara iç → üzgün dur → tekrar
    if      (charState === 'sitting'  && charStateT > 6.0)  { charState = 'smoking'; charStateT = 0; playAnim('smoke', 1.4); }
    else if (charState === 'smoking'  && charStateT > 10.0) { charState = 'sadIdle'; charStateT = 0; playAnim('sadIdle', 1.2); }
    else if (charState === 'sadIdle'  && charStateT > 7.0)  { charState = 'sitting'; charStateT = 0; playAnim('sit', 1.0); }
  }

  // Cloud follows character
  cloudGrp.position.x += (charX - cloudGrp.position.x) * dt * 0.85;
  cloudGrp.position.y = 4.5 + Math.sin(simT * 0.42) * 0.06;

  // Rain
  const cx = cloudGrp.position.x, cy = cloudGrp.position.y;
  for (let i = 0; i < RN; i++) {
    const d = drops[i];
    d.y -= d.s * dt;
    if (d.y < 0.02) {
      d.x = cx + (Math.random() - 0.5) * 2.6;
      d.y = cy - 0.38 + Math.random() * 0.42;
      d.z = (Math.random() - 0.5) * 1.0;
    }
    const b = i * 6;
    rBuf[b]=d.x; rBuf[b+1]=d.y; rBuf[b+2]=d.z;
    rBuf[b+3]=d.x-0.035; rBuf[b+4]=d.y-0.20; rBuf[b+5]=d.z;
  }
  rGeo.attributes.position.needsUpdate = true;

  // Lamp flicker
  lampPt.intensity = 3.5 + Math.sin(simT * 4.5) * 0.18 + Math.sin(simT * 12.3) * 0.08;

  renderer.render(scene, cam);
})();
</script>
</body>
