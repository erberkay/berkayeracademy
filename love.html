<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>💖</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#06000f;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  position:relative;
  font-family:'Playfair Display',serif;
  overflow-x:hidden;
  overflow-y:auto;
  padding:32px 0 60px;
  cursor:default;
}

/* ── Gradient background ── */
.bg-glow{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 55%, rgba(140,10,60,.35) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(80,0,120,.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 20%, rgba(160,20,60,.2) 0%, transparent 60%);
  animation:bgBreath 5s ease-in-out infinite;
  pointer-events:none;z-index:0;
}
@keyframes bgBreath{0%,100%{opacity:1}50%{opacity:.65}}

/* ── Stars ── */
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.8;transform:scale(1.4)}}

/* ── Floating hearts (ambient) ── */
.hearts{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:2}
.fheart{position:absolute;bottom:-60px;animation:floatUp linear forwards;opacity:0;pointer-events:none;user-select:none}
@keyframes floatUp{
  0%{transform:translateY(0) rotate(-15deg) scale(.8);opacity:0}
  8%{opacity:1}88%{opacity:.7}
  100%{transform:translateY(-110vh) rotate(25deg) scale(1.3);opacity:0}
}

/* ── Rose petals ── */
.petals{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:2}
.petal{position:absolute;top:-40px;animation:petalFall linear forwards;opacity:0;font-size:1.1rem}
@keyframes petalFall{
  0%{opacity:0;transform:rotate(0deg) translateX(0)}
  10%{opacity:.9}90%{opacity:.6}
  100%{opacity:0;transform:rotate(360deg) translateX(30px) translateY(110vh)}
}

/* ── Snow ── */
.snow-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:3}
.snowflake{position:absolute;top:-20px;color:#fff;animation:snowFall linear forwards;opacity:0;pointer-events:none}
@keyframes snowFall{
  0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}
  5%{opacity:.9}
  95%{opacity:.7}
  100%{transform:translateY(105vh) translateX(var(--dx)) rotate(360deg);opacity:0}
}

/* ── Click hearts ── */
.click-heart{position:fixed;pointer-events:none;z-index:200;font-size:1.4rem;animation:clickHeartAnim .9s ease-out forwards}
@keyframes clickHeartAnim{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}
  60%{opacity:1;transform:translate(-50%,-120px) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-160px) scale(.8)}
}

/* ── Photo heart burst ── */
.photo-burst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:250;pointer-events:none;font-size:6rem;animation:burstHeart .8s ease-out forwards}
@keyframes burstHeart{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}
}

/* ── Card ── */
.card{
  position:relative;z-index:20;
  text-align:center;
  padding:40px 36px 36px;
  max-width:460px;width:93vw;
  animation:cardIn .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

/* ── Photo ring ── */
.photo-wrap{width:170px;height:170px;margin:0 auto 28px;position:relative;cursor:pointer}
.ring-spin{
  position:absolute;inset:-8px;border-radius:50%;
  background:conic-gradient(#e8527a 0deg,#ffb3c6 60deg,#c91a5c 120deg,#ff6b9d 180deg,#e8527a 240deg,#b5006e 300deg,#e8527a 360deg);
  animation:spinRing 3s linear infinite;
}
@keyframes spinRing{to{transform:rotate(360deg)}}
.ring-mask{position:absolute;inset:-4px;border-radius:50%;background:#06000f}
.photo-circle{
  position:absolute;inset:0;border-radius:50%;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:rgba(232,82,122,.12);font-size:3.8rem;
  animation:heartbeat 2s ease-in-out infinite;z-index:2;
}
.photo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}15%{transform:scale(1.06)}
  30%{transform:scale(1)}45%{transform:scale(1.04)}60%{transform:scale(1)}
}

/* ── Name ── */
.love-sub-name{
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.25em;
  text-transform:uppercase;color:rgba(232,82,122,.55);margin-bottom:10px;
  animation:fadeUp .7s .4s ease both;
}

/* ── Title ── */
.love-title{
  font-size:2.4rem;font-weight:700;line-height:1.15;color:#fff;
  margin-bottom:10px;animation:fadeUp .7s .55s ease both;
}
.love-title .accent{color:#e8527a;font-style:italic;display:inline-block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* ── First met ── */
.first-met{
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.14em;
  color:rgba(232,82,122,.4);margin-bottom:18px;
  animation:fadeUp .7s .65s ease both;
}
.first-met span{color:rgba(232,82,122,.7)}

/* ── Counter ── */
.counter{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-bottom:28px;animation:fadeUp .7s .8s ease both;
  flex-wrap:wrap;
}
.counter-block{
  background:rgba(232,82,122,.07);border:1px solid rgba(232,82,122,.18);
  border-radius:10px;padding:8px 14px;min-width:54px;
}
.counter-num{
  font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;
  color:#e8527a;display:block;line-height:1;
}
.counter-lbl{
  font-family:'Space Mono',monospace;font-size:.45rem;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(232,82,122,.45);display:block;margin-top:3px;
}
.counter-sep{color:rgba(232,82,122,.25);font-size:1.2rem;font-family:'Playfair Display',serif;padding-bottom:14px}

/* ── Poem ── */
.love-body{
  font-style:italic;font-size:1.02rem;color:rgba(255,210,220,.65);
  line-height:1.9;margin-bottom:28px;min-height:12em;
  animation:fadeUp .7s .9s ease both;
}
.love-body .typed-line{display:block}

/* ── Forever ── */
.love-forever{
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.18em;
  color:rgba(232,82,122,.45);text-transform:uppercase;
  border:1px solid rgba(232,82,122,.2);display:inline-block;
  padding:7px 22px;border-radius:20px;background:rgba(232,82,122,.04);
  animation:fadeUp .7s 1s ease both;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ── Back ── */
.back-link{
  position:fixed;top:16px;left:16px;z-index:100;
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.08em;
  color:rgba(255,255,255,.25);text-decoration:none;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  padding:6px 12px;border-radius:5px;transition:all .2s;
}
.back-link:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)}

/* ── Music / Snow button ── */
.music-btn{
  position:fixed;bottom:24px;right:24px;z-index:100;
  width:52px;height:52px;border-radius:50%;
  background:rgba(232,82,122,.12);border:1px solid rgba(232,82,122,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;cursor:pointer;transition:all .25s;
  backdrop-filter:blur(8px);
}
.music-btn:hover{background:rgba(232,82,122,.22);transform:scale(1.08)}
.music-btn.playing{background:rgba(232,82,122,.25);border-color:rgba(232,82,122,.7);animation:musicPulse 1.5s ease-in-out infinite}
@keyframes musicPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,82,122,.4)}50%{box-shadow:0 0 0 12px rgba(232,82,122,0)}}

/* ── YouTube mini player ── */
.yt-player{
  position:fixed;bottom:90px;right:24px;z-index:101;
  width:240px;border-radius:12px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  display:none;
}
.yt-player.open{display:block}
.yt-player iframe{display:block;width:100%;height:135px;border:0}

/* ── Clouds ── */
.cloud-layer{position:fixed;top:0;left:0;right:0;height:160px;pointer-events:none;overflow:hidden;z-index:2}
.cloud{position:absolute;pointer-events:none;animation:driftCloud linear infinite}
@keyframes driftCloud{0%{transform:translateX(-260px)}100%{transform:translateX(calc(100vw + 260px))}}

/* ── 8-bit scene bottom ── */
#bitScene{position:fixed;bottom:0;left:50%;transform:translateX(-50%);pointer-events:none;z-index:4;image-rendering:pixelated;image-rendering:crisp-edges}
</style>
</head>

// ── Love counter (7 Kasım 2020) ──
const START = new Date(2020, 10, 7, 11, 30, 0); // month is 0-indexed
function updateCounter() {
  const now  = new Date();
  const diff = now - START;
  const totalSecs = Math.floor(diff / 1000);
  const secs  = totalSecs % 60;
  const mins  = Math.floor(totalSecs / 60) % 60;
  const hours = Math.floor(totalSecs / 3600) % 24;
  const totalDays = Math.floor(totalSecs / 86400);
  const years = Math.floor(totalDays / 365);
  const days  = totalDays % 365;
  document.getElementById('cYears').textContent = years;
  document.getElementById('cDays').textContent  = days;
  document.getElementById('cHours').textContent = String(hours).padStart(2,'0');
  document.getElementById('cMins').textContent  = String(mins).padStart(2,'0');
  document.getElementById('cSecs').textContent  = String(secs).padStart(2,'0');
}
updateCounter();
setInterval(updateCounter, 1000);

// ── Typewriter poem ──
const POEM_LINES = [
  'Seni çok özledim...',
  'Her an, her yerde aklımdasın.',
  'Seninle geçen her saniye bir hazine gibiydi.',
  '',
  'Göz yaşlarıma bir ateş gibi düşsen de',
  'söndürsen hüznümü —',
  'sensiz nefesim eksik.',
  '',
  'Yaşamak, yaşamak...',
  'bu kelime eksiliyor hayatımdan.'
];
(function typePoem() {
  const el = document.getElementById('loveBody');
  el.innerHTML = '';
  let li = 0, ci = 0;
  const lines = POEM_LINES;
  function addChar() {
    if (li >= lines.length) return;
    const line = lines[li];
    if (!el.children[li]) {
      const span = document.createElement('span');
      span.className = 'typed-line';
      if (line === '') span.innerHTML = '<br>';
      el.appendChild(span);
    }
    if (line === '') { li++; ci=0; setTimeout(addChar, 80); return; }
    el.children[li].textContent = (el.children[li].textContent || '') + line[ci];
    ci++;
    if (ci >= line.length) { li++; ci=0; setTimeout(addChar, 250); }
    else { setTimeout(addChar, 45 + Math.random()*30); }
  }
  setTimeout(typePoem, 1800);
  function typePoem() { li=0; ci=0; el.innerHTML=''; addChar(); }
})();

// ── Ambient floating hearts ──

// ── Rose petals ──

// ── 2. Click anywhere → heart at cursor ──
document.addEventListener('click', function(e) {

function makeSnow() {

// ── Clouds ──
(function(){
  const layer = document.getElementById('cloudLayer');
  const CC = 'rgba(160,185,230,';
  function mkCloud(top, w, dur, delay) {
    const wrap = document.createElement('div');
    wrap.className = 'cloud';
    wrap.style.top = top + 'px';
    wrap.style.animationDuration = dur + 's';
    wrap.style.animationDelay = delay + 's';
    const h = Math.round(w * 0.26);
    const body = document.createElement('div');
    body.style.cssText = `position:relative;width:${w}px;height:${h}px;background:${CC}.08);border-radius:${w}px`;
    const b1s = Math.round(w * 0.44);
    const b1 = document.createElement('div');
    b1.style.cssText = `position:absolute;width:${b1s}px;height:${b1s}px;background:${CC}.08);border-radius:50%;top:${-Math.round(b1s*.52)}px;left:${Math.round(w*.1)}px`;
    const b2s = Math.round(w * 0.34);
    const b2 = document.createElement('div');
    b2.style.cssText = `position:absolute;width:${b2s}px;height:${b2s}px;background:${CC}.08);border-radius:50%;top:${-Math.round(b2s*.44)}px;left:${Math.round(w*.46)}px`;
    body.appendChild(b1); body.appendChild(b2);
    wrap.appendChild(body); layer.appendChild(wrap);
  }
  mkCloud(10,  95,  52, 0);
  mkCloud(42, 130,  78, -28);
  mkCloud(8,   70,  58, -40);
  mkCloud(60, 105,  90, -55);
  mkCloud(28,  80,  65, -12);
})();

// ── 8-bit sad child + bare tree scene ──
(function(){
  const canvas = document.getElementById('bitScene');
  const P = 4;        // screen px per virtual pixel
  const VW = 96, VH = 26;
  canvas.width  = VW * P;
  canvas.height = VH * P;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  function dot(x, y, col) {
    if (x < 0 || y < 0 || x >= VW || y >= VH) return;
    ctx.fillStyle = col; ctx.fillRect(x*P, y*P, P, P);
  }

  const WD='#5c3b2a', DK='#3a2418';   // tree wood / bark
  const SN='#ddf2fc', SG='#b4d6ec';   // snow / snow-ground
  const SK='#f6c8a6', HA='#281508';   // skin / hair
  const EY='#100804', TE='#9dd8f0';   // eye / tear
  const MO='#c06858';                  // mouth
  const SH='#1c3d6b', PA='#0e2444';   // shirt / pants

  // Snow ground (rows 21–25)
  for (let x = 0; x < VW; x++) {
    dot(x, 21, SN);
    dot(x, 22, SG); dot(x, 23, SG); dot(x, 24, SG); dot(x, 25, SG);
  }

  // ── Bare winter tree (trunk center x=15–16) ──
  for (let y = 5; y <= 20; y++) { dot(15,y,DK); dot(16,y,WD); }  // trunk
  for (let y = 1; y <= 4;  y++) { dot(15,y,DK); dot(16,y,WD); }  // spire

  // Branch left-1 (rows 8–10, cols 5–14)
  for (let i = 0; i <= 9; i++) { dot(14-i, 8 + (i>5?1:0) + (i>8?1:0), WD); }
  dot(5,10,SN); dot(6,9,SN);

  // Branch right-1 (rows 6–8, cols 17–26)
  for (let i = 0; i <= 8; i++) { dot(17+i, 6 + (i>4?1:0) + (i>7?1:0), WD); }
  dot(24,8,SN); dot(25,7,SN);

  // Branch left-2 (rows 5–6, cols 7–14)
  for (let i = 0; i <= 7; i++) { dot(14-i, 5 + (i>4?1:0), WD); }
  dot(7,5,SN); dot(8,4,SN);

  // Branch right-2 (rows 3–4, cols 17–23)
  for (let i = 0; i <= 6; i++) { dot(17+i, 3 + (i>3?1:0), WD); }
  dot(22,3,SN); dot(23,2,SN);

  // Top twig
  dot(14,1,WD); dot(15,1,WD);

  // Snow pile at trunk base
  for (let x = 12; x <= 20; x++) dot(x, 20, SN);

  // ── Sad 8-bit child (origin: virtual x=38, y=9) ──
  // Character: 9 wide × 13 tall pixels
  const OX = 38, OY = 9;
  function ch(x, y, col) { dot(OX+x, OY+y, col); }

  // Hair (rows 0–1)
  [1,2,3,4,5,6].forEach(x => ch(x, 0, HA));
  [0,1,2,3,4,5,6,7].forEach(x => ch(x, 1, HA));

  // Face skin (rows 2–6)
  for (let r = 2; r <= 6; r++) for (let x = 1; x <= 7; x++) ch(x, r, SK);
  // Chin (row 7)
  [2,3,4,5,6].forEach(x => ch(x, 7, SK));

  // Sad eyebrows: outer high → inner low (furrowed inward)
  ch(1, 2, HA); ch(2, 3, HA);   // left brow slopes down inward
  ch(7, 2, HA); ch(6, 3, HA);   // right brow slopes down inward

  // Eyes (row 4) — simple dot eyes
  ch(2, 4, EY); ch(6, 4, EY);

  // Tears (rows 5–6)
  ch(2, 5, TE); ch(6, 5, TE);
  ch(2, 6, TE);                  // left tear drips lower

  // Frown mouth: corners UP, center DOWN = ∩ shape = sad
  ch(2, 6, MO); ch(6, 6, MO);   // corners (higher row = upper position)
  ch(3, 7, MO); ch(4, 7, MO); ch(5, 7, MO); // center dips down

  // Neck
  ch(3, 7, SK); ch(4, 7, SK);

  // Shirt (rows 8–10) + arms hanging beside body (rows 8–12)
  for (let r = 8; r <= 10; r++) for (let x = 1; x <= 7; x++) ch(x, r, SH);
  for (let r = 8; r <= 12; r++) { ch(0, r, SH); ch(8, r, SH); }  // hanging arms
  ch(0, 12, SK); ch(8, 12, SK);  // hands

  // Pants (rows 11–12)
  for (let r = 11; r <= 12; r++) for (let x = 1; x <= 7; x++) ch(x, r, PA);

  // Legs (rows 13–14)
  [1,2].forEach(x => { ch(x,13,PA); ch(x,14,PA); });
  [6,7].forEach(x => { ch(x,13,PA); ch(x,14,PA); });

  // Feet (row 14, slightly wider = hunched posture)
  [0,1,2,3].forEach(x => ch(x, 14, PA));  // left foot turns inward
  [5,6,7,8].forEach(x => ch(x, 14, PA));  // right foot turns inward
})();

musicBtn.addEventListener('click', function() {
  snowActive = !snowActive;
  musicBtn.classList.toggle('playing', snowActive);
  musicBtn.textContent = snowActive ? '🎵' : '❄️';

  if (snowActive) {
    for(let i=0;i<20;i++) setTimeout(makeSnow, i*100);
    snowInterval = setInterval(makeSnow, 250);
    // Load YouTube if ID is set
    if (YT_VIDEO_ID) {
      ytFrame.src = `https://www.youtube.com/embed/${YT_VIDEO_ID}?autoplay=1`;
      ytPlayer.classList.add('open');
    }
  } else {
    clearInterval(snowInterval);
    snowEl.innerHTML = '';
    ytPlayer.classList.remove('open');
    ytFrame.src = '';
  }
});
</script>
