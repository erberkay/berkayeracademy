<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>💖</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}

body{
  background:#06000f;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  font-family:'Playfair Display',serif;
}

/* ── Gradient background ── */
.bg-glow{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 60%, rgba(140,10,60,.35) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(80,0,120,.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 20%, rgba(160,20,60,.2) 0%, transparent 60%);
  animation:bgBreath 5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes bgBreath{0%,100%{opacity:1}50%{opacity:.65}}

/* ── Stars ── */
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.star{
  position:absolute;
  width:2px;height:2px;
  background:#fff;
  border-radius:50%;
  animation:twinkle ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.8;transform:scale(1.4)}}

/* ── Floating hearts ── */
.hearts{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.fheart{
  position:absolute;
  bottom:-60px;
  animation:floatUp linear forwards;
  opacity:0;
  pointer-events:none;
  user-select:none;
}
@keyframes floatUp{
  0%{transform:translateY(0) rotate(-15deg) scale(.8);opacity:0}
  8%{opacity:1}
  88%{opacity:.7}
  100%{transform:translateY(-110vh) rotate(25deg) scale(1.3);opacity:0}
}

/* ── Card ── */
.card{
  position:relative;
  z-index:20;
  text-align:center;
  padding:44px 36px 40px;
  max-width:440px;
  width:92vw;
  animation:cardIn .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

/* ── Photo ring ── */
.photo-wrap{
  width:170px;height:170px;
  margin:0 auto 36px;
  position:relative;
}
.ring-spin{
  position:absolute;inset:-8px;
  border-radius:50%;
  background:conic-gradient(
    #e8527a 0deg,
    #ffb3c6 60deg,
    #c91a5c 120deg,
    #ff6b9d 180deg,
    #e8527a 240deg,
    #b5006e 300deg,
    #e8527a 360deg
  );
  animation:spinRing 3s linear infinite;
}
@keyframes spinRing{to{transform:rotate(360deg)}}
.ring-mask{
  position:absolute;inset:-4px;
  border-radius:50%;
  background:#06000f;
}
.photo-circle{
  position:absolute;inset:0;
  border-radius:50%;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:rgba(232,82,122,.12);
  font-size:3.8rem;
  animation:heartbeat 2s ease-in-out infinite;
  z-index:2;
}
.photo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}
  15%{transform:scale(1.06)}
  30%{transform:scale(1)}
  45%{transform:scale(1.04)}
  60%{transform:scale(1)}
}

/* ── Text ── */
.love-sub-name{
  font-family:'Space Mono',monospace;
  font-size:.65rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:rgba(232,82,122,.55);
  margin-bottom:10px;
  animation:fadeUp .7s .4s ease both;
}
.love-title{
  font-size:2.4rem;
  font-weight:700;
  line-height:1.15;
  color:#fff;
  margin-bottom:14px;
  animation:fadeUp .7s .55s ease both;
}
.love-title .accent{
  color:#e8527a;
  font-style:italic;
  display:inline-block;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.love-body{
  font-style:italic;
  font-size:1.05rem;
  color:rgba(255,210,220,.65);
  line-height:1.85;
  margin-bottom:28px;
  animation:fadeUp .7s .75s ease both;
}
.love-forever{
  font-family:'Space Mono',monospace;
  font-size:.6rem;
  letter-spacing:.18em;
  color:rgba(232,82,122,.45);
  text-transform:uppercase;
  border:1px solid rgba(232,82,122,.2);
  display:inline-block;
  padding:7px 22px;
  border-radius:20px;
  background:rgba(232,82,122,.04);
  animation:fadeUp .7s 1s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:none}
}

/* ── Back ── */
.back-link{
  position:fixed;top:16px;left:16px;
  z-index:100;
  font-family:'Space Mono',monospace;
  font-size:.58rem;
  letter-spacing:.08em;
  color:rgba(255,255,255,.25);
  text-decoration:none;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  padding:6px 12px;
  border-radius:5px;
  transition:all .2s;
}
.back-link:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)}

/* ── Petal petals ── */
.petals{position:fixed;inset:0;pointer-events:none;overflow:hidden}
.petal{
  position:absolute;top:-40px;
  animation:petalFall linear forwards;
  opacity:0;
  font-size:1.1rem;
}
@keyframes petalFall{
  0%{opacity:0;transform:rotate(0deg) translateX(0)}
  10%{opacity:.9}
  90%{opacity:.6}
  100%{opacity:0;transform:rotate(360deg) translateX(30px) translateY(110vh)}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="stars" id="starsEl"></div>
<div class="hearts" id="heartsEl"></div>
<div class="petals" id="petalsEl"></div>

<a href="/" class="back-link">← Geri</a>

<div class="card">
  <div class="photo-wrap">
    <div class="ring-spin"></div>
    <div class="ring-mask"></div>
    <div class="photo-circle" id="photoCircle"><img src="eeee.png" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>
  </div>
  <div class="love-sub-name" id="loveName">Elif...</div>
  <div class="love-title">Seni çok <span class="accent">seviyorum</span></div>
  <div class="love-body">
    Seni çok özledim...<br>
    Her an, her yerde aklındasın.<br>
    Seninle geçen her saniye bir hazine gibiydi.<br><br>
    Göz yaşlarıma bir ateş gibi düşsen de<br>
    söndürsen hüznümü —<br>
    sensiz nefesim eksik.<br><br>
    Yaşamak, yaşamak...<br>
    bu kelime eksiliyor hayatımdan.
  </div>
  <div class="love-forever">∞ &nbsp; Sonsuza kadar &nbsp; ∞</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
const LOVE_EMAIL  = 'elifaras12@gmail.com';
const ADMIN_EMAIL = 'berkayer032@gmail.com';

firebase.initializeApp({
  apiKey:            "AIzaSyDX8AkwDejrkh5L4xUXQcmzKq-DYvc2E8A",
  authDomain:        "ableton-tutorial.firebaseapp.com",
  projectId:         "ableton-tutorial",
  storageBucket:     "ableton-tutorial.firebasestorage.app",
  messagingSenderId: "677640687230",
  appId:             "1:677640687230:web:8c6a2dfefbf55c69ffd22f",
});

const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (!user || (user.email !== LOVE_EMAIL && user.email !== ADMIN_EMAIL)) {
    location.replace('/');
    return;
  }

  // Name — only update if it's the dedicated user
  if (user.email === LOVE_EMAIL) {
    const firstName = user.displayName?.trim().split(' ')[0] || '';
    if (firstName) {
      document.getElementById('loveName').textContent = firstName + '...';
    }
  }
});

// ── Stars ──
(function() {
  const el = document.getElementById('starsEl');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s`;
    el.appendChild(s);
  }
})();

// ── Floating hearts ──
(function() {
  const el = document.getElementById('heartsEl');
  const items = ['❤️','💕','💖','💗','💝','🌹','✨','💫','🌸','💞','🫶','💘'];
  function makeHeart() {
    const h = document.createElement('div');
    h.className = 'fheart';
    h.textContent = items[Math.floor(Math.random() * items.length)];
    h.style.cssText = `left:${Math.random()*100}%;font-size:${.7+Math.random()*1.8}rem;animation-duration:${5+Math.random()*7}s;animation-delay:${Math.random()*1.5}s`;
    el.appendChild(h);
    setTimeout(() => h.remove(), 13000);
  }
  for (let i = 0; i < 18; i++) setTimeout(makeHeart, i * 200);
  setInterval(makeHeart, 450);
})();

// ── Rose petals ──
(function() {
  const el = document.getElementById('petalsEl');
  const items = ['🌸','🌺','🌷'];
  function makePetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = items[Math.floor(Math.random() * items.length)];
    p.style.cssText = `left:${Math.random()*100}%;font-size:${.6+Math.random()*.9}rem;animation-duration:${7+Math.random()*6}s;animation-delay:${Math.random()}s`;
    el.appendChild(p);
    setTimeout(() => p.remove(), 14000);
  }
  for (let i = 0; i < 8; i++) setTimeout(makePetal, i * 500);
  setInterval(makePetal, 800);
})();
</script>
</body>
</html>
