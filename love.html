<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>💖</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#06000f;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  position:relative;
  font-family:'Playfair Display',serif;
  overflow-x:hidden;
  overflow-y:auto;
  padding:32px 0 60px;
  cursor:default;
}

/* ── Gradient background ── */
.bg-glow{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 55%, rgba(140,10,60,.35) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 20% 80%, rgba(80,0,120,.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 20%, rgba(160,20,60,.2) 0%, transparent 60%);
  animation:bgBreath 5s ease-in-out infinite;
  pointer-events:none;z-index:0;
}
@keyframes bgBreath{0%,100%{opacity:1}50%{opacity:.65}}

/* ── Stars ── */
.stars{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.8;transform:scale(1.4)}}


/* ── Rose petals ── */
.petals{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:2}
.petal{position:absolute;top:-40px;animation:petalFall linear forwards;opacity:0;font-size:1.1rem}
@keyframes petalFall{
  0%{opacity:0;transform:rotate(0deg) translateX(0)}
  10%{opacity:.9}90%{opacity:.6}
  100%{opacity:0;transform:rotate(360deg) translateX(30px) translateY(110vh)}
}

/* ── Snow ── */
.snow-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:3}
.snowflake{position:absolute;top:-20px;color:#fff;animation:snowFall linear forwards;opacity:0;pointer-events:none}
@keyframes snowFall{
  0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0}
  5%{opacity:.9}
  95%{opacity:.7}
  100%{transform:translateY(105vh) translateX(var(--dx)) rotate(360deg);opacity:0}
}

/* ── Click hearts ── */
.click-heart{position:fixed;pointer-events:none;z-index:200;font-size:1.4rem;animation:clickHeartAnim .9s ease-out forwards}
@keyframes clickHeartAnim{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}
  60%{opacity:1;transform:translate(-50%,-120px) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-160px) scale(.8)}
}

/* ── Photo heart burst ── */
.photo-burst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:250;pointer-events:none;font-size:6rem;animation:burstHeart .8s ease-out forwards}
@keyframes burstHeart{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}
}

/* ── Card ── */
.card{
  position:relative;z-index:20;
  text-align:center;
  padding:40px 36px 36px;
  max-width:460px;width:93vw;
  animation:cardIn .9s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

/* ── Photo ring ── */
.photo-wrap{width:170px;height:170px;margin:0 auto 28px;position:relative;cursor:pointer}
.ring-spin{
  position:absolute;inset:-8px;border-radius:50%;
  background:conic-gradient(#e8527a 0deg,#ffb3c6 60deg,#c91a5c 120deg,#ff6b9d 180deg,#e8527a 240deg,#b5006e 300deg,#e8527a 360deg);
  animation:spinRing 3s linear infinite;
}
@keyframes spinRing{to{transform:rotate(360deg)}}
.ring-mask{position:absolute;inset:-4px;border-radius:50%;background:#06000f}
.photo-circle{
  position:absolute;inset:0;border-radius:50%;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:rgba(232,82,122,.12);font-size:3.8rem;
  animation:heartbeat 2s ease-in-out infinite;z-index:2;
}
.photo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}
@keyframes heartbeat{
  0%,100%{transform:scale(1)}15%{transform:scale(1.06)}
  30%{transform:scale(1)}45%{transform:scale(1.04)}60%{transform:scale(1)}
}

/* ── Name ── */
.love-sub-name{
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.25em;
  text-transform:uppercase;color:rgba(232,82,122,.55);margin-bottom:10px;
  animation:fadeUp .7s .4s ease both;
}

/* ── Title ── */
.love-title{
  font-size:2.4rem;font-weight:700;line-height:1.15;color:#fff;
  margin-bottom:10px;animation:fadeUp .7s .55s ease both;
}
.love-title .accent{color:#e8527a;font-style:italic;display:inline-block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* ── First met ── */
.first-met{
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.14em;
  color:rgba(232,82,122,.4);margin-bottom:18px;
  animation:fadeUp .7s .65s ease both;
}
.first-met span{color:rgba(232,82,122,.7)}

/* ── Counter ── */
.counter{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-bottom:28px;animation:fadeUp .7s .8s ease both;
  flex-wrap:wrap;
}
.counter-block{
  background:rgba(232,82,122,.07);border:1px solid rgba(232,82,122,.18);
  border-radius:10px;padding:8px 14px;min-width:54px;
}
.counter-num{
  font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;
  color:#e8527a;display:block;line-height:1;
}
.counter-lbl{
  font-family:'Space Mono',monospace;font-size:.45rem;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(232,82,122,.45);display:block;margin-top:3px;
}
.counter-sep{color:rgba(232,82,122,.25);font-size:1.2rem;font-family:'Playfair Display',serif;padding-bottom:14px}

/* ── Poem ── */
.love-body{
  font-style:italic;font-size:1.02rem;color:rgba(255,210,220,.65);
  line-height:1.9;margin-bottom:28px;min-height:12em;
  animation:fadeUp .7s .9s ease both;
}
.love-body .typed-line{display:block}

/* ── Forever ── */
.love-forever{
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.18em;
  color:rgba(232,82,122,.45);text-transform:uppercase;
  border:1px solid rgba(232,82,122,.2);display:inline-block;
  padding:7px 22px;border-radius:20px;background:rgba(232,82,122,.04);
  animation:fadeUp .7s 1s ease both;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ── Back ── */
.back-link{
  position:fixed;top:16px;left:16px;z-index:100;
  font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.08em;
  color:rgba(255,255,255,.25);text-decoration:none;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  padding:6px 12px;border-radius:5px;transition:all .2s;
}
.back-link:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2)}

/* ── Music / Snow button ── */
.music-btn{
  position:fixed;bottom:24px;right:24px;z-index:100;
  width:52px;height:52px;border-radius:50%;
  background:rgba(232,82,122,.12);border:1px solid rgba(232,82,122,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;cursor:pointer;transition:all .25s;
  backdrop-filter:blur(8px);
}
.music-btn:hover{background:rgba(232,82,122,.22);transform:scale(1.08)}
.music-btn.playing{background:rgba(232,82,122,.25);border-color:rgba(232,82,122,.7);animation:musicPulse 1.5s ease-in-out infinite}
@keyframes musicPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,82,122,.4)}50%{box-shadow:0 0 0 12px rgba(232,82,122,0)}}

/* ── YouTube mini player ── */
.yt-player{
  position:fixed;bottom:90px;right:24px;z-index:101;
  width:240px;border-radius:12px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.7);
  display:none;
}
.yt-player.open{display:block}
.yt-player iframe{display:block;width:100%;height:135px;border:0}

/* ── Clouds ── */
.cloud-layer{position:fixed;top:0;left:0;right:0;height:160px;pointer-events:none;overflow:hidden;z-index:2}
.cloud{position:absolute;pointer-events:none;animation:driftCloud linear infinite}
@keyframes driftCloud{0%{transform:translateX(-260px)}100%{transform:translateX(calc(100vw + 260px))}}

/* ── 3D scene bottom-left ── */
#bitScene{position:fixed;bottom:0;left:0;pointer-events:none;z-index:4;}
</style>
</head>

// ── Love counter (7 Kasım 2020) ──
const START = new Date(2020, 10, 7, 11, 30, 0); // month is 0-indexed
function updateCounter() {
  const now  = new Date();
  const diff = now - START;
  const totalSecs = Math.floor(diff / 1000);
  const secs  = totalSecs % 60;
  const mins  = Math.floor(totalSecs / 60) % 60;
  const hours = Math.floor(totalSecs / 3600) % 24;
  const totalDays = Math.floor(totalSecs / 86400);
  const years = Math.floor(totalDays / 365);
  const days  = totalDays % 365;
  document.getElementById('cYears').textContent = years;
  document.getElementById('cDays').textContent  = days;
  document.getElementById('cHours').textContent = String(hours).padStart(2,'0');
  document.getElementById('cMins').textContent  = String(mins).padStart(2,'0');
  document.getElementById('cSecs').textContent  = String(secs).padStart(2,'0');
}
updateCounter();
setInterval(updateCounter, 1000);

// ── Typewriter poem ──
const POEM_LINES = [
  'Seni çok özledim...',
  'Her an, her yerde aklımdasın.',
  'Seninle geçen her saniye bir hazine gibiydi.',
  '',
  'Göz yaşlarıma bir ateş gibi düşsen de',
  'söndürsen hüznümü —',
  'sensiz nefesim eksik.',
  '',
  'Yaşamak, yaşamak...',
  'bu kelime eksiliyor hayatımdan.'
];
(function typePoem() {
  const el = document.getElementById('loveBody');
  el.innerHTML = '';
  let li = 0, ci = 0;
  const lines = POEM_LINES;
  function addChar() {
    if (li >= lines.length) return;
    const line = lines[li];
    if (!el.children[li]) {
      const span = document.createElement('span');
      span.className = 'typed-line';
      if (line === '') span.innerHTML = '<br>';
      el.appendChild(span);
    }
    if (line === '') { li++; ci=0; setTimeout(addChar, 80); return; }
    el.children[li].textContent = (el.children[li].textContent || '') + line[ci];
    ci++;
    if (ci >= line.length) { li++; ci=0; setTimeout(addChar, 250); }
    else { setTimeout(addChar, 45 + Math.random()*30); }
  }
  setTimeout(typePoem, 1800);
  function typePoem() { li=0; ci=0; el.innerHTML=''; addChar(); }
})();

// ── Stars ──
(function(){
  const el = document.getElementById('starsEl');
  for(let i=0;i<80;i++){
    const s=document.createElement('div'); s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s`;

  }
})();


// ── Rose petals ──
(function(){
  const el=document.getElementById('petalsEl');
  const items=['🌸','🌺','🌷'];
  function makePetal(){
    const p=document.createElement('div'); p.className='petal';
    p.textContent=items[Math.floor(Math.random()*items.length)];
    p.style.cssText=`left:${Math.random()*100}%;font-size:${.6+Math.random()*.9}rem;animation-duration:${7+Math.random()*6}s;animation-delay:${Math.random()}s`;
    el.appendChild(p); setTimeout(()=>p.remove(),14000);
  }
  for(let i=0;i<8;i++) setTimeout(makePetal,i*500);
  setInterval(makePetal,800);
})();

// ── 2. Click anywhere → heart at cursor ──
document.addEventListener('click', function(e) {
  if (e.target.closest('#photoWrap') || e.target.closest('#musicBtn') || e.target.closest('.back-link') || e.target.closest('.yt-player')) return;
  const h = document.createElement('div');
  h.className = 'click-heart';
  h.textContent = ['❤️','💖','💗','💕'][Math.floor(Math.random()*4)];
  h.style.left = e.clientX + 'px';
  h.style.top  = e.clientY + 'px';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 950);
});

// ── 4. Photo click → big heart burst ──
document.getElementById('photoWrap').addEventListener('click', function() {
  const b = document.createElement('div');
  b.className = 'photo-burst';
  b.textContent = '❤️';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 850);
  // Also spray hearts around
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const rect = this.getBoundingClientRect();
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;
      const h = document.createElement('div');
      h.className = 'click-heart';
      h.textContent = ['❤️','💖','💗'][Math.floor(Math.random()*3)];
      h.style.left = (cx + (Math.random()-0.5)*120) + 'px';
      h.style.top  = cy + 'px';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 950);
    }, i * 80);
  }
});

// ── 5. Music button → snow + YouTube ──
let snowActive = false, snowInterval = null;
const snowEl   = document.getElementById('snowEl');
const musicBtn = document.getElementById('musicBtn');

function makeSnow() {
  const s = document.createElement('div');
  s.className = 'snowflake';

  snowEl.appendChild(s);
  setTimeout(() => s.remove(), 10000);
}

// ── Clouds ──
(function(){
  const layer = document.getElementById('cloudLayer');
  const CC = 'rgba(160,185,230,';
  function mkCloud(top, w, dur, delay) {
    const wrap = document.createElement('div');
    wrap.className = 'cloud';
    wrap.style.top = top + 'px';
    wrap.style.animationDuration = dur + 's';
    wrap.style.animationDelay = delay + 's';
    const h = Math.round(w * 0.26);
    const body = document.createElement('div');
    body.style.cssText = `position:relative;width:${w}px;height:${h}px;background:${CC}.08);border-radius:${w}px`;
    const b1s = Math.round(w * 0.44);
    const b1 = document.createElement('div');
    b1.style.cssText = `position:absolute;width:${b1s}px;height:${b1s}px;background:${CC}.08);border-radius:50%;top:${-Math.round(b1s*.52)}px;left:${Math.round(w*.1)}px`;
    const b2s = Math.round(w * 0.34);
    const b2 = document.createElement('div');
    b2.style.cssText = `position:absolute;width:${b2s}px;height:${b2s}px;background:${CC}.08);border-radius:50%;top:${-Math.round(b2s*.44)}px;left:${Math.round(w*.46)}px`;
    body.appendChild(b1); body.appendChild(b2);
    wrap.appendChild(body); layer.appendChild(wrap);
  }
  mkCloud(10,  95,  52, 0);
  mkCloud(42, 130,  78, -28);
  mkCloud(8,   70,  58, -40);
  mkCloud(60, 105,  90, -55);
  mkCloud(28,  80,  65, -12);
})();

// ── 3D animated sad character scene (Three.js) ──
(function(){
  const T = window.THREE;
  if (!T) return;

  // Remove old canvas, Three.js creates its own
  const old = document.getElementById('bitScene');
  if (old) old.remove();

  const W = 430, H = 200;
  const renderer = new T.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = T.PCFSoftShadowMap;
  renderer.domElement.id = 'bitScene';
  document.body.appendChild(renderer.domElement);

  const scene = new T.Scene();
  const camera = new T.PerspectiveCamera(38, W / H, 0.1, 50);
  camera.position.set(0, 2.8, 11);
  camera.lookAt(new T.Vector3(0, 1.3, 0));

  // Lights
  scene.add(new T.AmbientLight(0x1a2244, 2.2));
  const moon = new T.DirectionalLight(0x556688, 1.4);
  moon.position.set(-4, 9, 4);
  moon.castShadow = true;
  moon.shadow.mapSize.set(1024, 1024);
  moon.shadow.camera.left  = -10; moon.shadow.camera.right = 10;
  moon.shadow.camera.top   =   8; moon.shadow.camera.bottom = -2;
  scene.add(moon);
  const fill = new T.PointLight(0x3355aa, 0.45, 18);
  fill.position.set(3, 4, 5);
  scene.add(fill);

  // Ground — snowy
  const gnd = new T.Mesh(
    new T.PlaneGeometry(24, 7),
    new T.MeshLambertMaterial({ color: 0xcce8f2 })
  );
  gnd.rotation.x = -Math.PI / 2;
  gnd.receiveShadow = true;
  scene.add(gnd);
  const gnd2 = new T.Mesh(
    new T.PlaneGeometry(24, 6.5),
    new T.MeshLambertMaterial({ color: 0xb4d6ec, transparent: true, opacity: 0.35 })
  );
  gnd2.rotation.x = -Math.PI / 2; gnd2.position.set(0, 0.001, 0.3);
  scene.add(gnd2);

  // Bare winter trees
  (function() {
    const tM = new T.MeshLambertMaterial({ color: 0x3a2418 });
    [-6, 6].forEach(function(tx) {
      const tg = new T.Group();
      const tk = new T.Mesh(new T.BoxGeometry(0.22, 3.2, 0.22), tM);
      tk.position.y = 1.6; tk.castShadow = true; tg.add(tk);
      [
        { y: 2.6, ax: -0.7, bx: 0.7 },
        { y: 2.0, ax: -0.55, bx: 0.5 },
        { y: 1.5, ax: -0.45, bx: 0.4 },
      ].forEach(function(b) {
        const bL = new T.Mesh(new T.BoxGeometry(0.65, 0.08, 0.08), tM);
        bL.position.set(-0.45, b.y, 0); bL.rotation.z = b.ax; tg.add(bL);
        const bR = new T.Mesh(new T.BoxGeometry(0.65, 0.08, 0.08), tM);
        bR.position.set(0.45, b.y, 0); bR.rotation.z = b.bx; tg.add(bR);
      });
      tg.position.set(tx, 0, -1.5);
      scene.add(tg);
    });
  })();

  // Storm cloud — dark layered boxes
  const cloudG = new T.Group();
  var cMats = [
    new T.MeshLambertMaterial({ color: 0x12142a }),
    new T.MeshLambertMaterial({ color: 0x1c1e38 }),
    new T.MeshLambertMaterial({ color: 0x272a44 }),
    new T.MeshLambertMaterial({ color: 0x353860 }),
  ];
  [
    [4.8, 0.8, 1.5,  0,     0,    0, 0],
    [2.6, 1.1, 1.2, -1.0,  0.45,  0, 1],
    [2.0, 0.9, 1.0,  1.0,  0.40,  0, 1],
    [1.4, 0.75, 0.9, -0.3, 0.90,  0, 2],
    [1.1, 0.65, 0.8,  0.7, 0.75,  0, 2],
    [0.8, 0.5,  0.7,  0.1, 1.15,  0, 3],
  ].forEach(function(d) {
    var m = new T.Mesh(new T.BoxGeometry(d[0], d[1], d[2]), cMats[d[6]]);
    m.position.set(d[3], d[4], d[5]);
    cloudG.add(m);
  });
  // 4cm (~half a unit) above character head — character head peaks at ~y=2.8
  cloudG.position.set(0, 4.4, 0);
  scene.add(cloudG);

  // Rain
  const RC = 280;
  const rP = new Float32Array(RC * 3);
  for (var i = 0; i < RC; i++) {
    rP[i*3]   = (Math.random() - 0.5) * 10;
    rP[i*3+1] = Math.random() * 5.5;
    rP[i*3+2] = (Math.random() - 0.5) * 4;
  }
  const rGeo = new T.BufferGeometry();
  rGeo.setAttribute('position', new T.BufferAttribute(rP, 3));
  const rainMesh = new T.Points(rGeo,
    new T.PointsMaterial({ color: 0x8cc3e6, size: 0.055, transparent: true, opacity: 0.48 })
  );
  scene.add(rainMesh);

  // ─── Character ───────────────────────────────────────────────────────
  const COLS = {
    SK: 0xf0c4a0,  // skin
    HA: 0x2a1608,  // dark brown hair
    HO: 0x3d5068,  // hoodie
    HP: 0x2c3c50,  // hoodie pocket
    PA: 0x2a3a50,  // pants
    EY: 0x2d5a9e,  // blue eyes
    MO: 0xb05040,  // mouth
    NS: 0xdba070,  // nose
    ST: 0xc08060,  // stubble
    GL: 0xf0f0ff,  // eye glint
    EB: 0x6a3818,  // eyebrow
    BT: 0x0f0f1a,  // boots
    CG: 0xf0e8d0,  // cigarette white
    CF: 0xe8907a,  // cigarette filter
    EC: 0xff4a00,  // ember
  };

  // Direction group (Y rotation = facing direction)
  const cDir = new T.Group();
  scene.add(cDir);
  // Body group (X rotation = fall forward)
  const cg = new T.Group();
  cDir.add(cg);

  function bx(w, h, d, col, px, py, pz, par) {
    px = px || 0; py = py || 0; pz = pz || 0; par = par || cg;
    var m = new T.Mesh(
      new T.BoxGeometry(w, h, d),
      new T.MeshLambertMaterial({ color: col })
    );
    m.position.set(px, py, pz);
    m.castShadow = true;
    par.add(m);
    return m;
  }

  // Body (hoodie)
  bx(0.76, 0.98, 0.50, COLS.HO,  0,    1.49,  0);
  bx(0.40, 0.22, 0.06, COLS.HP,  0,    1.28,  0.27);  // pocket
  bx(0.07, 0.24, 0.06, COLS.HP, -0.1,  1.57,  0.27);  // drawstring L
  bx(0.07, 0.24, 0.06, COLS.HP,  0.1,  1.57,  0.27);  // drawstring R

  // Head group (neck pivot for sad droop)
  var hg = new T.Group();
  hg.position.set(0, 2.1, 0);
  cg.add(hg);

  bx(0.65, 0.66, 0.63, COLS.SK,  0,     0.33,  0,    hg);  // head
  bx(0.70, 0.24, 0.68, COLS.HA,  0,     0.69,  0,    hg);  // hair top
  bx(0.13, 0.44, 0.65, COLS.HA, -0.37,  0.51,  0,    hg);  // hair side L
  bx(0.13, 0.44, 0.65, COLS.HA,  0.37,  0.51,  0,    hg);  // hair side R
  bx(0.68, 0.24, 0.13, COLS.HA,  0,     0.52, -0.31, hg);  // hair back
  bx(0.65, 0.10, 0.05, COLS.EB,  0,     0.50,  0.33, hg);  // brow bar
  bx(0.12, 0.10, 0.07, COLS.EY, -0.155, 0.415, 0.33, hg);  // eye L
  bx(0.12, 0.10, 0.07, COLS.EY,  0.155, 0.415, 0.33, hg);  // eye R
  bx(0.04, 0.04, 0.04, COLS.GL, -0.135, 0.430, 0.35, hg);  // glint L
  bx(0.04, 0.04, 0.04, COLS.GL,  0.175, 0.430, 0.35, hg);  // glint R
  bx(0.09, 0.11, 0.11, COLS.NS,  0,     0.31,  0.34, hg);  // nose
  bx(0.13, 0.055, 0.04, COLS.MO, -0.08, 0.21,  0.33, hg);  // mouth L (frown)
  bx(0.13, 0.055, 0.04, COLS.MO,  0.08, 0.195, 0.33, hg);  // mouth R (lower)
  bx(0.44, 0.15, 0.05, COLS.ST,  0,     0.12,  0.33, hg);  // stubble
  bx(0.08, 0.20, 0.15, COLS.SK, -0.36,  0.39,  0,    hg);  // ear L
  bx(0.08, 0.20, 0.15, COLS.SK,  0.36,  0.39,  0,    hg);  // ear R

  // Left arm (upper — pivot at shoulder)
  var alg = new T.Group(); alg.position.set(-0.46, 1.93, 0); cg.add(alg);
  bx(0.23, 0.72, 0.24, COLS.HO, 0, -0.34, 0, alg);
  var al2 = new T.Group(); al2.position.set(0, -0.70, 0); alg.add(al2);
  bx(0.22, 0.56, 0.22, COLS.HO, 0, -0.27, 0, al2);
  bx(0.23, 0.23, 0.24, COLS.SK, 0, -0.58, 0, al2);  // left hand

  // Right arm (upper — pivot at shoulder)
  var arg = new T.Group(); arg.position.set(0.46, 1.93, 0); cg.add(arg);
  bx(0.23, 0.72, 0.24, COLS.HO, 0, -0.34, 0, arg);
  var ar2 = new T.Group(); ar2.position.set(0, -0.70, 0); arg.add(ar2);
  bx(0.22, 0.56, 0.22, COLS.HO, 0, -0.27, 0, ar2);
  var rHand = bx(0.23, 0.23, 0.24, COLS.SK, 0, -0.58, 0, ar2);  // right hand

  // Cigarette (attached to right hand)
  var cigG = new T.Group();
  cigG.position.set(0.12, -0.1, 0.13);
  rHand.add(cigG);
  var cigBody = new T.Mesh(
    new T.CylinderGeometry(0.018, 0.018, 0.30, 7),
    new T.MeshLambertMaterial({ color: COLS.CG })
  );
  cigBody.rotation.z = Math.PI / 2; cigG.add(cigBody);
  var cigFilt = new T.Mesh(
    new T.CylinderGeometry(0.021, 0.021, 0.08, 7),
    new T.MeshLambertMaterial({ color: COLS.CF })
  );
  cigFilt.position.x = -0.19; cigFilt.rotation.z = Math.PI / 2; cigG.add(cigFilt);
  var ember = new T.Mesh(
    new T.SphereGeometry(0.022, 6, 6),
    new T.MeshLambertMaterial({ color: COLS.EC, emissive: 0xff2200, emissiveIntensity: 1.0 })
  );
  ember.position.x = 0.16; cigG.add(ember);
  var emberLight = new T.PointLight(0xff4400, 0.3, 1.5);
  emberLight.position.x = 0.16; cigG.add(emberLight);

  // Pants + boots
  var llg = new T.Group(); llg.position.set(-0.20, 0.98, 0); cg.add(llg);
  bx(0.31, 0.72, 0.31, COLS.PA, 0, -0.36, 0, llg);
  bx(0.33, 0.20, 0.45, COLS.BT, 0, -0.76, 0.07, llg);

  var lrg = new T.Group(); lrg.position.set(0.20, 0.98, 0); cg.add(lrg);
  bx(0.31, 0.72, 0.31, COLS.PA, 0, -0.36, 0, lrg);
  bx(0.33, 0.20, 0.45, COLS.BT, 0, -0.76, 0.07, lrg);

  // ─── Smoke particles ──────────────────────────────────────────────────
  var smokeParts = [];
  function puffSmoke() {
    var wx = cDir.position.x + (dir === 1 ? 0.5 : -0.5);
    var wy = 1.85 + (arg.rotation.x < -0.5 ? 0.55 : 0.05);
    for (var k = 0; k < 2; k++) {
      var s = new T.Mesh(
        new T.SphereGeometry(0.045 + Math.random() * 0.055, 5, 5),
        new T.MeshLambertMaterial({ color: 0x88889a, transparent: true, opacity: 0.5 })
      );
      s.position.set(wx + (Math.random() - 0.5) * 0.12, wy + k * 0.06, 0.4);
      s.userData = {
        vy:   0.013 + Math.random() * 0.009,
        vx:   (Math.random() - 0.5) * 0.007,
        life: 1.0
      };
      scene.add(s);
      smokeParts.push(s);
    }
  }

  // ─── State machine ────────────────────────────────────────────────────
  var ST = { WALK: 0, SMOKE: 1, SAD: 2, FALL: 3, LIE: 4, GETUP: 5 };
  var st = ST.WALK, stT = 0, stDur = 8 + Math.random() * 6;
  var posX = 0, dir = 1;
  var SPD = 0.005, XR = 4.0;
  var wPh = 0, smokeT = 0, tick3 = 0;
  var clk = new T.Clock();

  function lerp(a, b, t) { return a + (b - a) * t; }
  function eio(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t) * t; }

  function frame(dt) {
    tick3++;
    stT += dt;

    // ── State transitions ──
    if (stT >= stDur) {
      stT = 0;
      if (st === ST.WALK || st === ST.SAD) {
        var r = Math.random();
        if      (r < 0.28) { st = ST.SMOKE;  stDur = 4 + Math.random() * 3; }
        else if (r < 0.52) { st = ST.SAD;    stDur = 5 + Math.random() * 5; }
        else if (r < 0.65) { st = ST.FALL;   stDur = 2.5; }
        else               { st = ST.WALK;   stDur = 7 + Math.random() * 7; }
      } else if (st === ST.SMOKE)  { st = ST.WALK;   stDur = 5 + Math.random() * 6; }
      else if   (st === ST.FALL)   { st = ST.LIE;    stDur = 2 + Math.random() * 2.5; }
      else if   (st === ST.LIE)    { st = ST.GETUP;  stDur = 2.8; }
      else if   (st === ST.GETUP)  { st = ST.WALK;   stDur = 6 + Math.random() * 7; }
    }

    // ── Cloud & rain follow character ──
    cloudG.position.x = lerp(cloudG.position.x, posX, 0.01);
    cloudG.position.y = 4.4 + Math.sin(tick3 * 0.018) * 0.09;
    rainMesh.position.x = lerp(rainMesh.position.x, posX, 0.018);

    // ── Reset transforms ──
    cg.rotation.set(0, 0, 0);
    cg.position.set(0, 0, 0);
    hg.rotation.set(0, 0, 0);
    alg.rotation.set(0, 0, 0);
    arg.rotation.set(0, 0, 0);
    ar2.rotation.set(0, 0, 0);
    llg.rotation.set(0, 0, 0);
    lrg.rotation.set(0, 0, 0);

    // ── Facing direction ──
    cDir.rotation.y = dir === 1 ? 0 : Math.PI;

    // ── Per-state behaviour ──
    if (st === ST.WALK) {
      posX += SPD * dir;
      if (posX >  XR) { posX =  XR; dir = -1; }
      if (posX < -XR) { posX = -XR; dir =  1; }
      cDir.position.x = posX;

      wPh += 0.065;
      var sw = Math.sin(wPh);
      llg.rotation.x =  sw * 0.35;
      lrg.rotation.x = -sw * 0.35;
      alg.rotation.x = -sw * 0.20;
      arg.rotation.x =  sw * 0.20;
      cg.position.y  = Math.abs(sw) * 0.032;
      hg.rotation.x  = sw * 0.015;
      ember.material.emissiveIntensity = 0.6 + Math.random() * 0.4;
      if (tick3 % 60 === 0) puffSmoke();

    } else if (st === ST.SMOKE) {
      cDir.position.x = posX;
      cg.position.y   = Math.sin(tick3 * 0.04) * 0.012;
      // Raise right arm to bring cigarette near mouth
      arg.rotation.x  = -0.95 + Math.sin(tick3 * 0.07) * 0.06;
      ar2.rotation.x  = -0.28;
      alg.rotation.x  =  0.08;
      alg.rotation.z  =  0.12;
      hg.rotation.x   = -0.1 + Math.sin(tick3 * 0.06) * 0.03;
      // Flicker ember
      ember.material.emissiveIntensity = 0.8 + Math.sin(tick3 * 0.3) * 0.3;
      emberLight.intensity = 0.25 + Math.sin(tick3 * 0.3) * 0.12;
      // Regular smoke puffs
      smokeT += dt;
      if (smokeT > 0.85) { smokeT = 0; puffSmoke(); puffSmoke(); }

    } else if (st === ST.SAD) {
      posX += SPD * 0.38 * dir;
      if (posX >  XR) { posX =  XR; dir = -1; }
      if (posX < -XR) { posX = -XR; dir =  1; }
      cDir.position.x = posX;

      wPh += 0.030;
      var ss = Math.sin(wPh);
      llg.rotation.x =  ss * 0.16;
      lrg.rotation.x = -ss * 0.16;
      alg.rotation.x =  0.22; alg.rotation.z =  0.14;
      arg.rotation.x =  0.22; arg.rotation.z = -0.14;
      hg.rotation.x  =  0.32 + Math.sin(tick3 * 0.03) * 0.03;
      cg.position.y  = -0.07 + Math.abs(ss) * 0.018;
      ember.material.emissiveIntensity = 0.5 + Math.random() * 0.2;

    } else if (st === ST.FALL) {
      cDir.position.x = posX;
      var tp = Math.min(stT / stDur, 1.0);
      var et = eio(tp);
      cg.rotation.x   =  et * (Math.PI / 1.95);
      cg.position.y   = -et * 0.90;
      alg.rotation.x  = -et * 1.10;
      arg.rotation.x  = -et * 0.70;
      llg.rotation.x  =  et * 0.20;
      lrg.rotation.x  =  et * 0.20;
      hg.rotation.x   = -et * 0.30;

    } else if (st === ST.LIE) {
      cDir.position.x = posX;
      cg.rotation.x   = Math.PI / 1.95;
      cg.position.y   = -0.9 + Math.sin(tick3 * 0.045) * 0.015;
      hg.rotation.x   = -0.20;

    } else if (st === ST.GETUP) {
      cDir.position.x = posX;
      var tp2 = Math.min(stT / stDur, 1.0);
      var et2 = eio(tp2);
      cg.rotation.x   = (1 - et2) * (Math.PI / 1.95);
      cg.position.y   = -(1 - et2) * 0.90;
    }

    // ── Rain update ──
    for (var ri = 0; ri < RC; ri++) {
      rP[ri*3+1] -= 0.14;
      if (rP[ri*3+1] < -0.4) {
        rP[ri*3+1] = 5.5;
        rP[ri*3]   = (Math.random() - 0.5) * 10;
      }
    }
    rGeo.attributes.position.needsUpdate = true;

    // ── Smoke update ──
    for (var si = smokeParts.length - 1; si >= 0; si--) {
      var sp = smokeParts[si];
      sp.userData.life -= dt * 0.36;
      sp.position.y += sp.userData.vy;
      sp.position.x += sp.userData.vx;
      sp.scale.multiplyScalar(1.015);
      sp.material.opacity = Math.max(0, sp.userData.life * 0.5);
      if (sp.userData.life <= 0) {
        scene.remove(sp);
        sp.geometry.dispose(); sp.material.dispose();
        smokeParts.splice(si, 1);
      }
    }
  }

  (function loop() {
    requestAnimationFrame(loop);
    frame(clk.getDelta());
    renderer.render(scene, camera);
  })();
})();

musicBtn.addEventListener('click', function() {
  snowActive = !snowActive;
  musicBtn.classList.toggle('playing', snowActive);
  musicBtn.textContent = snowActive ? '🎵' : '❄️';

  if (snowActive) {
    for(let i=0;i<35;i++) setTimeout(makeSnow, i*60);
    snowInterval = setInterval(makeSnow, 120);
    if (YT_VIDEO_ID) {
      ytFrame.src = `https://www.youtube.com/embed/${YT_VIDEO_ID}?autoplay=1`;
      ytPlayer.classList.add('open');
    }
  } else {
    clearInterval(snowInterval);
    ytPlayer.classList.remove('open');
    ytFrame.src = '';
  }
});
</script>
</body>
</html>
