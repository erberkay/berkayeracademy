<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black:#060609; --deep:#0c0c16; --card:#13131f;
  --gold:#e8b84b; --amber:#d4722a; --crimson:#b82d45;
  --white:#eeebe6; --mid:#2a2a45; --mid2:#1e1e34;
  --dim:rgba(238,235,230,0.45);
}
body { font-family:'Space Mono',monospace; background:var(--black); color:var(--white); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

/* ── Nav ── */
.topnav { position:fixed; top:0; left:0; right:0; z-index:300; background:rgba(6,6,9,.92); border-bottom:1px solid var(--mid); backdrop-filter:blur(8px); height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; }
.topnav-left { display:flex; align-items:center; gap:14px; }
.topnav-back { color:var(--dim); font-size:.65rem; letter-spacing:.08em; text-decoration:none; transition:color .15s; }
.topnav-back:hover { color:var(--gold); }
.topnav-sep { color:var(--mid); }
.topnav-brand { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--gold); letter-spacing:.08em; }
#authBar { display:flex; align-items:center; gap:8px; }
.auth-user-wrap { display:flex; align-items:center; gap:8px; background:rgba(42,42,69,.85); border:1px solid rgba(232,184,75,.3); padding:4px 10px 4px 4px; border-radius:20px; }
.auth-avatar { width:26px; height:26px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; }
.auth-name { font-size:.62rem; color:var(--white); max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.auth-out-btn { background:transparent; border:none; color:rgba(238,235,230,.4); font-size:.6rem; cursor:pointer; font-family:'Space Mono',monospace; }

/* ── Page ── */
.page { max-width:780px; margin:0 auto; padding:80px 20px 80px; position:relative; z-index:1; }
.page-header { margin-bottom:28px; }
.page-header h1 { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--gold); letter-spacing:.06em; margin-bottom:4px; }
.page-header p { font-size:.65rem; color:var(--dim); letter-spacing:.06em; }

/* ── Form card ── */
.form-card { background:var(--card); border:1px solid var(--mid); border-radius:10px; overflow:hidden; }
.form-section { padding:20px 24px; border-bottom:1px solid rgba(255,255,255,.05); }
.form-section:last-child { border:none; }
.form-label { font-size:.58rem; color:var(--gold); letter-spacing:.12em; text-transform:uppercase; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.form-label span { color:rgba(238,235,230,.22); font-size:.55rem; letter-spacing:.04em; text-transform:none; }

.title-input { width:100%; background:var(--mid2); border:1px solid var(--mid); border-radius:6px; color:var(--white); font-family:'Space Mono',monospace; font-size:.95rem; padding:12px 16px; outline:none; transition:border-color .15s; letter-spacing:.02em; }
.title-input:focus { border-color:var(--gold); }
.title-input::placeholder { color:rgba(238,235,230,.2); }

/* ── Toolbar ── */
.toolbar { display:flex; gap:4px; margin-bottom:10px; flex-wrap:wrap; }
.tb-btn { background:var(--mid2); border:1px solid var(--mid); color:var(--dim); font-family:'Space Mono',monospace; font-size:.65rem; padding:4px 10px; border-radius:4px; cursor:pointer; transition:all .15s; user-select:none; }
.tb-btn:hover { border-color:rgba(232,184,75,.4); color:var(--gold); background:rgba(232,184,75,.05); }
.tb-btn b { font-weight:bold; }
.tb-sep { width:1px; background:var(--mid); margin:2px 4px; }

/* ── Category chips ── */
.cat-chips { display:flex; flex-wrap:wrap; gap:8px; }
.cat-chip { background:var(--mid2); border:1px solid var(--mid); color:var(--dim); font-family:'Space Mono',monospace; font-size:.63rem; padding:5px 14px; border-radius:20px; cursor:pointer; transition:all .15s; }
.cat-chip.active { background:rgba(232,184,75,.1); border-color:var(--gold); color:var(--gold); }
.cat-chip:hover:not(.active) { border-color:rgba(238,235,230,.2); color:var(--white); }

.body-input { width:100%; background:var(--mid2); border:1px solid var(--mid); border-radius:6px; color:var(--white); font-family:'Space Mono',monospace; font-size:.82rem; padding:14px 16px; resize:vertical; min-height:220px; outline:none; line-height:1.8; transition:border-color .15s; }
.body-input:focus { border-color:var(--gold); }
.body-input::placeholder { color:rgba(238,235,230,.2); }

/* ── Preview ── */
.preview-toggle { background:none; border:none; color:var(--dim); font-family:'Space Mono',monospace; font-size:.6rem; cursor:pointer; padding:0; transition:color .15s; display:flex; align-items:center; gap:5px; }
.preview-toggle:hover { color:var(--gold); }
.preview-box { background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.06); border-radius:6px; padding:14px 16px; min-height:80px; font-size:.82rem; line-height:1.8; color:var(--white); white-space:pre-wrap; word-break:break-word; display:none; }
.preview-box b { color:var(--gold); }
.preview-box i { color:var(--ice); }
.preview-box code { background:rgba(255,255,255,.08); border-radius:3px; padding:1px 5px; font-size:.78rem; color:#b5e8a0; }

/* ── Actions ── */
.form-actions { padding:18px 24px; background:rgba(0,0,0,.15); display:flex; justify-content:space-between; align-items:center; }
.form-actions-left { display:flex; gap:10px; align-items:center; }
.posting-as { font-size:.6rem; color:rgba(238,235,230,.25); }
.posting-as span { color:rgba(232,184,75,.6); }
.btn-cancel { padding:9px 20px; background:none; border:1px solid var(--mid); color:var(--dim); border-radius:4px; font-family:'Space Mono',monospace; font-size:.7rem; cursor:pointer; transition:all .15s; text-decoration:none; display:inline-block; }
.btn-cancel:hover { border-color:rgba(238,235,230,.3); color:var(--white); }
.btn-submit { padding:10px 28px; background:var(--gold); color:var(--black); border:none; border-radius:4px; font-family:'Space Mono',monospace; font-size:.75rem; font-weight:bold; cursor:pointer; transition:filter .15s; }
.btn-submit:hover { filter:brightness(1.1); }
.btn-submit:disabled { opacity:.5; cursor:default; filter:none; }

/* ── Login wall ── */
.login-wall { text-align:center; padding:80px 20px; }
.login-wall h2 { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--gold); margin-bottom:10px; }
.login-wall p { font-size:.72rem; color:var(--dim); margin-bottom:20px; }
.btn-signin { padding:10px 28px; background:var(--gold); color:var(--black); border:none; border-radius:4px; font-family:'Space Mono',monospace; font-size:.75rem; font-weight:bold; cursor:pointer; }

/* ── Toast ── */
.toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column-reverse; gap:8px; pointer-events:none; }
.toast { background:var(--card); border:1px solid var(--mid); border-left:3px solid var(--gold); border-radius:6px; padding:10px 16px; font-family:'Space Mono',monospace; font-size:.68rem; color:var(--white); box-shadow:0 4px 24px rgba(0,0,0,.6); animation:toastIn .2s ease; pointer-events:all; max-width:280px; line-height:1.5; }
.toast.error { border-left-color:var(--crimson); }
.toast.info  { border-left-color:#8fc8e8; }
@keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

/* ── Notification Bell ── */
.notif-bell-wrap { position:relative; }
.notif-bell { background:none; border:none; color:rgba(238,235,230,.45); font-size:1.2rem; cursor:pointer; padding:4px; line-height:1; transition:color .15s; transform-origin:top center; }
.notif-bell:hover { color:var(--gold); }
.notif-bell.ringing { animation:bellRing 0.55s ease-in-out 3; }
@keyframes bellRing { 0%{transform:rotate(0)} 15%{transform:rotate(18deg)} 35%{transform:rotate(-15deg)} 55%{transform:rotate(10deg)} 75%{transform:rotate(-6deg)} 90%{transform:rotate(3deg)} 100%{transform:rotate(0)} }
.notif-badge { position:absolute; top:0; right:0; background:var(--crimson); color:#fff; font-size:.55rem; font-family:'Space Mono',monospace; border-radius:6px; padding:1px 5px; min-width:14px; text-align:center; pointer-events:none; }
.notif-panel { position:absolute; top:44px; right:0; width:300px; background:var(--card); border:1px solid var(--mid); border-radius:10px; box-shadow:0 8px 32px rgba(0,0,0,.6); z-index:9999; overflow:hidden; display:none; }
.notif-panel.open { display:block; }
.notif-panel-head { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; justify-content:space-between; }
.notif-panel-title { font-size:.72rem; color:var(--gold); letter-spacing:.08em; text-transform:uppercase; }
.notif-read-all { background:none; border:none; color:rgba(238,235,230,.35); font-size:.65rem; cursor:pointer; font-family:'Space Mono',monospace; }
.notif-read-all:hover { color:var(--dim); }
.notif-list { max-height:340px; overflow-y:auto; }
.notif-item { padding:11px 32px 11px 14px; border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer; transition:background .1s; position:relative; }
.notif-item:hover { background:rgba(255,255,255,.03); }
.notif-item.unread { background:rgba(232,184,75,.04); border-left:2px solid rgba(232,184,75,.4); padding-left:12px; }
.notif-item-text { font-size:.75rem; color:var(--white); line-height:1.5; margin-bottom:3px; }
.notif-item-time { font-size:.62rem; color:rgba(238,235,230,.25); }
.notif-empty { padding:22px 16px; text-align:center; font-size:.75rem; color:var(--dim); }
.notif-del-btn { position:absolute; top:50%; right:7px; transform:translateY(-50%); background:none; border:none; color:rgba(238,235,230,.3); font-size:.95rem; cursor:pointer; padding:2px 5px; line-height:1; border-radius:3px; transition:color .12s; }
.notif-del-btn:hover { color:var(--crimson); }
/* ── Bottom Nav ── */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:500; background:rgba(6,6,9,.96); border-top:1px solid var(--mid); backdrop-filter:blur(16px); display:flex; height:58px; }
.bnav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; text-decoration:none; color:rgba(238,235,230,.3); transition:color .15s; position:relative; }
.bnav-item:hover { color:rgba(238,235,230,.65); }
.bnav-item.active { color:var(--gold); }
.bnav-item.active::after { content:''; position:absolute; top:0; left:28%; right:28%; height:2px; background:var(--gold); border-radius:0 0 3px 3px; }
.bnav-icon { font-size:1.15rem; line-height:1; }
.bnav-label { font-family:'Space Mono',monospace; font-size:.48rem; letter-spacing:.04em; text-transform:uppercase; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a href="forum.html" class="topnav-back">← Foruma Dön</a>
    <span class="topnav-sep">|</span>
    <span class="topnav-brand">Konu Aç</span>
  </div>
  <div id="authBar"></div>
</nav>

<div class="page" id="pageContent">
  <div class="login-wall">
    <h2>Giriş Gerekli</h2>
    <p>Konu açmak için önce giriş yapman gerekiyor.</p>
    <button class="btn-signin" onclick="doSignIn()">Google ile Giriş Yap</button>
  </div>
</div>

<script type="module">
'use strict';
const ADMIN_EMAIL = 'berkayer032@gmail.com';

firebase.initializeApp({
  apiKey:            "AIzaSyDX8AkwDejrkh5L4xUXQcmzKq-DYvc2E8A",
  authDomain:        "ableton-tutorial.firebaseapp.com",
  projectId:         "ableton-tutorial",
  storageBucket:     "ableton-tutorial.firebasestorage.app",
  messagingSenderId: "677640687230",
  appId:             "1:677640687230:web:8c6a2dfefbf55c69ffd22f",
});
const auth = firebase.auth();
const db   = firebase.firestore();

let _signingIn = false;
function doSignIn() {
  if (_signingIn) return;
  _signingIn = true;
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{console.error(e); alert('Giriş hatası: '+(e.message||e.code||e));})
    .catch(console.error).finally(() => { _signingIn = false; });
}

function showToast(msg, type='success', ms=3000) {
  let c = document.getElementById('toastCt');
  if (!c) { c = document.createElement('div'); c.id='toastCt'; c.className='toast-container'; document.body.append(c); }
  const t = document.createElement('div'); t.className='toast'+(type!=='success'?' '+type:''); t.textContent=msg;
  c.append(t);
  setTimeout(() => { t.style.cssText='opacity:0;transform:translateY(8px);transition:.2s;'; setTimeout(()=>t.remove(),200); }, ms);
}

let _notifUnsub = null, _annUnsub = null, _notifPanelEl = null;
let _personalNotifs = [], _announcements = [], _annSeenAt = null, _dismissedAnns = [], _prevUnreadCount = 0;
function _mergeNotifs(uid) {
  const all=[..._personalNotifs.map(n=>({...n,_t:'p'})),..._announcements.filter(n=>!_dismissedAnns.includes(n._id)).map(n=>({...n,_t:'a'}))].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  const annSec=_annSeenAt?.seconds||0;
  const unread=_personalNotifs.filter(n=>!n.read).length+_announcements.filter(n=>(n.createdAt?.seconds||0)>annSec).length;
  const badge=document.querySelector('.notif-badge');
  if(badge){badge.textContent=unread>9?'9+':String(unread);badge.style.display=unread>0?'block':'none';}
  if(unread>_prevUnreadCount){const bell=document.querySelector('.notif-bell');if(bell){bell.classList.remove('ringing');void bell.offsetWidth;bell.classList.add('ringing');setTimeout(()=>bell.classList.remove('ringing'),1800);}}
  _prevUnreadCount=unread;
  if(!_notifPanelEl)return;
  const list=_notifPanelEl.querySelector('.notif-list');if(!list)return;
  list.innerHTML='';
  if(!all.length){list.innerHTML='<div class="notif-empty">Bildirim yok</div>';return;}
  all.forEach(n=>{
    const isUnread=n._t==='p'?!n.read:(n.createdAt?.seconds||0)>annSec;
    const item=document.createElement('div');item.className='notif-item'+(isUnread?' unread':'');
    const timeStr=n.createdAt?n.createdAt.toDate().toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
    item.innerHTML=`<div class="notif-item-text">${n._t==='a'?'📢 ':''}${n.text||'Yeni bildirim'}</div><div class="notif-item-time">${timeStr}</div>`;
    if(n.postId)item.onclick=()=>{location.href=`post.html?id=${n.postId}`;};
    if(n._id){const del=document.createElement('button');del.className='notif-del-btn';del.textContent='×';del.onclick=e=>{e.stopPropagation();if(n._t==='p'){db.collection('notifications').doc(uid).collection('items').doc(n._id).delete();}else{_dismissedAnns.push(n._id);db.collection('users').doc(uid).update({dismissedAnns:firebase.firestore.FieldValue.arrayUnion(n._id)}).catch(()=>{});_announcements=_announcements.filter(a=>a._id!==n._id);_mergeNotifs(uid);}};item.append(del);}
    list.append(item);
  });
}
function markAllNotifRead(uid){
  db.collection('notifications').doc(uid).collection('items').where('read','==',false).get().then(snap=>{const b=db.batch();snap.docs.forEach(d=>b.update(d.ref,{read:true}));b.commit();}).catch(()=>{});
  db.collection('users').doc(uid).set({announcementsSeenAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(()=>{});
  _annSeenAt={seconds:Date.now()/1000};_personalNotifs=_personalNotifs.map(n=>({...n,read:true}));_mergeNotifs(uid);
}
function toggleNotifPanel(user){
  if(!_notifPanelEl)return;
  if(_notifPanelEl.classList.contains('open')){_notifPanelEl.classList.remove('open');return;}
  _notifPanelEl.classList.add('open');
  setTimeout(()=>document.addEventListener('click',()=>{if(_notifPanelEl)_notifPanelEl.classList.remove('open');},{once:true}),0);
  markAllNotifRead(user.uid);
}
function initNotifications(user){
  if(_notifUnsub){_notifUnsub();_notifUnsub=null;}if(_annUnsub){_annUnsub();_annUnsub=null;}
  _personalNotifs=[];_announcements=[];_annSeenAt=null;_dismissedAnns=[];
  if(!user)return;
  db.collection('users').doc(user.uid).get().then(d=>{_annSeenAt=d.data()?.announcementsSeenAt||null;_dismissedAnns=d.data()?.dismissedAnns||[];_mergeNotifs(user.uid);}).catch(()=>{});
  _notifUnsub=db.collection('notifications').doc(user.uid).collection('items').orderBy('createdAt','desc').limit(20).onSnapshot(snap=>{_personalNotifs=snap.docs.map(d=>({...d.data(),_id:d.id}));_mergeNotifs(user.uid);},()=>{});
  _annUnsub=db.collection('announcements').orderBy('createdAt','desc').limit(15).onSnapshot(snap=>{_announcements=snap.docs.map(d=>({...d.data(),_id:d.id}));_mergeNotifs(user.uid);},()=>{});
}
function updateAuthBar(user) {
  const bar = document.getElementById('authBar');
  bar.innerHTML = ''; _notifPanelEl = null;
  if (!user) return;
  const wrap = document.createElement('div'); wrap.className = 'auth-user-wrap';
  const img  = document.createElement('img');  img.className = 'auth-avatar';
  img.src = user.photoURL || ''; img.alt = '';
  const name = document.createElement('span'); name.className = 'auth-name';
  name.textContent = user.email === ADMIN_EMAIL ? '⚡ Admin' : (user.displayName?.split(' ')[0] || 'Üye');
  const out = document.createElement('button'); out.className = 'auth-out-btn';
  out.textContent = '✕'; out.onclick = () => auth.signOut();
  wrap.append(img, name, out);
  const bellWrap = document.createElement('div'); bellWrap.className = 'notif-bell-wrap';
  const bell = document.createElement('button'); bell.className = 'notif-bell'; bell.textContent = '🔔'; bell.title = 'Bildirimler';
  const badge = document.createElement('span'); badge.className = 'notif-badge'; badge.style.display = 'none';
  _notifPanelEl = document.createElement('div'); _notifPanelEl.className = 'notif-panel';
  _notifPanelEl.innerHTML = '<div class="notif-panel-head"><span class="notif-panel-title">Bildirimler</span><button class="notif-read-all">Tümünü Oku</button></div><div class="notif-list"></div>';
  _notifPanelEl.querySelector('.notif-read-all').onclick = () => markAllNotifRead(user.uid);
  bell.onclick = e => { e.stopPropagation(); toggleNotifPanel(user); };
  bellWrap.append(bell, badge, _notifPanelEl);
  bar.append(bellWrap, wrap);
  document.addEventListener('click', () => { if (_notifPanelEl) _notifPanelEl.classList.remove('open'); }, { once: true });
}

// ── Toolbar insert helper ─────────────────────────────────────────────
function wrapSelection(ta, before, after = before) {
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.slice(start, end) || 'metin';
  ta.value = ta.value.slice(0, start) + before + sel + after + ta.value.slice(end);
  ta.focus();
  ta.setSelectionRange(start + before.length, start + before.length + sel.length);
  updatePreview(ta);
}

function updatePreview(ta) {
  const box = document.getElementById('previewBox');
  if (!box || box.style.display === 'none') return;
  box.innerHTML = renderMarkdown(ta.value);
}

function renderMarkdown(txt) {
  return txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.+?)\*/g,'<i>$1</i>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
}

// ── Render form ───────────────────────────────────────────────────────
function renderForm(user) {
  const page = document.getElementById('pageContent');
  page.innerHTML = '';

  const header = document.createElement('div'); header.className = 'page-header';
  header.innerHTML = `<h1>Yeni Konu</h1><p>Topluluğa sorunuzu veya paylaşımınızı yazın</p>`;
  page.append(header);

  const card = document.createElement('div'); card.className = 'form-card';

  // ── Category section ──
  const CATS = ['Genel','Ableton','Ses Tasarımı','Mixing','Live Set','Diğer'];
  let selectedCat = 'Genel';
  const secCat = document.createElement('div'); secCat.className = 'form-section';
  const lblCat = document.createElement('div'); lblCat.className = 'form-label';
  lblCat.innerHTML = '<span>Kategori</span>';
  const catWrap = document.createElement('div'); catWrap.className = 'cat-chips';
  CATS.forEach(c => {
    const chip = document.createElement('button'); chip.type = 'button';
    chip.className = 'cat-chip' + (c === selectedCat ? ' active' : '');
    chip.textContent = c;
    chip.onclick = () => { selectedCat = c; catWrap.querySelectorAll('.cat-chip').forEach(ch => ch.classList.remove('active')); chip.classList.add('active'); };
    catWrap.append(chip);
  });
  secCat.append(lblCat, catWrap); card.append(secCat);

  // ── Title section ──
  const sec1 = document.createElement('div'); sec1.className = 'form-section';
  const lbl1 = document.createElement('div'); lbl1.className = 'form-label';
  const titleLeft = document.createElement('span'); titleLeft.textContent = 'Başlık';
  const titleCount = document.createElement('span'); titleCount.textContent = '0 / 120';
  lbl1.append(titleLeft, titleCount);
  const titleInput = document.createElement('input'); titleInput.className = 'title-input';
  titleInput.type = 'text'; titleInput.maxLength = 120;
  titleInput.placeholder = 'Konunuzu kısaca özetleyin...';
  titleInput.oninput = () => { titleCount.textContent = `${titleInput.value.length} / 120`; };
  sec1.append(lbl1, titleInput); card.append(sec1);

  // ── Body section ──
  const sec2 = document.createElement('div'); sec2.className = 'form-section';
  const lbl2 = document.createElement('div'); lbl2.className = 'form-label';
  const bodyLeft = document.createElement('span'); bodyLeft.textContent = 'İçerik';
  const bodyCount = document.createElement('span'); bodyCount.textContent = '0 karakter';
  const prevToggle = document.createElement('button'); prevToggle.className = 'preview-toggle';
  prevToggle.innerHTML = '👁 Önizleme'; prevToggle.type = 'button';
  lbl2.append(bodyLeft, bodyCount, prevToggle);

  // Toolbar
  const toolbar = document.createElement('div'); toolbar.className = 'toolbar';
  const tools = [
    { label: '<b>K</b>', title:'Kalın (**metin**)', fn: ta => wrapSelection(ta,'**') },
    { label: '<i>İ</i>', title:'İtalik (*metin*)',   fn: ta => wrapSelection(ta,'*') },
    { label: '`kd`',    title:'Kod satırı',          fn: ta => wrapSelection(ta,'`') },
    { sep: true },
    { label: '―',       title:'Yatay çizgi',         fn: ta => { ta.value += '\n---\n'; ta.focus(); } },
  ];
  const bodyInput = document.createElement('textarea'); bodyInput.className = 'body-input';
  bodyInput.placeholder = 'Detayları buraya yaz...\n\nİpuçları:\n  **kalın**  *italik*  `kod`';
  bodyInput.oninput = () => { bodyCount.textContent = `${bodyInput.value.length} karakter`; updatePreview(bodyInput); };

  tools.forEach(t => {
    if (t.sep) { const s = document.createElement('div'); s.className = 'tb-sep'; toolbar.append(s); return; }
    const b = document.createElement('button'); b.className = 'tb-btn'; b.type = 'button';
    b.innerHTML = t.label; b.title = t.title;
    b.onclick = () => t.fn(bodyInput);
    toolbar.append(b);
  });

  const previewBox = document.createElement('div'); previewBox.className = 'preview-box'; previewBox.id = 'previewBox';
  let previewOn = false;
  prevToggle.onclick = () => {
    previewOn = !previewOn;
    previewBox.style.display = previewOn ? 'block' : 'none';
    bodyInput.style.display  = previewOn ? 'none'  : 'block';
    prevToggle.innerHTML = previewOn ? '✏️ Düzenle' : '👁 Önizleme';
    if (previewOn) previewBox.innerHTML = renderMarkdown(bodyInput.value) || '<span style="opacity:.3">İçerik yok</span>';
  };

  sec2.append(lbl2, toolbar, bodyInput, previewBox); card.append(sec2);

  // ── Actions ──
  const actions = document.createElement('div'); actions.className = 'form-actions';
  const postingAs = document.createElement('div'); postingAs.className = 'posting-as';
  postingAs.innerHTML = `Şu an: <span>${user.displayName?.split(' ')[0] || 'Üye'}</span>`;
  const btns = document.createElement('div'); btns.className = 'form-actions-left';
  const cancelBtn = document.createElement('a'); cancelBtn.className = 'btn-cancel';
  cancelBtn.href = 'forum.html'; cancelBtn.textContent = 'İptal';
  const submitBtn = document.createElement('button'); submitBtn.className = 'btn-submit';
  submitBtn.textContent = 'Yayınla';
  submitBtn.onclick = async () => {
    const title = titleInput.value.trim();
    const body  = bodyInput.value.trim();
    if (!title) { titleInput.focus(); titleInput.style.borderColor='var(--crimson)'; return; }
    submitBtn.disabled = true; submitBtn.textContent = '⏳ Gönderiliyor...';
    try {
      const ref = await db.collection('forum').add({
        title,
        text:           body,
        category:       selectedCat,
        authorName:     user.displayName?.split(' ')[0] || 'Üye',
        authorEmail:    user.email,
        authorId:       user.uid,
        authorPhotoURL: user.photoURL || '',
        createdAt:      firebase.firestore.FieldValue.serverTimestamp(),
        replyCount:     0,
        solved:         false,
      });
      if (user.email === ADMIN_EMAIL) {
        db.collection('announcements').add({
          text: `📌 Yeni Admin konusu: "${title}"`,
          postId: ref.id,
          fromName: user.displayName?.split(' ')[0] || 'Admin',
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          type: 'forum',
        }).catch(() => {});
      }
      // Notify followers
      db.collection('follows').where('followeeId','==',user.uid).limit(100).get().then(followSnap => {
        if (!followSnap || followSnap.empty) return;
        const batch = db.batch();
        const authorName = user.displayName?.split(' ')[0] || 'Biri';
        followSnap.docs.forEach(d => {
          const notifRef = db.collection('notifications').doc(d.data().followerId).collection('items').doc();
          batch.set(notifRef, {
            text: `${authorName} yeni bir konu açtı: "${title.slice(0,50)}"`,
            postId: ref.id,
            fromId: user.uid,
            fromName: authorName,
            read: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
        });
        batch.commit().catch(() => {});
      }).catch(() => {});
      window.location.href = 'forum.html';
    } catch(e) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Yayınla';
      showToast('Gönderilemedi: ' + e.message, 'error', 5000);
      console.error(e);
    }
  };
  btns.append(cancelBtn, submitBtn);
  actions.append(postingAs, btns);
  card.append(actions);
  page.append(card);

  titleInput.focus();
}

auth.onAuthStateChanged(user => {
  updateAuthBar(user);
  initNotifications(user);
  if (user) renderForm(user);
  // else: keep login wall
});
</script>
