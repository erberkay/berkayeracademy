<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black:#060609; --deep:#0c0c16; --card:#13131f;
  --gold:#e8b84b; --amber:#d4722a; --crimson:#b82d45;
  --ice:#8fc8e8; --white:#eeebe6; --mid:#2a2a45; --mid2:#1e1e34;
  --dim:rgba(238,235,230,0.45);
}
body { font-family:'Space Mono',monospace; background:var(--black); color:var(--white); min-height:100vh; overflow-x:clip; }
body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }

.topnav { position:fixed; top:0; left:0; right:0; z-index:300; background:rgba(6,6,9,.92); border-bottom:1px solid var(--mid); backdrop-filter:blur(8px); height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; }
.topnav-left { display:flex; align-items:center; gap:14px; }
.topnav-back { color:var(--dim); font-size:.65rem; text-decoration:none; transition:color .15s; }
.topnav-back:hover { color:var(--gold); }
.topnav-sep { color:var(--mid); }
.topnav-brand { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--gold); letter-spacing:.08em; }
#authBar { display:flex; align-items:center; gap:8px; }
.auth-sign-btn { background:rgba(42,42,69,.9); border:1.5px solid var(--gold); color:var(--gold); font-family:'Space Mono',monospace; font-size:.65rem; padding:6px 14px; border-radius:4px; cursor:pointer; transition:background .18s,color .18s; }
.auth-sign-btn:hover { background:var(--gold); color:var(--black); }
.auth-user-wrap { display:flex; align-items:center; gap:8px; background:var(--deep); border:1.5px solid rgba(232,184,75,.4); padding:4px 10px 4px 4px; border-radius:20px; transition:background .2s, border-color .2s; }
.auth-avatar { width:26px; height:26px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; }
.auth-name { font-size:.62rem; color:var(--white); max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.auth-out-btn { background:transparent; border:none; color:var(--dim); font-size:.6rem; cursor:pointer; font-family:'Space Mono',monospace; }

.layout { max-width:1400px; margin:0 auto; padding:72px 28px 80px; display:grid; grid-template-columns:300px 1fr 360px; gap:28px; position:relative; z-index:1; }
@media(max-width:1200px) { .layout { grid-template-columns:280px 1fr; } }
@media(max-width:700px) { .layout { grid-template-columns:1fr; padding:62px 14px 80px; } }
@media(max-width:480px) { .layout { padding:62px 10px 80px; gap:16px; } }

/* ── Profile card ── */
.profile-card { background:var(--card); border:1px solid var(--mid); border-radius:14px; overflow:hidden; overflow-y:auto; max-height:calc(100vh - 90px); position:sticky; top:70px; align-self:start; box-shadow:0 4px 32px rgba(0,0,0,.35); }
.profile-cover { height:120px; background:linear-gradient(135deg,#1a0a1e 0%,var(--crimson) 40%,var(--amber) 100%); position:relative; }
.profile-cover::after { content:''; position:absolute; inset:0; background:linear-gradient(to bottom, transparent 50%, rgba(19,19,31,.8) 100%); }
.profile-avatar-wrap { position:absolute; bottom:-38px; left:50%; transform:translateX(-50%); z-index:1; }
.profile-avatar { width:78px; height:78px; border-radius:50%; object-fit:cover; border:3px solid var(--card); box-shadow:0 0 0 2px rgba(232,184,75,.4), 0 4px 20px rgba(0,0,0,.5); }
.profile-avatar-ph { width:78px; height:78px; border-radius:50%; background:var(--mid2); border:3px solid var(--card); box-shadow:0 0 0 2px rgba(232,184,75,.4), 0 4px 20px rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; font-size:2rem; }
.profile-info { padding:50px 24px 20px; text-align:center; }
.profile-name { font-family:'Bebas Neue',sans-serif; font-size:1.7rem; color:var(--white); letter-spacing:.05em; margin-bottom:3px; }
.profile-name.is-admin::after { content:' ⚡'; color:var(--gold); font-size:1.2rem; }
.profile-joined { font-size:.7rem; color:rgba(238,235,230,.2); margin-bottom:14px; letter-spacing:.07em; text-transform:uppercase; }
.profile-about { font-size:.82rem; color:var(--dim); line-height:1.75; margin-bottom:16px; min-height:20px; text-align:left; }
.profile-genres { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; justify-content:center; }
.genre-tag { font-size:.72rem; padding:4px 12px; border-radius:20px; background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.2); color:var(--gold); letter-spacing:.04em; }
.profile-socials { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; justify-content:center; }
.profile-social-link { display:inline-flex; align-items:center; gap:5px; font-size:.72rem; padding:5px 12px; border-radius:6px; text-decoration:none; transition:all .15s; }
.profile-social-ig { background:rgba(232,184,75,.07); border:1px solid rgba(232,184,75,.2); color:#e8b84b; }
.profile-social-ig:hover { background:rgba(232,184,75,.16); }
.profile-social-sp { background:rgba(30,215,96,.07); border:1px solid rgba(30,215,96,.2); color:#1ed760; }
.profile-social-sp:hover { background:rgba(30,215,96,.16); }
.profile-social-sc { background:rgba(255,85,0,.07); border:1px solid rgba(255,85,0,.2); color:#ff5500; }
.profile-social-sc:hover { background:rgba(255,85,0,.16); }
.profile-social-mc { background:rgba(82,158,214,.07); border:1px solid rgba(82,158,214,.2); color:#529ed6; }
.profile-social-mc:hover { background:rgba(82,158,214,.16); }
.contact-btn { display:block; width:100%; margin-top:10px; padding:10px; text-align:center; background:rgba(143,200,232,.08); border:1px solid rgba(143,200,232,.3); color:var(--ice); border-radius:8px; font-family:'Space Mono',monospace; font-size:.76rem; cursor:pointer; text-decoration:none; transition:all .15s; }
.contact-btn:hover { background:rgba(143,200,232,.16); border-color:rgba(143,200,232,.5); }
.profile-stats { display:flex; gap:0; border-top:1px solid rgba(255,255,255,.05); border-bottom:1px solid rgba(255,255,255,.05); margin:16px 0; }
.pstat { flex:1; text-align:center; padding:12px 0; border-right:1px solid rgba(255,255,255,.05); }
.pstat:last-child { border-right:none; }
.pstat-val { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--gold); line-height:1; }
.pstat-lbl { font-size:.65rem; color:rgba(238,235,230,.3); letter-spacing:.1em; text-transform:uppercase; margin-top:3px; }
.booking-profile-btn { display:block; width:100%; margin-top:12px; padding:10px; text-align:center; background:rgba(74,222,128,.07); border:1.5px solid rgba(74,222,128,.3); color:var(--green); border-radius:8px; font-family:'Space Mono',monospace; font-size:.76rem; text-decoration:none; transition:all .15s; }
.booking-profile-btn:hover { background:rgba(74,222,128,.14); border-color:rgba(74,222,128,.55); }
.edit-btn { display:block; width:100%; margin-top:8px; padding:10px; text-align:center; background:rgba(232,184,75,.08); border:1.5px solid rgba(232,184,75,.4); color:var(--gold); border-radius:8px; font-family:'Space Mono',monospace; font-size:.76rem; cursor:pointer; transition:all .15s; }
.edit-btn:hover { background:rgba(232,184,75,.16); border-color:rgba(232,184,75,.65); }
/* Msg btn on profile */
.msg-btn { display:block; width:100%; margin-top:10px; padding:10px; text-align:center; background:linear-gradient(135deg,rgba(143,200,232,.15),rgba(143,200,232,.08)); border:1.5px solid rgba(143,200,232,.5); color:var(--ice); border-radius:8px; font-family:'Space Mono',monospace; font-size:.76rem; cursor:pointer; transition:all .15s; letter-spacing:.03em; }
.msg-btn:hover { background:linear-gradient(135deg,rgba(143,200,232,.25),rgba(143,200,232,.15)); border-color:rgba(143,200,232,.75); }
.follow-btn { display:block; width:100%; margin-top:8px; padding:9px; text-align:center; background:rgba(232,184,75,.08); border:1.5px solid rgba(232,184,75,.4); color:var(--gold); border-radius:8px; font-family:'Space Mono',monospace; font-size:.76rem; cursor:pointer; transition:all .15s; letter-spacing:.03em; }
.follow-btn:hover { background:rgba(232,184,75,.16); border-color:rgba(232,184,75,.75); }
.follow-btn.following { background:rgba(232,184,75,.12); border-color:var(--gold); }
.collab-req-btn { display:block; width:100%; margin-top:8px; padding:9px; text-align:center; background:rgba(180,120,255,.08); border:1.5px solid rgba(180,120,255,.4); color:#b478ff; border-radius:8px; font-family:'Space Mono',monospace; font-size:.76rem; cursor:pointer; transition:all .15s; letter-spacing:.03em; }
.collab-req-btn:hover { background:rgba(180,120,255,.16); border-color:rgba(180,120,255,.75); }
.collab-req-btn:disabled { opacity:.6; cursor:default; }
.collab-req-card { background:rgba(180,120,255,.08); border:1px solid rgba(180,120,255,.3); border-radius:12px; padding:12px 14px; min-width:180px; }
.collab-req-card-label { font-size:.78rem; color:#b478ff; margin-bottom:10px; font-weight:700; }
.collab-req-card-btns { display:flex; gap:8px; }
.collab-req-accept { flex:1; padding:7px; background:rgba(80,200,120,.15); border:1px solid rgba(80,200,120,.4); color:#50c878; border-radius:6px; font-family:'Space Mono',monospace; font-size:.7rem; cursor:pointer; transition:all .15s; }
.collab-req-accept:hover { background:rgba(80,200,120,.25); }
.collab-req-reject { flex:1; padding:7px; background:rgba(184,45,69,.12); border:1px solid rgba(184,45,69,.35); color:var(--crimson); border-radius:6px; font-family:'Space Mono',monospace; font-size:.7rem; cursor:pointer; transition:all .15s; }
.collab-req-reject:hover { background:rgba(184,45,69,.22); }
.collab-req-card-status { font-size:.75rem; margin-top:4px; }
.collab-req-card-status.accepted { color:#50c878; }
.collab-req-card-status.rejected { color:var(--crimson); }

/* ── Chat Panel ── */
.chat-panel { background:var(--card); border:1px solid var(--mid); border-radius:14px; overflow:hidden; position:sticky; top:70px; align-self:start; width:360px; height:580px; min-height:300px; min-width:360px; max-width:640px; resize:none; display:flex; flex-direction:column; box-shadow:0 4px 32px rgba(0,0,0,.35); }
.chat-resize-grip { position:absolute; bottom:2px; right:2px; width:16px; height:16px; cursor:se-resize; z-index:10; background:repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(238,235,230,.22) 2px, rgba(238,235,230,.22) 3px); border-radius:0 0 12px 0; transition:opacity .15s; }
.chat-resize-grip:hover { background:repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(238,235,230,.5) 2px, rgba(238,235,230,.5) 3px); }
.chat-panel-hdr { padding:13px 16px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; background:rgba(255,255,255,.02); }
.chat-panel-title { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--gold); letter-spacing:.08em; }
.chat-body { display:flex; flex:1; overflow:hidden; }
.chat-sidebar { width:140px; border-right:1px solid rgba(255,255,255,.05); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; background:rgba(0,0,0,.15); }
.chat-search-wrap { padding:10px 9px; border-bottom:1px solid rgba(255,255,255,.05); flex-shrink:0; position:relative; }
.chat-search { width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); border-radius:20px; color:var(--white); font-size:.72rem; padding:7px 12px; font-family:inherit; outline:none; transition:all .15s; }
.chat-search::placeholder { color:rgba(238,235,230,.3); }
.chat-search:focus { border-color:rgba(143,200,232,.4); background:rgba(143,200,232,.05); }
.chat-search-results { position:absolute; top:calc(100% + 2px); left:6px; right:6px; background:#1a1a2e; border:1px solid var(--mid); border-radius:8px; z-index:20; max-height:200px; overflow-y:auto; box-shadow:0 8px 24px rgba(0,0,0,.6); display:none; }
.chat-search-results.open { display:block; }
.chat-search-result { padding:9px 12px; cursor:pointer; font-size:.72rem; color:var(--white); border-bottom:1px solid rgba(42,42,69,.4); display:flex; align-items:center; gap:8px; transition:background .12s; }
.chat-search-result:first-child { border-radius:8px 8px 0 0; }
.chat-search-result:last-child { border-bottom:none; border-radius:0 0 8px 8px; }
.chat-search-result:hover { background:rgba(143,200,232,.08); }
.chat-search-result-av { width:24px; height:24px; border-radius:50%; background:var(--mid2); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.6rem; }
.chat-search-result-av img { width:100%; height:100%; object-fit:cover; }
.chat-threads { flex:1; overflow-y:auto; }
.chat-threads::-webkit-scrollbar { width:3px; }
.chat-threads::-webkit-scrollbar-track { background:transparent; }
.chat-threads::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:3px; }
.chat-thread { padding:10px 9px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.04); transition:background .12s; display:flex; gap:8px; align-items:center; }
.chat-thread:hover { background:rgba(255,255,255,.04); }
.chat-thread.active { background:rgba(143,200,232,.08); border-left:2px solid var(--ice); padding-left:7px; }
.chat-thread.unread { background:rgba(232,184,75,.04); }
.chat-thread-av { width:34px; height:34px; border-radius:50%; background:var(--mid); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.75rem; border:1.5px solid rgba(255,255,255,.07); }
.chat-thread-av img { width:100%; height:100%; object-fit:cover; }
.chat-thread-info { flex:1; min-width:0; }
.chat-thread-name { font-size:.72rem; color:var(--white); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-thread.unread .chat-thread-name { color:var(--gold); }
.chat-thread-prev { font-size:.64rem; color:rgba(238,235,230,.45); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.chat-thread-dot { width:8px; height:8px; border-radius:50%; background:var(--gold); flex-shrink:0; display:none; box-shadow:0 0 6px rgba(232,184,75,.6); }
.chat-thread.unread .chat-thread-dot { display:block; }
.chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-main-hdr { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.05); display:flex; align-items:center; gap:10px; flex-shrink:0; background:rgba(255,255,255,.02); }
.chat-main-av { width:30px; height:30px; border-radius:50%; background:var(--mid); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.7rem; border:1.5px solid rgba(255,255,255,.1); }
.chat-main-av img { width:100%; height:100%; object-fit:cover; }
.chat-main-name { font-size:.82rem; font-weight:700; color:var(--white); }
.chat-msgs { flex:1; overflow-y:auto; padding:14px 12px; display:flex; flex-direction:column; gap:4px; }
.chat-msgs::-webkit-scrollbar { width:3px; }
.chat-msgs::-webkit-scrollbar-track { background:transparent; }
.chat-msgs::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:3px; }
.chat-msg { max-width:80%; display:flex; }
.chat-msg.mine { align-self:flex-end; flex-direction:column; align-items:flex-end; }
.chat-msg:not(.mine) { align-self:flex-start; flex-direction:row; align-items:flex-end; gap:7px; }
.chat-msg-content { display:flex; flex-direction:column; }
.chat-msg-sender-av { width:26px; height:26px; border-radius:50%; background:var(--mid2); font-size:.65rem; font-family:'Space Mono',monospace; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; cursor:pointer; border:1px solid rgba(255,255,255,.1); transition:border-color .15s; text-decoration:none; }
.chat-msg-sender-av:hover { border-color:rgba(143,200,232,.5); }
.chat-msg-sender-av img { width:100%; height:100%; object-fit:cover; }
.chat-msg-text { font-size:.78rem; line-height:1.6; padding:8px 12px; color:var(--white); word-break:break-word; }
.chat-msg.mine .chat-msg-text { background:linear-gradient(135deg,rgba(143,200,232,.25),rgba(143,200,232,.15)); border:1px solid rgba(143,200,232,.25); border-radius:16px 16px 4px 16px; }
.chat-msg:not(.mine) .chat-msg-text { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.07); border-radius:4px 16px 16px 16px; }
.chat-msg-time { font-size:.6rem; color:rgba(238,235,230,.25); margin-top:3px; padding:0 2px; }
.chat-empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(238,235,230,.5); font-size:.78rem; text-align:center; padding:20px; line-height:2; gap:8px; }
.chat-empty-state-icon { font-size:2rem; opacity:.5; }
.chat-input-wrap { padding:10px 12px; border-top:1px solid rgba(255,255,255,.05); display:flex; gap:8px; align-items:flex-end; flex-shrink:0; background:rgba(0,0,0,.1); }
.chat-input { flex:1; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); border-radius:20px; color:var(--white); font-size:.8rem; padding:9px 15px; font-family:inherit; resize:none; outline:none; max-height:80px; line-height:1.5; transition:all .15s; }
.chat-input::placeholder { color:rgba(238,235,230,.3); }
.chat-input:focus { border-color:rgba(143,200,232,.35); background:rgba(143,200,232,.05); }
.chat-send-btn { background:linear-gradient(135deg,rgba(143,200,232,.3),rgba(143,200,232,.18)); border:1px solid rgba(143,200,232,.35); color:var(--ice); border-radius:50%; font-size:1rem; width:34px; height:34px; cursor:pointer; transition:all .15s; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.chat-send-btn:hover { background:linear-gradient(135deg,rgba(143,200,232,.5),rgba(143,200,232,.3)); box-shadow:0 0 12px rgba(143,200,232,.3); }
/* Mobile toggle */
.chat-mobile-btn { display:none; position:fixed; bottom:70px; right:16px; width:50px; height:50px; border-radius:50%; background:linear-gradient(135deg,var(--ice),rgba(143,200,232,.7)); color:var(--black); border:none; font-size:1.3rem; cursor:pointer; z-index:400; box-shadow:0 4px 20px rgba(143,200,232,.4); align-items:center; justify-content:center; }
@media(max-width:1100px) { .chat-mobile-btn { display:flex; } .chat-panel { position:fixed; top:52px; right:0; bottom:58px; width:340px; border-radius:0; border:none; border-left:1px solid var(--mid); transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1); z-index:350; } .chat-panel.mobile-open { transform:translateX(0); } }

/* ── Edit form ── */
.edit-form { display:none; padding:0 22px 22px; border-top:1px solid rgba(255,255,255,.06); margin-top:10px; }
.edit-form.open { display:block; }
.ef-label { font-size:.72rem; color:var(--gold); letter-spacing:.1em; text-transform:uppercase; margin:14px 0 6px; }
.ef-input, .ef-ta { width:100%; background:var(--mid2); border:1px solid var(--mid); border-radius:8px; color:var(--white); font-family:'Space Mono',monospace; font-size:.85rem; padding:10px 12px; outline:none; transition:border-color .15s; box-sizing:border-box; }
.ef-ta { resize:vertical; min-height:80px; }
.ef-input:focus, .ef-ta:focus { border-color:var(--gold); }
.ef-ta { resize:vertical; min-height:80px; line-height:1.65; }
.ef-genres-wrap { display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; }
.ef-genre-chip { display:flex; align-items:center; gap:5px; font-size:.72rem; padding:4px 10px; border-radius:12px; background:rgba(232,184,75,.1); border:1px solid rgba(232,184,75,.25); color:var(--gold); }
.ef-genre-chip button { background:none; border:none; color:rgba(232,184,75,.5); cursor:pointer; font-size:.75rem; padding:0 2px; }
.ef-genre-chip button:hover { color:var(--crimson); }
.ef-genre-add { display:flex; gap:8px; margin-top:8px; }
.ef-genre-input { flex:1; background:var(--mid2); border:1px solid var(--mid); border-radius:8px; color:var(--white); font-family:'Space Mono',monospace; font-size:.82rem; padding:8px 11px; outline:none; }

<script type="module">
'use strict';
const ADMIN_EMAIL = 'berkayer032@gmail.com';
const profileUid  = new URLSearchParams(location.search).get('uid');

firebase.initializeApp({
  apiKey:            "AIzaSyDX8AkwDejrkh5L4xUXQcmzKq-DYvc2E8A",
  authDomain:        "ableton-tutorial.firebaseapp.com",

});
const auth = firebase.auth();
const db   = firebase.firestore();
let _user = null;

let _signingIn = false;
function doSignIn() {
  if (_signingIn) return;
  _signingIn = true;
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .catch(e => {
      console.error(e);
      // if popup failed or was blocked/closed, fall back to redirect
      if (e.code === 'auth/popup-closed-by-user' ||
          e.code === 'auth/cancelled-popup-request' ||
          e.code === 'auth/popup-blocked') {
        auth.signInWithPopup(provider);
      } else {
        alert('Giriş hatası: ' + (e.message || e.code || e));
      }
    })
    .finally(() => { _signingIn = false; });
}
function isAdmin(u) { return u?.email === ADMIN_EMAIL; }

const _tLight = document.documentElement.classList.contains('theme-light');
const TITLES = [
  { key:'none',    label:'Ünvan Yok',             icon:'',   color:_tLight?'rgba(26,26,34,.45)':'rgba(238,235,230,.45)' },
  { key:'acemi',   label:'Acemi',                 icon:'🌱', color:_tLight?'#1a7a40':'#6fc' },
  { key:'merakli', label:'Prodüksiyon Meraklısı', icon:'🎧', color:_tLight?'#1a5a88':'#8fc8e8' },
  { key:'uretici', label:'Üretici',               icon:'🎛️', color:_tLight?'#8c6200':'#e8b84b' },
  { key:'veteran', label:'Veteran',               icon:'🔥', color:_tLight?'#a04a08':'#d4722a' },
  { key:'usta',    label:'Usta',                  icon:'⚡', color:_tLight?'#902030':'#b82d45' },
  { key:'efsane',  label:'Efsane',                icon:'👑', color:_tLight?'#8c6200':'#ffd700' },
];

function showToast(msg, type='success', ms=3000) {
  let c = document.getElementById('toastCt');
  if (!c) { c = document.createElement('div'); c.id='toastCt'; c.className='toast-container'; document.body.append(c); }
  const t = document.createElement('div'); t.className='toast'+(type!=='success'?' '+type:''); t.textContent=msg;
  c.append(t);
  setTimeout(() => { t.style.cssText='opacity:0;transform:translateY(8px);transition:.2s;'; setTimeout(()=>t.remove(),200); }, ms);
}
function errId() { return '#' + Math.random().toString(36).slice(2,5).toUpperCase(); }
function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('tr-TR', {month:'long', year:'numeric'});
}
function fmtDateTime(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('tr-TR', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
}

// ── Chat Panel ─────────────────────────────────────────────────────
function _chatId(a, b) { return [a, b].sort().join('_'); }

function _playMsgSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; o.type = 'sine';
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

let _chatListUnsub = null, _msgUnsub = null;
let _activeChatId = null, _activeChatOther = null;
let _chatPanelEl = null, _chatThreadsEl = null, _chatMsgsEl = null, _chatMainEl = null;

async function _sendMsg(fromUid, fromName, fromPhoto, toUid, toName, toPhoto, text) {
  if (fromUid === toUid) throw new Error('Kendinize mesaj gönderemezsiniz.');
  const cid = _chatId(fromUid, toUid);
  const ref = db.collection('chats').doc(cid);
  // Chat doc must exist before message is written (Firestore rule checks participants via get())
  // So: update chat doc first, then add message. On message failure, roll back lastMessage.
  const prevSnap = await ref.get().catch(() => null);
  await ref.set({ participants:[fromUid,toUid], names:{[fromUid]:fromName,[toUid]:toName}, photos:{[fromUid]:fromPhoto||'', [toUid]:toPhoto||''}, lastMessage:text.slice(0,100), lastAt:firebase.firestore.FieldValue.serverTimestamp(), unreadBy:firebase.firestore.FieldValue.arrayUnion(toUid) }, { merge:true });
  try {
    await ref.collection('messages').add({ fromUid, text: text.slice(0, 2000), createdAt:firebase.firestore.FieldValue.serverTimestamp() });
  } catch(e) {
    // Roll back lastMessage to previous value to keep chat doc consistent
    if (prevSnap && prevSnap.exists) {
      const prev = prevSnap.data();
      ref.update({ lastMessage: prev.lastMessage || '', lastAt: prev.lastAt || null }).catch(() => {});
    }
    throw e;
  }
  // Notify recipient
  db.collection('notifications').doc(toUid).collection('items').add({
    text: `💬 ${fromName}: ${text.slice(0,60)}${text.length>60?'…':''}`,
    read: false,
    fromUid,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  }).catch(() => {});
}

function _mkAvEl(photo, name, cls) {
  const av = document.createElement('div'); av.className = cls;
  if (photo) { const i = document.createElement('img'); i.src = photo; av.append(i); }
  else av.textContent = (name||'?')[0].toUpperCase();
  return av;
}

function _openThread(cid, otherId, otherName, otherPhoto) {
  if (!_chatMainEl || !_chatMsgsEl) return;
  _activeChatId = cid; _activeChatOther = { uid:otherId, name:otherName, photo:otherPhoto||null };
  // Mark sidebar active
  _chatThreadsEl?.querySelectorAll('.chat-thread').forEach(t => t.classList.toggle('active', t.dataset.cid===cid));
  // Header
  _chatMainEl.querySelector('.chat-main-hdr').innerHTML = '';
  const hdr = _chatMainEl.querySelector('.chat-main-hdr');
  hdr.append(_mkAvEl(otherPhoto, otherName, 'chat-main-av'));
  const nm = document.createElement('div'); nm.className = 'chat-main-name'; nm.textContent = otherName; hdr.append(nm);
  // Messages area
  _chatMsgsEl.innerHTML = '<div style="color:var(--dim);font-size:.58rem;text-align:center;padding:20px">Yükleniyor…</div>';
  // Mark as read
  if (_user) db.collection('chats').doc(cid).update({ unreadBy:firebase.firestore.FieldValue.arrayRemove(_user.uid) }).catch(()=>{});
  // Subscribe real-time
  function _playMsgSound() {
    const a = new Audio('assets/audio/bildirim sesi.wav');
    a.volume = 0.5;
    a.play().catch(() => {});
  }
  if (_msgUnsub) { _msgUnsub(); _msgUnsub = null; }
  let _msgInitialized = false;
  _msgUnsub = db.collection('chats').doc(cid).collection('messages').orderBy('createdAt','asc').limit(60)
    .onSnapshot(snap => {
      const prevCount = _chatMsgsEl.querySelectorAll('.chat-msg').length;
      _chatMsgsEl.innerHTML = '';
      if (snap.empty) { _chatMsgsEl.innerHTML = '<div class="chat-empty-state"><div class="chat-empty-state-icon">💬</div><div>Henüz mesaj yok.<br>İlk mesajı sen gönder.</div></div>'; _msgInitialized = true; return; }
      const _mkSenderAv = (fromUid) => {
        const av = document.createElement('a'); av.className = 'chat-msg-sender-av';
        av.href = `profile.html?uid=${fromUid}`;
        av.onclick = e => { e.stopPropagation(); };
        const p = _activeChatOther?.photo;
        if (p) { const i = document.createElement('img'); i.src = p; i.alt = ''; av.append(i); }
        else av.textContent = (_activeChatOther?.name||'?')[0].toUpperCase();
        return av;
      };
      snap.docs.forEach(d => {
        const m = d.data(); const myMsg = m.fromUid === _user?.uid;
        const wrap = document.createElement('div'); wrap.className = 'chat-msg' + (myMsg ? ' mine' : '');
        if (m.type === 'collab_request') {
          const card = document.createElement('div'); card.className = 'collab-req-card';
          const label = document.createElement('div'); label.className = 'collab-req-card-label';
          label.textContent = myMsg ? '🤝 Collab isteği gönderdin' : '🤝 Collab isteği aldın';
          card.append(label);
          if (m.status === 'pending' && !myMsg) {
            const btns = document.createElement('div'); btns.className = 'collab-req-card-btns';
            const acceptBtn = document.createElement('button'); acceptBtn.className = 'collab-req-accept'; acceptBtn.textContent = 'Kabul Et';
            const rejectBtn = document.createElement('button'); rejectBtn.className = 'collab-req-reject'; rejectBtn.textContent = 'Reddet';
            acceptBtn.onclick = async () => {
              try {
                await d.ref.update({ status: 'accepted' });
                db.collection('notifications').doc(m.fromUid).collection('items').add({
                  text: `${_user.displayName?.split(' ')[0]||'Biri'} collab isteğini kabul etti!`,
                  fromUid: _user.uid, type: 'collab_accepted', read: false,
                  createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                }).catch(()=>{});
              } catch(e) { alert('Hata: ' + (e.message || e.code)); }
            };
            rejectBtn.onclick = async () => { await d.ref.update({ status: 'rejected' }).catch(e => alert('Hata: ' + (e.message || e.code))); };
            btns.append(acceptBtn, rejectBtn); card.append(btns);
          } else if (m.status === 'accepted') {
            const s = document.createElement('div'); s.className = 'collab-req-card-status accepted'; s.textContent = '✓ Kabul edildi'; card.append(s);
          } else if (m.status === 'rejected') {
            const s = document.createElement('div'); s.className = 'collab-req-card-status rejected'; s.textContent = '✕ Reddedildi'; card.append(s);
          }
          const time2 = document.createElement('div'); time2.className = 'chat-msg-time'; time2.textContent = fmtDateTime(m.createdAt);
          if (!myMsg) {
            const cnt = document.createElement('div'); cnt.className = 'chat-msg-content';
            cnt.append(card, time2); wrap.append(_mkSenderAv(m.fromUid), cnt);
          } else {
            wrap.append(card, time2);
          }
        } else {
          const txt = document.createElement('div'); txt.className = 'chat-msg-text'; txt.textContent = m.text;
          const time = document.createElement('div'); time.className = 'chat-msg-time'; time.textContent = fmtDateTime(m.createdAt);
          if (!myMsg) {
            const cnt = document.createElement('div'); cnt.className = 'chat-msg-content';
            cnt.append(txt, time); wrap.append(_mkSenderAv(m.fromUid), cnt);
          } else {
            wrap.append(txt, time);
          }
        }
        _chatMsgsEl.append(wrap);
      });
      _chatMsgsEl.scrollTop = _chatMsgsEl.scrollHeight;
      // Play sound on new incoming message (not on initial load)
      if (_msgInitialized && snap.docs.length > prevCount) {
        const last = snap.docs[snap.docs.length - 1].data();
        if (last.fromUid !== _user?.uid) _playMsgSound();
      }
      _msgInitialized = true;
    }, err => {
      console.error('messages snapshot:', err);
      if (_chatMsgsEl) _chatMsgsEl.innerHTML = '<div style="color:var(--dim);font-size:.8rem;text-align:center;padding:20px">Mesajlar yüklenemedi.</div>';
    });
}

function _buildChatThread(chatDoc, myUid) {
  const chat = chatDoc.data();
  const adminViewing = chat.participants && !chat.participants.includes(myUid);
  let otherId, otherName;
  if (adminViewing) {
    otherId = chat.participants?.[0] || '';
    otherName = (chat.participants || []).map(p => chat.names?.[p] || 'Üye').join(' ↔ ');
  } else {
    otherId = chat.participants?.find(p => p !== myUid) || '';
    otherName = chat.names?.[otherId] || 'Üye';
  }
  const otherPhoto = chat.photos?.[otherId] || null;
  const isUnread = chat.unreadBy?.includes(myUid);
  const el = document.createElement('div');
  el.className = 'chat-thread' + (isUnread ? ' unread' : '');
  el.dataset.cid = chatDoc.id;
  el.append(_mkAvEl(otherPhoto, otherName, 'chat-thread-av'));
  const info = document.createElement('div'); info.className = 'chat-thread-info';
  const nm = document.createElement('div'); nm.className = 'chat-thread-name'; nm.textContent = otherName;
  const prev = document.createElement('div'); prev.className = 'chat-thread-prev'; prev.textContent = chat.lastMessage || '';
  info.append(nm, prev); el.append(info);
  const dot = document.createElement('div'); dot.className = 'chat-thread-dot'; el.append(dot);
  el.onclick = () => { (_chatPanelEl?._openThread || _openThread)(chatDoc.id, otherId, otherName, otherPhoto); if (window.innerWidth<=1000) _chatPanelEl?.classList.add('mobile-open'); };
  return el;
}

function initChatPanel(user) {
  if (!user) { document.querySelector('.chat-panel')?.remove(); document.querySelector('.chat-mobile-btn')?.remove(); _chatPanelEl=null; if(_chatListUnsub){_chatListUnsub();_chatListUnsub=null;} if(_msgUnsub){_msgUnsub();_msgUnsub=null;} return; }
  if (_chatPanelEl) return; // already initialized
  // Build panel
  const panel = document.createElement('div'); panel.className = 'chat-panel'; _chatPanelEl = panel;
  // Header
  const hdr = document.createElement('div'); hdr.className = 'chat-panel-hdr';
  const title = document.createElement('div'); title.className = 'chat-panel-title'; title.textContent = 'Mesajlar';
  hdr.append(title); panel.append(hdr);
  const body = document.createElement('div'); body.className = 'chat-body'; panel.append(body);
  // Sidebar
  const sidebar = document.createElement('div'); sidebar.className = 'chat-sidebar'; body.append(sidebar);
  const searchInput = document.createElement('input'); searchInput.className = 'chat-search'; searchInput.placeholder = 'Üye ara…'; sidebar.append(searchInput);
  _chatThreadsEl = document.createElement('div'); _chatThreadsEl.className = 'chat-threads'; sidebar.append(_chatThreadsEl);
  // All users cache for combined list
  let _allUsers = {}, _chatDocs = [], _searchTerm = '';
  db.collection('users').orderBy('displayName').limit(150).get().then(snap => {
    snap.docs.forEach(d => {
      if (d.id === user.uid) return;
      const u = d.data();
      _allUsers[d.id] = { name: u.displayName?.split(' ')[0] || 'Üye', photo: u.customPhotoURL || u.photoURL || '' };
    });
    _renderMemberList();
  }).catch(() => {});
  function _renderMemberList() {
    _chatThreadsEl.innerHTML = '';
    const q = _searchTerm.toLowerCase();
    const chattedUids = new Set();
    // Chatted users first (sorted by lastAt from snapshot)
    _chatDocs.forEach(chatDoc => {
      const chat = chatDoc.data();
      const adminViewing = chat.participants && !chat.participants.includes(user.uid);
      let otherId, otherName, otherPhoto;
      if (adminViewing) { otherId = chat.participants?.[0] || ''; otherName = (chat.participants||[]).map(p => chat.names?.[p]||'Üye').join(' ↔ '); }
      else { otherId = chat.participants?.find(p => p !== user.uid) || ''; otherName = chat.names?.[otherId] || _allUsers[otherId]?.name || 'Üye'; }
      otherPhoto = chat.photos?.[otherId] || _allUsers[otherId]?.photo || null;
      if (q && !otherName.toLowerCase().includes(q)) return;
      chattedUids.add(otherId);
      _chatThreadsEl.append(_buildChatThread(chatDoc, user.uid));
    });
    // Non-chatted users — only show when searching
    if (!q) return;
    Object.entries(_allUsers)
      .filter(([uid]) => !chattedUids.has(uid))
      .filter(([, u]) => u.name.toLowerCase().includes(q))
      .sort(([, a], [, b]) => a.name.localeCompare(b.name, 'tr'))
      .forEach(([uid, u]) => {
        const item = document.createElement('div'); item.className = 'chat-thread';
        item.append(_mkAvEl(u.photo, u.name, 'chat-thread-av'));
        const info = document.createElement('div'); info.className = 'chat-thread-info';
        const nm = document.createElement('div'); nm.className = 'chat-thread-name'; nm.textContent = u.name;
        const sub = document.createElement('div'); sub.className = 'chat-thread-prev'; sub.textContent = '💬 Mesaj gönder';
        info.append(nm, sub); item.append(info);
        item.onclick = () => { const cid = _chatId(user.uid, uid); panel._openThread(cid, uid, u.name, u.photo); if (window.innerWidth<=1000) { panel.classList.add('mobile-open'); mobileBtn.style.display='none'; } };
        _chatThreadsEl.append(item);
      });
  }
  // Main area
  const main = document.createElement('div'); main.className = 'chat-main'; body.append(main); _chatMainEl = main;
  const mainHdr = document.createElement('div'); mainHdr.className = 'chat-main-hdr'; main.append(mainHdr);
  const emptyState = document.createElement('div'); emptyState.className = 'chat-empty-state';
  emptyState.innerHTML = '<div class="chat-empty-state-icon">💬</div><div>Bir sohbet seç<br>veya üye ara</div>';
  main.append(emptyState);
  _chatMsgsEl = document.createElement('div'); _chatMsgsEl.className = 'chat-msgs'; _chatMsgsEl.style.display='none'; main.append(_chatMsgsEl);
  const inputWrap = document.createElement('div'); inputWrap.className = 'chat-input-wrap'; main.append(inputWrap);
  const chatInput = document.createElement('textarea'); chatInput.className = 'chat-input'; chatInput.placeholder = 'Mesaj yaz…'; chatInput.rows = 1; inputWrap.append(chatInput);
  const sendBtn = document.createElement('button'); sendBtn.className = 'chat-send-btn'; sendBtn.textContent = '↩'; inputWrap.append(sendBtn);
  const doSend = async () => {
    const txt = chatInput.value.trim(); if (!txt || !_activeChatOther) return;
    if (txt.length > 2000) { alert('Mesaj en fazla 2000 karakter olabilir.'); return; }
    chatInput.value = ''; sendBtn.disabled = true;
    const myName = _user?.displayName?.split(' ')[0] || 'Üye';
    const myPhoto = _user?.photoURL || '';
    try {
      await _sendMsg(user.uid, myName, myPhoto, _activeChatOther.uid, _activeChatOther.name, _activeChatOther.photo||'', txt);
    } catch(e) {
      chatInput.value = txt; // restore message on failure
      const c=errId(); alert(`Mesaj gönderilemedi (${c}): `+(e.message||e.code||'Bağlantı hatası'));
    }
    sendBtn.disabled = false;
    chatInput.focus();
  };
  sendBtn.onclick = doSend;
  chatInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
  // Show msgs area when a thread is opened
  const origOpenThread = _openThread;
  // Patch: show/hide empty state
  const _patchOpenThread = (cid, otherId, otherName, otherPhoto) => {
    emptyState.style.display = 'none'; _chatMsgsEl.style.display = '';
    _openThread(cid, otherId, otherName, otherPhoto);
  };
  // Re-assign open with patch
  panel._openThread = _patchOpenThread;
  // Search filters combined list
  searchInput.oninput = () => { _searchTerm = searchInput.value.trim(); _renderMemberList(); };
  document.addEventListener('click', e => {
    // Re-show mobile btn if panel closed from outside tap
    if (!panel.contains(e.target) && !e.target.closest('.msg-btn') && panel.classList.contains('mobile-open')) {
      panel.classList.remove('mobile-open');
      mobileBtn.style.display = 'flex';
    }
  });
  // Resize grip — grows RIGHT and DOWN
  const grip = document.createElement('div'); grip.className = 'chat-resize-grip'; panel.append(grip);
  grip.addEventListener('mousedown', e => {
    e.preventDefault();
    const sx = e.clientX, sy = e.clientY, sw = panel.offsetWidth, sh = panel.offsetHeight;
    const onMove = ev => {
      const profileCard = document.querySelector('.profile-card');
      const maxH = profileCard ? Math.floor(profileCard.getBoundingClientRect().height) : (window.innerHeight - 90);
      panel.style.width  = Math.max(360, Math.min(sw + (ev.clientX - sx), 640)) + 'px';
      panel.style.height = Math.max(300, Math.min(sh + (ev.clientY - sy), maxH)) + 'px';
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
  // Insert panel into layout
  const layout = document.getElementById('layout');
  if (layout) layout.append(panel);
  // Mobile toggle button
  const mobileBtn = document.createElement('button'); mobileBtn.className = 'chat-mobile-btn'; mobileBtn.textContent = '💬'; document.body.append(mobileBtn);
  mobileBtn.onclick = e => {
    e.stopPropagation();
    panel.classList.toggle('mobile-open');
    mobileBtn.style.display = panel.classList.contains('mobile-open') ? 'none' : 'flex';
  };
  // Hide mobileBtn when panel closes via back-tap
  panel.addEventListener('click', e => {
    if (e.target === panel && !panel.classList.contains('mobile-open')) mobileBtn.style.display = 'flex';
  });
  // Load chat list real-time — admin sees all, others see own
  const chatQuery = isAdmin(user)
    ? db.collection('chats').orderBy('lastAt','desc').limit(100)
    : db.collection('chats').where('participants','array-contains',user.uid).orderBy('lastAt','desc').limit(30);
  _chatListUnsub = chatQuery.onSnapshot(snap => {
    _chatDocs = snap.docs;
    _renderMemberList();
  }, err => { console.error('chat list snapshot:', err); });
}

let _personalNotifs = [], _announcements = [], _annSeenAt = null, _dismissedAnns = [];

function _mergeNotifs(uid) {
  const all = [
    ..._personalNotifs.map(n => ({...n, _t:'p'})),
    ..._announcements.filter(n => !_dismissedAnns.includes(n._id)).map(n => ({...n, _t:'a'}))
  ].sort((a,b) => ((b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)));
  const annSec = _annSeenAt?.seconds || 0;
  const unread = _personalNotifs.filter(n => !n.read).length
    + _announcements.filter(n => (n.createdAt?.seconds||0) > annSec).length;
  const badge = document.querySelector('.notif-badge');
  if (badge) { badge.textContent = unread > 9 ? '9+' : String(unread); badge.style.display = unread > 0 ? 'block' : 'none'; }
  if (unread > _prevUnreadCount) {
    const bell = document.querySelector('.notif-bell');
    if (bell) { bell.classList.remove('ringing'); void bell.offsetWidth; bell.classList.add('ringing'); setTimeout(() => bell.classList.remove('ringing'), 1800); }
  }
  _prevUnreadCount = unread;
  if (_notifPanelEl) {
    const list = _notifPanelEl.querySelector('.notif-list'); if (!list) return;
    list.innerHTML = '';
    if (!all.length) { list.innerHTML = '<div class="notif-empty">Bildirim yok</div>'; return; }
    all.forEach(n => {
      const isUnread = n._t==='p' ? !n.read : (n.createdAt?.seconds||0) > annSec;
      const item = document.createElement('div'); item.className = 'notif-item' + (isUnread ? ' unread' : '');
      const icon = n._t==='a' ? '📢 ' : '';
      const timeStr = n.createdAt ? n.createdAt.toDate().toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      item.innerHTML = `<div class="notif-item-text">${icon}${n.text || 'Yeni bildirim'}</div><div class="notif-item-time">${timeStr}</div>`;
      if (n.type === 'collab' && n.fromUid) item.onclick = () => { location.href = `profile.html?uid=${n.fromUid}`; };
      else if (n.fromUid) item.onclick = () => { _closePanels(); openChatWith(n.fromUid); };
      else if (n.postId) item.onclick = () => { location.href = `post.html?id=${n.postId}`; };
      if (n._id) {
        const del = document.createElement('button'); del.className = 'notif-del-btn'; del.textContent = '×'; del.title = 'Sil';
        del.onclick = e => {
          e.stopPropagation();
          if (n._t === 'p') {
            db.collection('notifications').doc(uid).collection('items').doc(n._id).delete().catch(() => {});
          } else {
            if (!_dismissedAnns.includes(n._id)) { _dismissedAnns.push(n._id); }
            db.collection('users').doc(uid).update({ dismissedAnns: firebase.firestore.FieldValue.arrayUnion(n._id) }).catch(() => {});
            _announcements = _announcements.filter(a => a._id !== n._id);
            _mergeNotifs(uid);
          }
        };
        item.append(del);
      }
      list.append(item);
    });
  }
}

function markAllNotifRead(uid) {
  db.collection('notifications').doc(uid).collection('items')
    .where('read', '==', false).get().then(snap => {
      const batch = db.batch(); snap.docs.forEach(d => batch.update(d.ref, { read: true })); batch.commit();
    }).catch(() => {});
  db.collection('users').doc(uid).set({ announcementsSeenAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }).catch(() => {});
  _annSeenAt = { seconds: Date.now() / 1000 };
  _personalNotifs = _personalNotifs.map(n => ({...n, read: true}));
  _mergeNotifs(uid);
}

function initNotifications(user) {
  if (_notifUnsub) { _notifUnsub(); _notifUnsub = null; }
  if (_annUnsub) { _annUnsub(); _annUnsub = null; }
  _personalNotifs = []; _announcements = []; _annSeenAt = null; _dismissedAnns = [];
  if (!user) return;
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().catch(() => {});
  }
  db.collection('users').doc(user.uid).get().then(d => {
    _annSeenAt = d.data()?.announcementsSeenAt || null;
    _dismissedAnns = d.data()?.dismissedAnns || [];
    _mergeNotifs(user.uid);
  }).catch(() => {});
  let _prevNIds_prf = new Set();
  _notifUnsub = db.collection('notifications').doc(user.uid).collection('items')
    .orderBy('createdAt', 'desc').limit(20)
    .onSnapshot(snap => {
      _personalNotifs = snap.docs.map(d => ({...d.data(), _id: d.id}));
      if (_prevNIds_prf.size > 0 && 'Notification' in window && Notification.permission === 'granted') {
        snap.docs.forEach(d => {
          if (!_prevNIds_prf.has(d.id) && !d.data().read) {
            try { new Notification('Berkay Academy', { body: d.data().text || 'Yeni bildirim', icon: '/assets/img/logo.png' }); } catch(_){}
          }
        });
      }
      _prevNIds_prf = new Set(snap.docs.map(d => d.id));
      if (snap.docs.length > 4) { const b = db.batch(); snap.docs.slice(4).forEach(d => b.delete(d.ref)); b.commit().catch(() => {}); }
      _mergeNotifs(user.uid);
    }, () => {});
  _annUnsub = db.collection('announcements').orderBy('createdAt', 'desc').limit(15)
    .onSnapshot(snap => { _announcements = snap.docs.map(d => ({...d.data(), _id: d.id})); _mergeNotifs(user.uid); }, () => {});
}

let _renderSeq = 0;
async function renderProfile() {
  const seq = ++_renderSeq;

    db.collection('follows').where('followeeId','==',uid).limit(500).get().catch(()=>null),
    (followId && !isOwn) ? db.collection('follows').doc(followId).get().catch(()=>null) : Promise.resolve(null),
  ]);
  const followerCount = followersSnap?.size || 0;
  let isFollowing = followDoc?.exists || false;
  const posts = (postsSnap ? postsSnap.docs.map(d => ({id:d.id,...d.data()})) : [])
    .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)).slice(0,10);
  // If userReplies is empty, fallback to collectionGroup (requires authorId collection-group index)
  let replyDocs = repliesSnap?.docs || [];
  console.log('[replies] userReplies count:', replyDocs.length, 'uid:', uid);
  if (replyDocs.length === 0) {
    const cgSnap = await db.collectionGroup('replies').where('authorId','==',uid).orderBy('createdAt','desc').limit(20).get().catch(e=>{console.error('[replies] collectionGroup error:',e);return null;});
    console.log('[replies] cgSnap:', cgSnap ? (cgSnap.empty ? 'empty' : cgSnap.size + ' docs') : 'null');
    if (cgSnap && !cgSnap.empty) {
      replyDocs = cgSnap.docs.map(d => ({ id: d.id, ...d.data(), postId: d.ref.parent.parent.id }));
    }
  } else {
    replyDocs = replyDocs.map(d => ({id:d.id,...d.data()}));
  }
  const replies = replyDocs.slice(0, 8);
  console.log('[replies] final count:', replies.length);

  if (seq !== _renderSeq) return; // a newer render started, bail
  const layout = document.getElementById('layout');
  // Remove all children except chat panel (which persists across renders)
  Array.from(layout.children).forEach(c => { if (c !== _chatPanelEl) c.remove(); });

  // ── Profile card ──
  const pCard = document.createElement('div'); pCard.className = 'profile-card';

  const avWrap = document.createElement('div'); avWrap.className = 'profile-avatar-wrap';

    avWrap.append(img);

        snap.docs.forEach(d => batch.delete(d.ref));
        await batch.commit();
        annStatus.style.color = 'var(--green)'; annStatus.textContent = '✓ Tüm duyurular silindi';
        setTimeout(() => { annStatus.textContent = ''; }, 3000);
      } catch(e) {
        annStatus.style.color = 'var(--crimson)'; annStatus.textContent = '⚠ Hata: ' + (e.code || e.message);
      }
      annDelAll.disabled = false; annDelAll.textContent = '🗑 Tümünü Sil';
    };
    annRow.append(annSend, annDelAll, annStatus);
    annPanel.append(annLbl, annTa, annRow);
    pCard.append(annPanel);

    // Delete all chats panel
    const msgPanel = document.createElement('div'); msgPanel.className = 'admin-announce-panel';
    msgPanel.style.borderTop = '1px solid rgba(184,45,69,.18)';
    const msgLbl = document.createElement('div'); msgLbl.className = 'admin-title-label'; msgLbl.textContent = '💬 Mesaj Yönetimi';
    const msgDelAll = document.createElement('button'); msgDelAll.className = 'admin-announce-send';
    msgDelAll.style.cssText = 'background:rgba(184,45,69,.15);border:1px solid rgba(184,45,69,.35);color:var(--crimson);margin-top:8px;';
    msgDelAll.textContent = '🗑 Tüm Mesajları Sil';
    const msgStatus = document.createElement('span'); msgStatus.style.cssText = 'font-size:.58rem;color:var(--dim);display:block;margin-top:6px;';
    msgDelAll.onclick = async () => {
      if (!confirm('Tüm sohbet mesajlarını silmek istediğine emin misin? Bu işlem geri alınamaz.')) return;
      msgDelAll.disabled = true; msgDelAll.textContent = '⏳ Siliniyor...';
      try {
        const chatSnap = await db.collection('chats').get();
        for (const chatDoc of chatSnap.docs) {
          const msgSnap = await chatDoc.ref.collection('messages').get();
          const batch = db.batch();
          msgSnap.docs.forEach(m => batch.delete(m.ref));
          batch.delete(chatDoc.ref);
          await batch.commit();
        }
        msgStatus.style.color = 'var(--green)'; msgStatus.textContent = '✓ Tüm mesajlar silindi (' + chatSnap.size + ' sohbet)';
        setTimeout(() => { msgStatus.textContent = ''; }, 4000);
      } catch(e) {
        msgStatus.style.color = 'var(--crimson)'; msgStatus.textContent = '⚠ Hata: ' + (e.code || e.message);
      }
      msgDelAll.disabled = false; msgDelAll.textContent = '🗑 Tüm Mesajları Sil';
    };
    msgPanel.append(msgLbl, msgDelAll, msgStatus);
    pCard.append(msgPanel);
  }

  layout.append(pCard);

  // ── Activity column ──
  const actCol = document.createElement('div'); actCol.className = 'activity-col';

  // Recent posts
  const postsSec = document.createElement('div'); postsSec.className = 'activity-section';
  const postTitle = document.createElement('div'); postTitle.className = 'activity-title';
  postTitle.textContent = 'Son Konular';
  postsSec.append(postTitle);
  if (posts.length === 0) {
    const e = document.createElement('div'); e.className = 'activity-empty'; e.textContent = 'Henüz konu açılmamış.';
    postsSec.append(e);
  } else {
    posts.forEach(p => {
      const item = document.createElement('div'); item.className = 'activity-item';
      item.onclick = () => location.href = `post.html?id=${p.id}`;
      const t = document.createElement('div'); t.className = 'activity-item-title';
      t.textContent = p.title || (p.text?.slice(0,60)+'…') || '';
      const m = document.createElement('div'); m.className = 'activity-item-meta';
      const dateEl = document.createElement('span'); dateEl.textContent = fmtDate(p.createdAt);
      const rcEl   = document.createElement('span'); rcEl.textContent = `💬 ${p.replyCount||0}`;
      m.append(dateEl, rcEl);
      item.append(t, m); postsSec.append(item);
    });
  }
  actCol.append(postsSec);

  // Recent replies
  const repliesSec = document.createElement('div'); repliesSec.className = 'activity-section';
  const repliesTitle = document.createElement('div'); repliesTitle.className = 'activity-title';
  repliesTitle.textContent = 'Son Yorumlar';
  repliesSec.append(repliesTitle);
  console.log('[render] replies.length at render:', replies.length);
  if (replies.length === 0) {
    const e = document.createElement('div'); e.className = 'activity-empty';
    e.textContent = isOwn ? 'Henüz yorum yapılmamış. Forum\'da ilk yorumunu yaptıktan sonra burada görünür.' : 'Henüz yorum yapılmamış.';
    repliesSec.append(e);
  } else {
    replies.forEach(r => {
      console.log('[render] reply item:', r.id, 'text:', (r.text||'').slice(0,30), 'postId:', r.postId);
      const item = document.createElement('div'); item.className = 'activity-item';
      item.onclick = () => location.href = `post.html?id=${r.postId}`;
      const t = document.createElement('div'); t.className = 'activity-item-title';
      const rtxt = r.text || r.content || '';
      t.textContent = rtxt.length > 80 ? rtxt.slice(0,80) + '…' : rtxt;
      const m = document.createElement('div'); m.className = 'activity-item-meta';
      const dateEl = document.createElement('span'); dateEl.textContent = fmtDate(r.createdAt);
      m.append(dateEl); item.append(t, m); repliesSec.append(item);
    });
  }
  actCol.append(repliesSec);

  layout.append(actCol);

  // Chat panel goes last → right column (3rd)
  if (_chatPanelEl) layout.append(_chatPanelEl);
}

auth.getRedirectResult().catch(e => console.error("redirectResult:", e));
auth.onAuthStateChanged(async user => {
  _user = user;
  updateAuthBar(user);
  initNotifications(user);
  initChatPanel(user);
  if (user) {
    const uref = db.collection('users').doc(user.uid);
    const snap = await uref.get({ source: 'server' }).catch(() => uref.get().catch(() => null));
    const update = { displayName: user.displayName || '', photoURL: user.photoURL || '', email: user.email };
    if (!snap?.data()?.joinedAt) update.joinedAt = firebase.firestore.FieldValue.serverTimestamp();
    await uref.set(update, { merge: true }).catch(console.error);
  }
  await renderProfile();
});
</script>
