<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üyeler — Elektronik Müzik Topluluğu</title>
<meta name="theme-color" content="#060609">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black:#060609; --deep:#0c0c16; --panel:#111120; --card:#13131f;
  --gold:#e8b84b; --amber:#d4722a; --crimson:#b82d45;
  --ice:#8fc8e8; --white:#eeebe6; --mid:#2a2a45; --mid2:#1e1e34;
  --dim:rgba(238,235,230,0.45);
}
body { font-family:'Space Mono',monospace; background:var(--black); color:var(--white); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

.topnav { position:fixed; top:0; left:0; right:0; z-index:300; background:rgba(6,6,9,.92); border-bottom:1px solid var(--mid); backdrop-filter:blur(8px); height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; }
.topnav-left { display:flex; align-items:center; gap:14px; }
.topnav-back { color:var(--dim); font-size:.65rem; letter-spacing:.08em; text-decoration:none; transition:color .15s; }
.topnav-back:hover { color:var(--gold); }
.topnav-sep { color:var(--mid); font-size:.8rem; }
.topnav-brand { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--gold); letter-spacing:.08em; }
#authBar { display:flex; align-items:center; gap:8px; }
.auth-sign-btn { background:rgba(42,42,69,.9); border:1px solid var(--gold); color:var(--gold); font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.06em; padding:6px 14px; border-radius:4px; cursor:pointer; transition:background .18s,color .18s; }
.auth-sign-btn:hover { background:var(--gold); color:var(--black); }
.auth-user-wrap { display:flex; align-items:center; gap:8px; background:rgba(42,42,69,.85); border:1px solid rgba(232,184,75,.3); padding:4px 10px 4px 4px; border-radius:20px; }
.auth-avatar { width:26px; height:26px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; }
.auth-name { font-size:.62rem; color:var(--white); max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.auth-out-btn { background:transparent; border:none; color:rgba(238,235,230,.4); font-size:.6rem; cursor:pointer; font-family:'Space Mono',monospace; }
.auth-out-btn:hover { color:var(--crimson); }

/* ── Banner ── */
.banner { margin-top:52px; background:linear-gradient(135deg,#0c0c20,#12101e,#1a0e18); border-bottom:1px solid var(--mid); position:relative; z-index:1; overflow:hidden; }
.banner::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 25% 50%,rgba(232,184,75,.08),transparent 60%), radial-gradient(ellipse at 75% 50%,rgba(184,45,69,.06),transparent 60%); pointer-events:none; }
.banner-inner { max-width:1100px; margin:0 auto; padding:24px 24px 20px; display:flex; align-items:center; gap:18px; position:relative; }
.banner-icon { width:52px; height:52px; background:linear-gradient(135deg,var(--crimson),var(--amber)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; box-shadow:0 0 18px rgba(232,184,75,.18); }
.banner-info h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.5rem,3vw,2.2rem); color:var(--white); letter-spacing:.06em; line-height:1; margin-bottom:4px; }
.banner-info p { font-size:.65rem; color:var(--dim); letter-spacing:.06em; }
.banner-count { margin-left:auto; font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--gold); flex-shrink:0; text-align:center; }
.banner-count-lbl { font-family:'Space Mono',monospace; font-size:.5rem; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; }

/* ── Layout ── */
.layout { max-width:1100px; margin:0 auto; padding:24px 20px 80px; position:relative; z-index:1; }

/* ── Filter / Search ── */
.top-row { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
.search-wrap { position:relative; flex:1; min-width:200px; }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:rgba(238,235,230,.22); font-size:.75rem; pointer-events:none; }
.search-input { width:100%; background:var(--card); border:1px solid var(--mid); border-radius:6px; color:var(--white); font-family:'Space Mono',monospace; font-size:.72rem; padding:9px 12px 9px 32px; outline:none; transition:border-color .15s; }
.search-input:focus { border-color:var(--gold); }
.search-input::placeholder { color:rgba(238,235,230,.22); }
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; }
.fbtn { padding:5px 13px; border-radius:20px; border:1px solid var(--mid); background:transparent; color:var(--dim); font-family:'Space Mono',monospace; font-size:.58rem; cursor:pointer; transition:all .15s; }
.fbtn.active { border-color:var(--gold); color:var(--gold); background:rgba(232,184,75,.08); }
.fbtn:hover:not(.active) { border-color:rgba(238,235,230,.18); color:var(--white); }

/* ── Members grid ── */
.members-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }

/* ── Member card ── */
.mcard { background:var(--card); border:1px solid var(--mid); border-radius:10px; overflow:hidden; cursor:pointer; transition:border-color .15s,transform .15s; text-decoration:none; display:flex; flex-direction:column; }
.mcard:hover { border-color:rgba(232,184,75,.3); transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,.35); }
.mcard-cover { height:52px; background:linear-gradient(135deg,var(--crimson),var(--amber)); position:relative; }
.mcard-av-wrap { position:absolute; bottom:-20px; left:14px; }
.mcard-av { width:40px; height:40px; border-radius:50%; object-fit:cover; border:3px solid var(--card); }
.mcard-av-ph { width:40px; height:40px; border-radius:50%; background:var(--mid2); border:3px solid var(--card); display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:bold; color:var(--gold); }
.mcard-body { padding:26px 14px 14px; flex:1; display:flex; flex-direction:column; gap:5px; }
.mcard-name { font-size:.8rem; font-weight:bold; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mcard-name.is-admin::after { content:' ⚡'; color:var(--gold); font-size:.65rem; }
.mcard-title { font-size:.58rem; font-weight:bold; letter-spacing:.04em; }
.mcard-genres { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.mcard-genre { font-size:.52rem; padding:2px 7px; border-radius:10px; background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.2); color:rgba(232,184,75,.7); }
.mcard-footer { display:flex; gap:12px; padding:10px 14px; border-top:1px solid rgba(255,255,255,.05); }
.mcard-stat { font-size:.55rem; color:var(--dim); }
.mcard-stat span { color:var(--white); font-weight:bold; }

.empty-state { text-align:center; padding:60px; color:var(--dim); font-size:.72rem; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a href="forum.html" class="topnav-back">← Forum</a>
    <span class="topnav-sep">|</span>
    <span class="topnav-brand">Topluluk Üyeleri</span>
  </div>
  <div id="authBar"></div>
</nav>

<div class="banner">
  <div class="banner-inner">
    <div class="banner-icon">👥</div>
    <div class="banner-info">
      <h1>Topluluk Üyeleri</h1>
      <p>Elektronik Müzik Topluluğu</p>
    </div>
    <div style="text-align:center;margin-left:auto;flex-shrink:0;">
      <div class="banner-count" id="memberCount">—</div>
      <div class="banner-count-lbl">Üye</div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="top-row">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput" type="text" placeholder="İsim veya ünvan ara...">
    </div>
    <div class="filter-bar" id="titleFilter"></div>
  </div>
  <div class="members-grid" id="grid">
    <div class="empty-state" style="grid-column:1/-1">Yükleniyor...</div>
  </div>
</div>

<script>
'use strict';
const ADMIN_EMAIL = 'berkayer032@gmail.com';

firebase.initializeApp({
  apiKey:            "AIzaSyDX8AkwDejrkh5L4xUXQcmzKq-DYvc2E8A",
  authDomain:        "ableton-tutorial.firebaseapp.com",
  projectId:         "ableton-tutorial",
  storageBucket:     "ableton-tutorial.firebasestorage.app",
  messagingSenderId: "677640687230",
  appId:             "1:677640687230:web:8c6a2dfefbf55c69ffd22f",
});
const auth = firebase.auth();
const db   = firebase.firestore();
let _user = null;

let _signingIn = false;
function doSignIn() {
  if (_signingIn) return;
  _signingIn = true;
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(console.error).finally(() => { _signingIn = false; });
}

const TITLES = {
  acemi:   { label:'Acemi',                 icon:'🌱', color:'#6fc' },
  merakli: { label:'Prodüksiyon Meraklısı', icon:'🎧', color:'#8fc8e8' },
  uretici: { label:'Üretici',               icon:'🎛️', color:'#e8b84b' },
  veteran: { label:'Veteran',               icon:'🔥', color:'#d4722a' },
  usta:    { label:'Usta',                  icon:'⚡', color:'#b82d45' },
  efsane:  { label:'Efsane',               icon:'👑', color:'#ffd700' },
};

function updateAuthBar(user) {
  const bar = document.getElementById('authBar'); bar.innerHTML = '';
  if (user) {
    const wrap = document.createElement('div'); wrap.className = 'auth-user-wrap';
    const img  = document.createElement('img');  img.className = 'auth-avatar';
    img.src = user.photoURL || ''; img.alt = '';
    const name = document.createElement('span'); name.className = 'auth-name';
    name.textContent = user.email === ADMIN_EMAIL ? '⚡ Admin' : (user.displayName?.split(' ')[0] || 'Üye');
    const out = document.createElement('button'); out.className = 'auth-out-btn';
    out.textContent = '✕'; out.onclick = () => auth.signOut();
    wrap.append(img, name, out); bar.append(wrap);
  } else {
    const btn = document.createElement('button'); btn.className = 'auth-sign-btn';
    btn.textContent = '⬡ Google ile Giriş'; btn.onclick = doSignIn;
    bar.append(btn);
  }
}

let _allMembers = [];
let _titleFilter = 'all';
let _search = '';

function buildFilters() {
  const bar = document.getElementById('titleFilter');
  bar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'fbtn' + (_titleFilter === 'all' ? ' active' : '');
  all.textContent = 'Tümü';
  all.onclick = () => { _titleFilter = 'all'; buildFilters(); renderGrid(); };
  bar.append(all);
  Object.entries(TITLES).forEach(([key, td]) => {
    const b = document.createElement('button');
    b.className = 'fbtn' + (_titleFilter === key ? ' active' : '');
    b.textContent = td.icon + ' ' + td.label;
    b.onclick = () => { _titleFilter = key; buildFilters(); renderGrid(); };
    bar.append(b);
  });
}

function renderGrid() {
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  let visible = _allMembers;
  if (_titleFilter !== 'all') visible = visible.filter(m => m.title === _titleFilter);
  if (_search) visible = visible.filter(m =>
    (m.displayName||'').toLowerCase().includes(_search) ||
    (m.title && TITLES[m.title]?.label.toLowerCase().includes(_search))
  );

  if (!visible.length) {
    const e = document.createElement('div'); e.className = 'empty-state'; e.style.gridColumn = '1/-1';
    e.textContent = _search ? `"${_search}" için sonuç yok.` : 'Henüz bu ünvanda üye yok.';
    grid.append(e); return;
  }

  visible.forEach(([uid, m]) => {
    const card = document.createElement('a'); card.className = 'mcard'; card.href = `profile.html?uid=${uid}`;

    // Cover + avatar
    const cover = document.createElement('div'); cover.className = 'mcard-cover';
    const avWrap = document.createElement('div'); avWrap.className = 'mcard-av-wrap';
    if (m.photoURL) {
      const img = document.createElement('img'); img.className = 'mcard-av'; img.src = m.photoURL; img.alt = '';
      avWrap.append(img);
    } else {
      const ph = document.createElement('div'); ph.className = 'mcard-av-ph';
      ph.textContent = (m.displayName || '?')[0].toUpperCase();
      avWrap.append(ph);
    }
    cover.append(avWrap); card.append(cover);

    // Body
    const body = document.createElement('div'); body.className = 'mcard-body';
    const nm = document.createElement('div');
    nm.className = 'mcard-name' + (m.email === ADMIN_EMAIL ? ' is-admin' : '');
    nm.textContent = m.displayName?.split(' ')[0] || 'Üye';
    body.append(nm);

    if (m.title && TITLES[m.title]) {
      const td = TITLES[m.title];
      const ts = document.createElement('div'); ts.className = 'mcard-title';
      ts.style.color = td.color;
      ts.textContent = td.icon + ' ' + td.label;
      body.append(ts);
    }

    if (m.genres?.length) {
      const gw = document.createElement('div'); gw.className = 'mcard-genres';
      m.genres.slice(0,3).forEach(g => {
        const tag = document.createElement('span'); tag.className = 'mcard-genre'; tag.textContent = g;
        gw.append(tag);
      });
      body.append(gw);
    }
    card.append(body);

    // Footer stats
    const footer = document.createElement('div'); footer.className = 'mcard-footer';
    const ps = document.createElement('div'); ps.className = 'mcard-stat';
    ps.innerHTML = `Konu <span>${m.postCount||0}</span>`;
    const rs = document.createElement('div'); rs.className = 'mcard-stat';
    rs.innerHTML = `Yanıt <span>${m.replyCount||0}</span>`;
    footer.append(ps, rs); card.append(footer);

    grid.append(card);
  });
}

async function loadMembers() {
  const snap = await db.collection('users').orderBy('joinedAt','desc').limit(100).get();
  document.getElementById('memberCount').textContent = snap.size;
  _allMembers = snap.docs.map(d => [d.id, d.data()]);
  buildFilters();
  renderGrid();
}

document.getElementById('searchInput').oninput = e => {
  _search = e.target.value.trim().toLowerCase();
  renderGrid();
};

auth.onAuthStateChanged(user => {
  _user = user;
  updateAuthBar(user);
  loadMembers();
});
</script>
</body>
</html>
