<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Üyeler — Elektronik Müzik Topluluğu</title>
<meta name="theme-color" content="#060609">
<meta property="og:type" content="website">
<meta property="og:title" content="Topluluk Üyeleri — Elektronik Müzik">
<meta property="og:description" content="Elektronik müzik topluluğunun üyelerini keşfet. Prodüktörler, DJ'ler ve müzisyenler.">
<meta property="og:image" content="https://erberkay.github.io/Producer.School/assets/img/og-logo.png">
<meta property="og:url" content="https://erberkay.github.io/Producer.School/members.html">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black:#060609; --deep:#0c0c16; --panel:#111120; --card:#13131f;
  --gold:#e8b84b; --amber:#d4722a; --crimson:#b82d45;
  --ice:#8fc8e8; --white:#eeebe6; --mid:#2a2a45; --mid2:#1e1e34;
  --dim:rgba(238,235,230,0.45);
}
body { font-family:'Space Mono',monospace; background:var(--black); color:var(--white); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0;
}

.topnav { position:fixed; top:0; left:0; right:0; z-index:300; background:rgba(6,6,9,.92); border-bottom:1px solid var(--mid); backdrop-filter:blur(8px); height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; }
.topnav-left { display:flex; align-items:center; gap:14px; }
.topnav-back { color:var(--dim); font-size:.65rem; letter-spacing:.08em; text-decoration:none; transition:color .15s; }
.topnav-back:hover { color:var(--gold); }
.topnav-sep { color:var(--mid); font-size:.8rem; }
.topnav-brand { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--gold); letter-spacing:.08em; }
#authBar { display:flex; align-items:center; gap:8px; }
.auth-sign-btn { background:rgba(42,42,69,.9); border:1px solid var(--gold); color:var(--gold); font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:.06em; padding:6px 14px; border-radius:4px; cursor:pointer; transition:background .18s,color .18s; }
.auth-sign-btn:hover { background:var(--gold); color:var(--black); }
.auth-user-wrap { display:flex; align-items:center; gap:8px; background:rgba(42,42,69,.85); border:1px solid rgba(232,184,75,.3); padding:4px 10px 4px 4px; border-radius:20px; }
.auth-avatar { width:26px; height:26px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; }
.auth-name { font-size:.62rem; color:var(--white); max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.auth-out-btn { background:transparent; border:none; color:rgba(238,235,230,.4); font-size:.6rem; cursor:pointer; font-family:'Space Mono',monospace; }
.auth-out-btn:hover { color:var(--crimson); }

/* Banner */
.banner { margin-top:52px; background:linear-gradient(135deg,#0c0c20,#12101e,#1a0e18); border-bottom:1px solid var(--mid); position:relative; z-index:1; overflow:hidden; }
.banner::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 25% 50%,rgba(232,184,75,.08),transparent 60%), radial-gradient(ellipse at 75% 50%,rgba(184,45,69,.06),transparent 60%); pointer-events:none; }
.banner-inner { max-width:1100px; margin:0 auto; padding:24px 24px 20px; display:flex; align-items:center; gap:18px; position:relative; }
.banner-icon { width:52px; height:52px; background:linear-gradient(135deg,var(--crimson),var(--amber)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; box-shadow:0 0 18px rgba(232,184,75,.18); }
.banner-info h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.5rem,3vw,2.2rem); color:var(--white); letter-spacing:.06em; line-height:1; margin-bottom:4px; }
.banner-info p { font-size:.65rem; color:var(--dim); letter-spacing:.06em; }
.banner-count-wrap { margin-left:auto; text-align:center; flex-shrink:0; opacity:0; transition:opacity .5s; }
.banner-count-wrap.loaded { opacity:1; }
.banner-count { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--gold); }
.banner-count-lbl { font-family:'Space Mono',monospace; font-size:.5rem; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; }

/* Layout */
.layout { max-width:1100px; margin:0 auto; padding:24px 20px 80px; position:relative; z-index:1; }

/* Filter / Search */
.top-row { display:flex; gap:10px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.search-wrap { position:relative; flex:1; min-width:200px; }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:rgba(238,235,230,.22); font-size:.75rem; pointer-events:none; }
.search-input { width:100%; background:var(--card); border:1px solid var(--mid); border-radius:6px; color:var(--white); font-family:'Space Mono',monospace; font-size:.72rem; padding:9px 12px 9px 32px; outline:none; transition:border-color .15s; }
.search-input:focus { border-color:var(--gold); }
.search-input::placeholder { color:rgba(238,235,230,.22); }
.sort-select { background:var(--card); border:1px solid var(--mid); border-radius:6px; color:var(--white); font-family:'Space Mono',monospace; font-size:.62rem; padding:9px 12px; outline:none; cursor:pointer; transition:border-color .15s; }
.sort-select:focus { border-color:var(--gold); }

.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.fbtn { padding:5px 13px; border-radius:20px; border:1px solid var(--mid); background:transparent; color:var(--dim); font-family:'Space Mono',monospace; font-size:.58rem; cursor:pointer; transition:all .15s; }
.fbtn.active { border-color:var(--gold); color:var(--gold); background:rgba(232,184,75,.08); }
.fbtn:hover:not(.active) { border-color:rgba(238,235,230,.18); color:var(--white); }
.fbtn.collab-active { border-color:#4ade80; color:#4ade80; background:rgba(74,222,128,.07); }

/* Members grid */
.members-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }

/* Member card */
.mcard { background:var(--card); border:1px solid var(--mid); border-radius:10px; overflow:hidden; cursor:pointer; transition:border-color .15s,transform .15s; text-decoration:none; display:flex; flex-direction:column; }
.mcard:hover { border-color:rgba(232,184,75,.3); transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,.35); }
.mcard-cover { height:52px; background:linear-gradient(135deg,var(--crimson),var(--amber)); position:relative; }
.mcard-av-wrap { position:absolute; bottom:-20px; left:14px; }
.mcard-av { width:40px; height:40px; border-radius:50%; object-fit:cover; border:3px solid var(--card); }
.mcard-av-ph { width:40px; height:40px; border-radius:50%; background:var(--mid2); border:3px solid var(--card); display:flex; align-items:center; justify-content:center; font-size:1rem; font-weight:bold; color:var(--gold); }
.mcard-body { padding:26px 14px 10px; flex:1; display:flex; flex-direction:column; gap:4px; }
.mcard-name-row { display:flex; align-items:center; gap:6px; }
.mcard-name { font-size:.8rem; font-weight:bold; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.mcard-name.is-admin::after { content:' ⚡'; color:var(--gold); font-size:.65rem; }
.mcard-collab { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.mcard-collab.open { background:#4ade80; box-shadow:0 0 6px rgba(74,222,128,.5); }
.mcard-collab.busy { background:#f87171; box-shadow:0 0 6px rgba(248,113,113,.4); }
.mcard-title { font-size:.58rem; font-weight:bold; letter-spacing:.04em; }
.mcard-joined { font-size:.5rem; color:rgba(238,235,230,.2); letter-spacing:.04em; margin-top:1px; }
.mcard-genres { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
.mcard-genre { font-size:.52rem; padding:2px 7px; border-radius:10px; background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.2); color:rgba(232,184,75,.7); }
.mcard-socials { display:flex; gap:6px; margin-top:6px; }
.mcard-social { font-size:.5rem; padding:2px 8px; border-radius:4px; text-decoration:none; transition:opacity .15s; }
.mcard-social:hover { opacity:.75; }
.mcard-social.ig { background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.2); color:#e8b84b; }
.mcard-social.sp { background:rgba(30,215,96,.08); border:1px solid rgba(30,215,96,.2); color:#1ed760; }
.mcard-footer { display:flex; gap:12px; padding:10px 14px; border-top:1px solid rgba(255,255,255,.05); margin-top:auto; }
.mcard-stat { font-size:.55rem; color:var(--dim); }
.mcard-stat span { color:var(--white); font-weight:bold; }

/* Empty state */
.empty-state { text-align:center; padding:60px 20px; color:var(--dim); font-size:.72rem; grid-column:1/-1; }

/* Skeleton */
@keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
.skel { background:linear-gradient(90deg,var(--mid2) 25%,rgba(42,42,69,.6) 50%,var(--mid2) 75%); background-size:800px 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
.mcard-skel { background:var(--card); border:1px solid var(--mid); border-radius:10px; overflow:hidden; }
.mcard-skel-cover { height:52px; background:var(--mid2); position:relative; }

/* Bottom Nav */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:500; background:rgba(6,6,9,.96); border-top:1px solid var(--mid); backdrop-filter:blur(16px); display:flex; height:58px; }
.bnav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; text-decoration:none; color:rgba(238,235,230,.3); transition:color .15s; position:relative; }
.bnav-item:hover { color:rgba(238,235,230,.65); }
.bnav-item.active { color:var(--gold); }
.bnav-item.active::after { content:''; position:absolute; top:0; left:28%; right:28%; height:2px; background:var(--gold); border-radius:0 0 3px 3px; }
.bnav-icon { font-size:1.15rem; line-height:1; }
.bnav-label { font-family:'Space Mono',monospace; font-size:.52rem; letter-spacing:.05em; text-transform:uppercase; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a href="forum.html" class="topnav-back">← Forum</a>
    <span class="topnav-sep">|</span>
    <span class="topnav-brand">Topluluk Üyeleri</span>
  </div>
  <div id="authBar"></div>
</nav>

<div class="banner">
  <div class="banner-inner">
    <div class="banner-icon">👥</div>
    <div class="banner-info">
      <h1>Topluluk Üyeleri</h1>
      <p>Elektronik Müzik Topluluğu</p>
    </div>
    <div class="banner-count-wrap" id="memberCountWrap">
      <div class="banner-count" id="memberCount">0</div>
      <div class="banner-count-lbl">Üye</div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="top-row">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="searchInput" type="text" placeholder="İsim, tür veya araç ara...">
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="new">Yeni → Eski</option>
      <option value="old">Eski → Yeni</option>
      <option value="az">İsim A-Z</option>
    </select>
  </div>
  <div class="filter-bar" id="titleFilter"></div>
  <div class="members-grid" id="grid"></div>
</div>

<script>
'use strict';
const ADMIN_EMAIL = 'berkayer032@gmail.com';

firebase.initializeApp({
  apiKey:            "AIzaSyDX8AkwDejrkh5L4xUXQcmzKq-DYvc2E8A",
  authDomain:        "ableton-tutorial.firebaseapp.com",
  projectId:         "ableton-tutorial",
  storageBucket:     "ableton-tutorial.firebasestorage.app",
  messagingSenderId: "677640687230",
  appId:             "1:677640687230:web:8c6a2dfefbf55c69ffd22f",
});
const auth = firebase.auth();
const db   = firebase.firestore();
let _user = null;

let _signingIn = false;
function doSignIn() {
  if (_signingIn) return;
  _signingIn = true;
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(console.error).finally(() => { _signingIn = false; });
}

const TITLES = {
  acemi:   { label:'Acemi',                 icon:'🌱', color:'#6fc' },
  merakli: { label:'Prodüksiyon Meraklısı', icon:'🎧', color:'#8fc8e8' },
  uretici: { label:'Üretici',               icon:'🎛️', color:'#e8b84b' },
  veteran: { label:'Veteran',               icon:'🔥', color:'#d4722a' },
  usta:    { label:'Usta',                  icon:'⚡', color:'#b82d45' },
  efsane:  { label:'Efsane',               icon:'👑', color:'#ffd700' },
};

function fmtJoined(ts) {
  if (!ts) return null;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('tr-TR', { month:'long', year:'numeric' }) + "'dan beri üye";
}

function updateAuthBar(user) {
  const bar = document.getElementById('authBar'); bar.innerHTML = '';
  if (user) {
    const wrap = document.createElement('div'); wrap.className = 'auth-user-wrap';
    const img  = document.createElement('img');  img.className = 'auth-avatar';
    img.src = user.photoURL || ''; img.alt = '';
    const name = document.createElement('span'); name.className = 'auth-name';
    name.textContent = user.email === ADMIN_EMAIL ? '⚡ Admin' : (user.displayName?.split(' ')[0] || 'Üye');
    const out = document.createElement('button'); out.className = 'auth-out-btn';
    out.textContent = '✕'; out.onclick = () => auth.signOut();
    wrap.append(img, name, out); bar.append(wrap);
  } else {
    const btn = document.createElement('button'); btn.className = 'auth-sign-btn';
    btn.textContent = '⬡ Google ile Giriş'; btn.onclick = doSignIn;
    bar.append(btn);
  }
}

let _allMembers = [];
let _titleFilter = 'all';
let _search = '';
let _sort = 'new';

function showSkeletons() {
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div'); s.className = 'mcard-skel';
    s.innerHTML = `
      <div class="mcard-skel-cover"><div style="position:absolute;bottom:-20px;left:14px;width:40px;height:40px;border-radius:50%;border:3px solid #13131f" class="skel"></div></div>
      <div style="padding:26px 14px 14px;display:flex;flex-direction:column;gap:8px">
        <div class="skel" style="height:13px;width:60%;border-radius:3px"></div>
        <div class="skel" style="height:10px;width:40%;border-radius:3px"></div>
        <div class="skel" style="height:10px;width:75%;border-radius:3px;margin-top:2px"></div>
      </div>`;
    grid.append(s);
  }
}

function buildFilters() {
  const bar = document.getElementById('titleFilter'); bar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'fbtn' + (_titleFilter === 'all' ? ' active' : '');
  all.textContent = 'Tümü';
  all.onclick = () => { _titleFilter = 'all'; buildFilters(); renderGrid(); };
  bar.append(all);

  Object.entries(TITLES).forEach(([key, td]) => {
    const b = document.createElement('button');
    b.className = 'fbtn' + (_titleFilter === key ? ' active' : '');
    b.textContent = td.icon + ' ' + td.label;
    b.onclick = () => { _titleFilter = key; buildFilters(); renderGrid(); };
    bar.append(b);
  });

  const openBtn = document.createElement('button');
  openBtn.className = 'fbtn' + (_titleFilter === 'collab_open' ? ' collab-active' : '');
  openBtn.textContent = '🟢 Projeye Açık';
  openBtn.onclick = () => { _titleFilter = 'collab_open'; buildFilters(); renderGrid(); };
  bar.append(openBtn);
}

function getVisible() {
  let list = [..._allMembers];
  if (_titleFilter === 'collab_open') list = list.filter(m => m.collabStatus === 'open');
  else if (_titleFilter !== 'all') list = list.filter(m => m.title === _titleFilter);
  if (_search) {
    list = list.filter(m => {
      const q = _search;
      if ((m.displayName||'').toLowerCase().includes(q)) return true;
      if (m.title && TITLES[m.title]?.label.toLowerCase().includes(q)) return true;
      if ((m.genres||[]).some(g => g.toLowerCase().includes(q))) return true;
      return false;
    });
  }
  if (_sort === 'old') list.sort((a,b) => (a.joinedAt?.toMillis?.()??0) - (b.joinedAt?.toMillis?.()??0));
  else if (_sort === 'az') list.sort((a,b) => (a.displayName||'').localeCompare(b.displayName||'','tr'));
  else list.sort((a,b) => (b.joinedAt?.toMillis?.()??0) - (a.joinedAt?.toMillis?.()??0));
  return list;
}

function renderGrid() {
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  const visible = getVisible();

  if (!visible.length) {
    const e = document.createElement('div'); e.className = 'empty-state';
    e.innerHTML = _search
      ? `<div style="font-size:1.5rem;margin-bottom:8px">🔍</div><div>"${_search}" için sonuç bulunamadı.</div>`
      : '<div style="font-size:1.5rem;margin-bottom:8px">👤</div><div>Bu kriterlerde üye yok.</div>';
    grid.append(e); return;
  }

  visible.forEach(m => {
    const card = document.createElement('a'); card.className = 'mcard'; card.href = `profile.html?uid=${m._uid}`;

    // Cover + avatar
    const cover = document.createElement('div'); cover.className = 'mcard-cover';
    const avWrap = document.createElement('div'); avWrap.className = 'mcard-av-wrap';
    if (m.photoURL) {
      const img = document.createElement('img'); img.className = 'mcard-av'; img.src = m.photoURL; img.alt = '';
      avWrap.append(img);
    } else {
      const ph = document.createElement('div'); ph.className = 'mcard-av-ph';
      ph.textContent = (m.displayName || '?')[0].toUpperCase();
      avWrap.append(ph);
    }
    cover.append(avWrap); card.append(cover);

    // Body
    const body = document.createElement('div'); body.className = 'mcard-body';

    // Name + collab dot
    const nameRow = document.createElement('div'); nameRow.className = 'mcard-name-row';
    const nm = document.createElement('div');
    nm.className = 'mcard-name' + (m.email === ADMIN_EMAIL ? ' is-admin' : '');
    nm.textContent = m.displayName?.split(' ')[0] || 'Üye';
    nameRow.append(nm);
    if (m.collabStatus === 'open' || m.collabStatus === 'busy') {
      const dot = document.createElement('div');
      dot.className = 'mcard-collab ' + m.collabStatus;
      dot.title = m.collabStatus === 'open' ? 'Projeye Açık' : 'Meşgul';
      nameRow.append(dot);
    }
    body.append(nameRow);

    // Title
    if (m.title && TITLES[m.title]) {
      const td = TITLES[m.title];
      const ts = document.createElement('div'); ts.className = 'mcard-title';
      ts.style.color = td.color;
      ts.textContent = td.icon + ' ' + td.label;
      body.append(ts);
    }

    // Join date
    const joined = fmtJoined(m.joinedAt);
    if (joined) {
      const jd = document.createElement('div'); jd.className = 'mcard-joined';
      jd.textContent = joined;
      body.append(jd);
    }

    // Genres
    if (m.genres?.length) {
      const gw = document.createElement('div'); gw.className = 'mcard-genres';
      m.genres.slice(0,4).forEach(g => {
        const tag = document.createElement('span'); tag.className = 'mcard-genre'; tag.textContent = g;
        gw.append(tag);
      });
      body.append(gw);
    }

    // Social links
    if (m.instagram || m.spotify) {
      const sw = document.createElement('div'); sw.className = 'mcard-socials';
      if (m.instagram) {
        const ig = document.createElement('a'); ig.className = 'mcard-social ig';
        ig.href = m.instagram; ig.target = '_blank'; ig.rel = 'noopener';
        ig.textContent = '📷 IG';
        ig.onclick = e => e.stopPropagation();
        sw.append(ig);
      }
      if (m.spotify) {
        const sp = document.createElement('a'); sp.className = 'mcard-social sp';
        sp.href = m.spotify; sp.target = '_blank'; sp.rel = 'noopener';
        sp.textContent = '🎵 Spotify';
        sp.onclick = e => e.stopPropagation();
        sw.append(sp);
      }
      body.append(sw);
    }

    card.append(body);

    // Footer
    const footer = document.createElement('div'); footer.className = 'mcard-footer';
    const ps = document.createElement('div'); ps.className = 'mcard-stat';
    ps.innerHTML = `Konu <span>${m.postCount||0}</span>`;
    const rs = document.createElement('div'); rs.className = 'mcard-stat';
    rs.innerHTML = `Yanıt <span>${m.replyCount||0}</span>`;
    footer.append(ps, rs); card.append(footer);

    grid.append(card);
  });
}

async function loadMembers() {
  showSkeletons();
  const snap = await db.collection('users').limit(200).get();
  _allMembers = snap.docs.map(d => { const obj = d.data(); obj._uid = d.id; return obj; });
  _allMembers.sort((a,b) => (b.joinedAt?.toMillis?.()??0) - (a.joinedAt?.toMillis?.()??0));

  document.getElementById('memberCount').textContent = snap.size;
  document.getElementById('memberCountWrap').classList.add('loaded');

  buildFilters();
  renderGrid();
}

document.getElementById('searchInput').oninput = e => {
  _search = e.target.value.trim().toLowerCase();
  renderGrid();
};
document.getElementById('sortSelect').onchange = e => {
  _sort = e.target.value;
  renderGrid();
};

auth.onAuthStateChanged(user => {
  _user = user;
  updateAuthBar(user);
  loadMembers();
});
