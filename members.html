*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

.auth-user-wrap { display:flex; align-items:center; gap:8px; background:rgba(42,42,69,.85); border:1px solid rgba(232,184,75,.3); padding:4px 10px 4px 4px; border-radius:20px; }

.banner-inner { max-width:1300px; margin:0 auto; padding:32px 32px 28px; display:flex; align-items:center; gap:22px; position:relative; }
@media(max-width:560px){ .banner-inner { padding:20px 16px; gap:14px; } .banner-icon { width:48px; height:48px; font-size:1.2rem; } .layout { padding:18px 14px 80px; } .search-wrap { min-width:0; } }
.banner-icon { width:62px; height:62px; background:linear-gradient(135deg,var(--crimson),var(--amber)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; flex-shrink:0; box-shadow:0 0 24px rgba(232,184,75,.22); }
.banner-info h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.8rem,3vw,2.6rem); color:var(--white); letter-spacing:.06em; line-height:1; margin-bottom:6px; }

.mcard-name { font-size:.95rem; font-weight:bold; color:var(--white); }

.mcard-collab { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.mcard-collab.open { background:#4ade80; box-shadow:0 0 7px rgba(74,222,128,.6); }
.mcard-collab.busy { background:#f87171; box-shadow:0 0 7px rgba(248,113,113,.5); }
.mcard-title { font-size:.68rem; font-weight:bold; letter-spacing:.04em; }
.mcard-joined { font-size:.62rem; color:rgba(238,235,230,.22); letter-spacing:.04em; margin-top:2px; }
.mcard-genres { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; justify-content:center; }
.mcard-genre { font-size:.63rem; padding:3px 10px; border-radius:12px; background:rgba(232,184,75,.08); border:1px solid rgba(232,184,75,.2); color:rgba(232,184,75,.8); }

.mcard-social.sp { background:rgba(30,215,96,.08); border:1px solid rgba(30,215,96,.2); color:#1ed760; }
.mcard-footer { display:flex; justify-content:center; gap:28px; padding:12px 18px; border-top:1px solid rgba(255,255,255,.05); margin-top:auto; }

.mcard-stat span { display:block; font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--gold); line-height:1.1; }

/* Empty state */
.empty-state { text-align:center; padding:80px 20px; color:var(--dim); font-size:.85rem; grid-column:1/-1; }

/* Skeleton */
@keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
.skel { background:linear-gradient(90deg,var(--mid2) 25%,rgba(42,42,69,.6) 50%,var(--mid2) 75%); background-size:800px 100%; animation:shimmer 1.4s infinite; border-radius:4px; }

/* ── Notification Bell ── */
.notif-bell-wrap { position:relative; }
.notif-bell { background:none; border:none; color:rgba(238,235,230,.45); font-size:1.1rem; cursor:pointer; padding:4px; line-height:1; transition:color .15s; }

.notif-badge { position:absolute; top:0; right:0; background:var(--crimson); color:#fff; font-size:.42rem; font-family:'Space Mono',monospace; border-radius:6px; padding:1px 4px; min-width:12px; text-align:center; pointer-events:none; }
.notif-panel { position:absolute; top:40px; right:0; width:min(290px,90vw); background:var(--card); border:1px solid var(--mid); border-radius:8px; box-shadow:0 8px 32px rgba(0,0,0,.6); z-index:9999; overflow:hidden; display:none; }

.notif-panel-head { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,.06); display:flex; align-items:center; justify-content:space-between; }
.notif-panel-title { font-size:.62rem; color:var(--gold); letter-spacing:.08em; text-transform:uppercase; }
.notif-read-all { background:none; border:none; color:rgba(238,235,230,.35); font-size:.55rem; cursor:pointer; font-family:'Space Mono',monospace; padding:0; }
.notif-list { max-height:320px; overflow-y:auto; }

.notif-item-time { font-size:.5rem; color:rgba(238,235,230,.25); }
.notif-empty { padding:20px 14px; text-align:center; font-size:.62rem; color:var(--dim); }

  uretici: { label:'Üretici',               icon:'🎛️', color:_tLight?'#8c6200':'#e8b84b' },
  veteran: { label:'Veteran',               icon:'🔥', color:_tLight?'#a04a08':'#d4722a' },
  usta:    { label:'Usta',                  icon:'⚡', color:_tLight?'#902030':'#b82d45' },
  efsane:  { label:'Efsane',               icon:'👑', color:_tLight?'#8c6200':'#ffd700' },
};

function fmtJoined(ts) {
  if (!ts) return null;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('tr-TR', { month:'long', year:'numeric' }) + "'dan beri üye";
}

let _notifUnsub = null, _annUnsub = null;
let _notifPanelEl = null;
let _personalNotifs = [], _announcements = [], _annSeenAt = null, _dismissedAnns = [];

function updateAuthBar(user) {
  const bar = document.getElementById('authBar'); bar.innerHTML = '';
  _notifPanelEl = null;
  if (user) {
    const wrap = document.createElement('div'); wrap.className = 'auth-user-wrap';
    const img  = document.createElement('img');  img.className = 'auth-avatar';
      const _bnavAv = document.getElementById('bnavProfileAv');
      const _bnavAdmin = document.getElementById('bnavAdminItem');
      if (_bnavAdmin) _bnavAdmin.style.display = 'flex'; localStorage.setItem('ps_authed','1');
      if (_bnavAv) { if (user.photoURL) { const _ai=document.createElement('img');_ai.src=user.photoURL;_ai.alt='';_bnavAv.innerHTML='';_bnavAv.append(_ai); } else { _bnavAv.textContent='👤'; } }
    img.src = user.photoURL || ''; img.alt = '';
    const name = document.createElement('span'); name.className = 'auth-name';
    name.textContent = user.email === ADMIN_EMAIL ? '⚡ Admin' : (user.displayName?.split(' ')[0] || 'Üye');
    const out = document.createElement('button'); out.className = 'auth-out-btn';
    out.textContent = '✕'; out.onclick = () => auth.signOut();
    wrap.append(img, name, out);

    const bellWrap = document.createElement('div'); bellWrap.className = 'notif-bell-wrap';
    const bell = document.createElement('button'); bell.className = 'notif-bell'; bell.textContent = '🔔'; bell.title = 'Bildirimler';
    const badge = document.createElement('span'); badge.className = 'notif-badge'; badge.style.display = 'none';
    _notifPanelEl = document.createElement('div'); _notifPanelEl.className = 'notif-panel';
    _notifPanelEl.innerHTML = '<div class="notif-panel-head"><span class="notif-panel-title">Bildirimler</span><button class="notif-read-all">Tümünü Oku</button></div><div class="notif-list"></div>';
    _notifPanelEl.querySelector('.notif-read-all').onclick = () => markAllNotifRead(user.uid);
    bell.onclick = e => { e.stopPropagation(); toggleNotifPanel(user); };
    bellWrap.append(bell, badge, _notifPanelEl);
    bar.append(bellWrap, wrap);
    document.addEventListener('click', () => { if (_notifPanelEl) _notifPanelEl.classList.remove('open'); }, { once: true });
  } else {
    const btn = document.createElement('button'); btn.className = 'auth-sign-btn';
    btn.textContent = '⬡ Google ile Giriş'; btn.onclick = doSignIn;
    bar.append(btn);
  }
}

function toggleNotifPanel(user) {
  if (!_notifPanelEl) return;
  const isOpen = _notifPanelEl.classList.contains('open');
  if (isOpen) { _notifPanelEl.classList.remove('open'); return; }
  _notifPanelEl.classList.add('open');
  setTimeout(() => document.addEventListener('click', () => { if (_notifPanelEl) _notifPanelEl.classList.remove('open'); }, { once: true }), 0);
  markAllNotifRead(user.uid);
}

function _mergeNotifs(uid) {
  const all = [
    ..._personalNotifs.map(n => ({...n, _t:'p'})),
    ..._announcements.filter(n => !_dismissedAnns.includes(n._id)).map(n => ({...n, _t:'a'}))
  ].sort((a,b) => ((b.createdAt?.seconds||0) - (a.createdAt?.seconds||0)));
  const annSec = _annSeenAt?.seconds || 0;
  const unread = _personalNotifs.filter(n => !n.read).length
    + _announcements.filter(n => (n.createdAt?.seconds||0) > annSec).length;
  const badge = document.querySelector('.notif-badge');
  if (badge) { badge.textContent = unread > 9 ? '9+' : String(unread); badge.style.display = unread > 0 ? 'block' : 'none'; }
  if (_notifPanelEl) {
    const list = _notifPanelEl.querySelector('.notif-list'); if (!list) return;
    list.innerHTML = '';
    if (!all.length) { list.innerHTML = '<div class="notif-empty">Bildirim yok</div>'; return; }
    all.forEach(n => {
      const isUnread = n._t==='p' ? !n.read : (n.createdAt?.seconds||0) > annSec;
      const item = document.createElement('div'); item.className = 'notif-item' + (isUnread ? ' unread' : '');
      const icon = n._t==='a' ? '📢 ' : '';
      const timeStr = n.createdAt ? n.createdAt.toDate().toLocaleDateString('tr-TR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      const _nt=document.createElement('div');_nt.className='notif-item-text';_nt.textContent=icon+(n.text||'Yeni bildirim');const _ni=document.createElement('div');_ni.className='notif-item-time';_ni.textContent=timeStr;item.append(_nt,_ni);
      if (n.postId) item.onclick = () => { location.href = `post?id=${n.postId}`; };
      if (n._id) {
        const del = document.createElement('button'); del.className = 'notif-del-btn'; del.textContent = '×'; del.title = 'Sil';
        del.onclick = e => {
          e.stopPropagation();
          if (n._t === 'p') {
            db.collection('notifications').doc(uid).collection('items').doc(n._id).delete();
          } else {
            if (!_dismissedAnns.includes(n._id)) { _dismissedAnns.push(n._id); }
            db.collection('users').doc(uid).update({ dismissedAnns: firebase.firestore.FieldValue.arrayUnion(n._id) }).catch(() => {});
            _announcements = _announcements.filter(a => a._id !== n._id);
            _mergeNotifs(uid);
          }
        };
        item.append(del);
      }
      list.append(item);
    });
  }
}

function markAllNotifRead(uid) {
  db.collection('notifications').doc(uid).collection('items')
    .where('read', '==', false).get().then(snap => {
      const batch = db.batch(); snap.docs.forEach(d => batch.update(d.ref, { read: true })); batch.commit();
    }).catch(() => {});
  db.collection('users').doc(uid).set({ announcementsSeenAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }).catch(() => {});
  _annSeenAt = { seconds: Date.now() / 1000 };
  _personalNotifs = _personalNotifs.map(n => ({...n, read: true}));
  _mergeNotifs(uid);
}

function initNotifications(user) {
  if (_notifUnsub) { _notifUnsub(); _notifUnsub = null; }
  if (_annUnsub) { _annUnsub(); _annUnsub = null; }
  _personalNotifs = []; _announcements = []; _annSeenAt = null; _dismissedAnns = [];
  if (!user) return;
  db.collection('users').doc(user.uid).get().then(d => {
    _annSeenAt = d.data()?.announcementsSeenAt || null;
    _dismissedAnns = d.data()?.dismissedAnns || [];
    _mergeNotifs(user.uid);
  }).catch(() => {});
  _notifUnsub = db.collection('notifications').doc(user.uid).collection('items')
    .orderBy('createdAt', 'desc').limit(20)
    .onSnapshot(snap => {
      _personalNotifs = snap.docs.map(d => ({...d.data(), _id: d.id}));
      if (snap.docs.length > 4) snap.docs.slice(4).forEach(d => d.ref.delete());
      _mergeNotifs(user.uid);
    }, () => {});
  _annUnsub = db.collection('announcements').orderBy('createdAt', 'desc').limit(15)
    .onSnapshot(snap => { _announcements = snap.docs.map(d => ({...d.data(), _id: d.id})); _mergeNotifs(user.uid); }, () => {});
}

let _allMembers = [];
let _titleFilter = 'all';
let _genreFilter = '';
let _unsubMembers = null;
let _postCounts = {}, _replyCounts = {};
let _search = '';
let _sort = 'new';

function showSkeletons() {
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div'); s.className = 'mcard-skel';
    s.innerHTML = `
      <div class="mcard-skel-cover"><div style="position:absolute;bottom:-20px;left:14px;width:40px;height:40px;border-radius:50%;border:3px solid #13131f" class="skel"></div></div>
      <div style="padding:26px 14px 14px;display:flex;flex-direction:column;gap:8px">
        <div class="skel" style="height:13px;width:60%;border-radius:3px"></div>
        <div class="skel" style="height:10px;width:40%;border-radius:3px"></div>
        <div class="skel" style="height:10px;width:75%;border-radius:3px;margin-top:2px"></div>
      </div>`;
    grid.append(s);
  }
}

function buildFilters() {
  const bar = document.getElementById('titleFilter'); bar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'fbtn' + (_titleFilter === 'all' ? ' active' : '');
  all.textContent = 'Tümü';
  all.onclick = () => { _titleFilter = 'all'; buildFilters(); renderGrid(); };
  bar.append(all);

  Object.entries(TITLES).forEach(([key, td]) => {
    const b = document.createElement('button');
    b.className = 'fbtn' + (_titleFilter === key ? ' active' : '');
    b.textContent = td.icon + ' ' + td.label;
    b.onclick = () => { _titleFilter = key; buildFilters(); renderGrid(); };
    bar.append(b);
  });

  const openBtn = document.createElement('button');
  openBtn.className = 'fbtn' + (_titleFilter === 'collab_open' ? ' collab-active' : '');
  openBtn.textContent = '🟢 Projeye Açık';
  openBtn.onclick = () => { _titleFilter = 'collab_open'; buildFilters(); renderGrid(); };
  bar.append(openBtn);
}

function buildGenreFilter() {
  const bar = document.getElementById('genreFilter');
  const genreSet = new Set();
  _allMembers.forEach(m => (m.genres||[]).forEach(g => genreSet.add(g)));
  if (genreSet.size === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex'; bar.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'fbtn' + (_genreFilter === '' ? ' active' : '');
  allBtn.textContent = '🎵 Tüm Genreler';
  allBtn.onclick = () => { _genreFilter = ''; buildGenreFilter(); renderGrid(); };
  bar.append(allBtn);
  [...genreSet].sort().forEach(g => {
    const b = document.createElement('button');
    b.className = 'fbtn' + (_genreFilter === g ? ' active' : '');
    b.textContent = g;
    b.onclick = () => { _genreFilter = g; buildGenreFilter(); renderGrid(); };
    bar.append(b);
  });
}

function getVisible() {
  let list = [..._allMembers];
  if (_titleFilter === 'collab_open') list = list.filter(m => m.collabStatus === 'open');
  else if (_titleFilter !== 'all') list = list.filter(m => m.title === _titleFilter);
  if (_genreFilter) list = list.filter(m => (m.genres||[]).includes(_genreFilter));
  if (_search) {
    list = list.filter(m => {
      const q = _search;
      if ((m.displayName||'').toLowerCase().includes(q)) return true;
      if (m.title && TITLES[m.title]?.label.toLowerCase().includes(q)) return true;
      if ((m.genres||[]).some(g => g.toLowerCase().includes(q))) return true;
      return false;
    });
  }
  const _ts = m => { const j = m.joinedAt; if (!j) return 0; if (typeof j.toMillis==='function') return j.toMillis(); if (typeof j.seconds==='number') return j.seconds*1000; return 0; };
  if (_sort === 'old') list.sort((a,b) => (_ts(a)||Infinity) - (_ts(b)||Infinity));
  else if (_sort === 'az') list.sort((a,b) => (a.displayName||'').localeCompare(b.displayName||'','tr'));
  else list.sort((a,b) => (_ts(b)||0) - (_ts(a)||0));
  return list;
}

function renderGrid() {
  const grid = document.getElementById('grid'); grid.innerHTML = '';
  const visible = getVisible();

  if (!visible.length) {
    const e = document.createElement('div'); e.className = 'empty-state';
    e.innerHTML = _search
      ? `<div style="font-size:1.5rem;margin-bottom:8px">🔍</div><div>"${_search}" için sonuç bulunamadı.</div>`
      : '<div style="font-size:1.5rem;margin-bottom:8px">👤</div><div>Bu kriterlerde üye yok.</div>';
    grid.append(e); return;
  }

  visible.forEach(m => {
    const card = document.createElement('a'); card.className = 'mcard'; card.href = `profile?uid=${m._uid}`;

    // Cover + avatar
    const cover = document.createElement('div'); cover.className = 'mcard-cover';
    const avWrap = document.createElement('div'); avWrap.className = 'mcard-av-wrap';
    const cardPhoto = m.customPhotoURL || m.photoURL;
    if (cardPhoto) {
      const img = document.createElement('img'); img.className = 'mcard-av'; img.src = cardPhoto; img.alt = '';
      avWrap.append(img);
    } else {
      const ph = document.createElement('div'); ph.className = 'mcard-av-ph';
      ph.textContent = (m.displayName?.trim() || m.email?.split('@')[0] || '?')[0].toUpperCase();
      avWrap.append(ph);
    }
    cover.append(avWrap); card.append(cover);

    // Body
    const body = document.createElement('div'); body.className = 'mcard-body';

    // Name + collab dot
    const nameRow = document.createElement('div'); nameRow.className = 'mcard-name-row';
    const nm = document.createElement('div');
    nm.className = 'mcard-name' + (m.email === ADMIN_EMAIL ? ' is-admin' : '');
    nm.textContent = (m.displayName?.trim() || m.email?.split('@')[0] || 'Üye').split(' ')[0];
    nameRow.append(nm);
    if (m.collabStatus === 'open' || m.collabStatus === 'busy') {
      const dot = document.createElement('div');
      dot.className = 'mcard-collab ' + m.collabStatus;
      dot.title = m.collabStatus === 'open' ? 'Projeye Açık' : 'Meşgul';
      nameRow.append(dot);
    }
    body.append(nameRow);

    // Title
    if (m.title && TITLES[m.title]) {
      const td = TITLES[m.title];
      const ts = document.createElement('div'); ts.className = 'mcard-title';
      ts.style.color = td.color;
      ts.textContent = td.icon + ' ' + td.label;
      body.append(ts);
    }

    // Join date
    const joined = fmtJoined(m.joinedAt);
    if (joined) {
      const jd = document.createElement('div'); jd.className = 'mcard-joined';
      jd.textContent = joined;
      body.append(jd);
    }

    // Genres
    if (m.genres?.length) {
      const gw = document.createElement('div'); gw.className = 'mcard-genres';
      m.genres.slice(0,4).forEach(g => {
        const tag = document.createElement('span'); tag.className = 'mcard-genre'; tag.textContent = g;
        gw.append(tag);
      });
      body.append(gw);
    }

    // Social links
    if (m.instagram || m.spotify || m.soundcloudUrl || m.mixcloudUrl) {
      const sw = document.createElement('div'); sw.className = 'mcard-socials';
      if (m.instagram) {
        const ig = document.createElement('a'); ig.className = 'mcard-social ig';
        ig.href = m.instagram; ig.target = '_blank'; ig.rel = 'noopener';
        ig.textContent = '📷 IG'; ig.onclick = e => e.stopPropagation();
        sw.append(ig);
      }
      if (m.spotify) {
        const sp = document.createElement('a'); sp.className = 'mcard-social sp';
        sp.href = m.spotify; sp.target = '_blank'; sp.rel = 'noopener';
        sp.textContent = '🎵 Spotify'; sp.onclick = e => e.stopPropagation();
        sw.append(sp);
      }
      if (m.soundcloudUrl) {
        const sc = document.createElement('a'); sc.className = 'mcard-social' ; sc.style.cssText = 'background:rgba(255,85,0,.08);border:1px solid rgba(255,85,0,.2);color:#ff5500;';
        sc.href = m.soundcloudUrl; sc.target = '_blank'; sc.rel = 'noopener';
        sc.textContent = '☁️ SC'; sc.onclick = e => e.stopPropagation();
        sw.append(sc);
      }
      if (m.mixcloudUrl) {
        const mc = document.createElement('a'); mc.className = 'mcard-social'; mc.style.cssText = 'background:rgba(82,158,214,.08);border:1px solid rgba(82,158,214,.2);color:#529ed6;';
        mc.href = m.mixcloudUrl; mc.target = '_blank'; mc.rel = 'noopener';
        mc.textContent = '🎙️ MC'; mc.onclick = e => e.stopPropagation();
        sw.append(mc);
      }
      body.append(sw);
    }

    card.append(body);

    // Footer
    const footer = document.createElement('div'); footer.className = 'mcard-footer';
    const ps = document.createElement('div'); ps.className = 'mcard-stat';
    ps.innerHTML = `Konu <span>${m.postCount||0}</span>`;
    const rs = document.createElement('div'); rs.className = 'mcard-stat';
    rs.innerHTML = `Yanıt <span>${m.replyCount||0}</span>`;
    footer.append(ps, rs); card.append(footer);

    grid.append(card);
  });
}

async function loadMembers() {
  showSkeletons();
  if (_unsubMembers) { _unsubMembers(); _unsubMembers = null; }

  // Fetch counts once (posts/replies don't need real-time for member grid)
  const [postsSnap, repliesSnap] = await Promise.all([
    db.collection('forum').limit(2000).get().catch(() => null),
    db.collectionGroup('replies').limit(5000).get().catch(() => null),
  ]);
  _postCounts = {}; _replyCounts = {};
  postsSnap?.docs.forEach(d => { const a = d.data().authorId; if (a) _postCounts[a] = (_postCounts[a]||0)+1; });
  repliesSnap?.docs.forEach(d => { const a = d.data().authorId; if (a) _replyCounts[a] = (_replyCounts[a]||0)+1; });

  _unsubMembers = db.collection('users').limit(200).onSnapshot(snap => {
    _allMembers = snap.docs.map(d => { const obj = d.data(); obj._uid = d.id; obj.postCount = _postCounts[d.id]||0; obj.replyCount = _replyCounts[d.id]||0; return obj; });
    _allMembers.sort((a,b) => (b.joinedAt?.toMillis?.()??0) - (a.joinedAt?.toMillis?.()??0));

    document.getElementById('memberCount').textContent = snap.size;
    document.getElementById('memberCountWrap').classList.add('loaded');

    buildFilters();
    buildGenreFilter();
    renderGrid();
  });
}

document.getElementById('searchInput').oninput = e => {
  _search = e.target.value.trim().toLowerCase();
  renderGrid();
};
document.getElementById('sortSelect').onchange = e => {
  _sort = e.target.value;
  renderGrid();
};

auth.getRedirectResult().catch(e => console.error("redirectResult:", e));
auth.onAuthStateChanged(user => {
  _user = user;
  updateAuthBar(user);
  initNotifications(user);
  loadMembers();
});
</script>
